  {id:297, section:"ch4", q:"غاز حجمه 3 L ودرجة حرارته 300 K تقلص حجمه إلى 2 L، فكم تُصبح درجة حرارته؟", options:["200 K","450 K","300 K","600 K"], correct:0, exp:"الإجابة الصحيحة هي 200 K. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:298, section:"ch4", q:"درجة الصفر المطلق في مقياس كلفن تُعادل في تدريج سليزيوس..", options:["-273°C","-32°C","212°C","373°C"], correct:0, exp:"الإجابة هي -273°C. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:299, section:"ch4", q:"تتلاشى الفراغات بين ذرات غاز الهيليوم عند درجة حرارة..", options:["تجمد الماء","النقط الحرجة","الصفر المطلق","تجمد الغاز"], correct:2, exp:"الإجابة الصحيحة هي الصفر المطلق. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:300, section:"ch4", q:"ما درجة الحرارة التي تنعدم عندها المسافات بين الجزيئات؟", options:["الصفر المطلق","قانون بويل","قانون شارل","قانون جاي لوساك"], correct:0, exp:"الإجابة الصحيحة هي الصفر المطلق. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:301, section:"ch4", q:"يتناسب ضغط الغاز طردياً مع درجة حرارته عند ثبوت الحجم..", options:["قانون شارل","قانون بويل","قانون جاي لوساك","القانون العام للغازات"], correct:2, exp:"الإجابة هي قانون جاي لوساك. قانون جاي لوساك: عند ثبوت الحجم، ضغط الغاز يتناسب طردياً مع درجة حرارته المطلقة (P₁/T₁ = P₂/T₂). تطبيقه العملي: أواني الضغط للطبخ."},
  {id:302, section:"ch4", q:"أي العلاقات البيانية التالية يُعبّر عن قانون جاي لوساك؟", options:["P-V عكسي","V-T طردي","P-T طردي خط مستقيم من المركز","T-V عكسي"], correct:2, exp:"الإجابة هي P-T طردي خط مستقيم من المركز. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:303, section:"ch4", q:"إطار سيارة ضغطه 5 atm عند 200 K، فإذا زادت الحرارة وأصبحت 300 K، فإن الضغط يصبح داخل الإطار..", options:["0.3 atm","1.5 atm","3.33 atm","7.5 atm"], correct:3, exp:"الإجابة هي 7.5 atm. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:304, section:"ch4", q:"استخدام أواني الضغط لطهي الطعام يُعد تطبيق عملي لقانون..", options:["شارل","بويل","جاي لوساك","دالتون"], correct:2, exp:"الإجابة هي جاي لوساك. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:305, section:"ch4", q:"حاصل ضرب ضغط غاز في حجمه مقسوماً على درجة حرارته بالكلفن يساوي مقداراً ثابتاً..", options:["القانون العام للغازات","قانون بويل","قانون شارل","قانون الغاز المثالي"], correct:0, exp:"الإجابة هي القانون العام للغازات. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:306, section:"ch4", q:"كم يصبح حجم ضعف حجم غاز إذا ضوعف ضغطها وخُفضت درجة حرارتها المطلقة إلى النصف؟", options:["لا تغيير","ربع الحجم الأصلي","نصف الحجم الأصلي","ضعف الحجم الأصلي"], correct:1, exp:"الإجابة الصحيحة هي ربع الحجم الأصلي. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:307, section:"ch4", q:"عينة من غاز الأكسجين حجمها 5 L وضغطها 1 atm ودرجة حرارتها 500 K، فإذا زاد الضغط إلى 100 atm ودرجة الحرارة 1000 K فإن حجمها يصبح..", options:["0.1 L","0.5 L","0.01 L","0.05 L"], correct:0, exp:"الإجابة هي 0.1 L. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:308, section:"ch4", q:"وعاءان يحويان غازين مختلفين عند نفس الضغط والحرارة، فإن عدد الجزيئات..", options:["أكبر في الوعاء A","أكبر في الوعاء B","في الوعاء B ضعف A","متساوياً في الوعاءين A, B"], correct:3, exp:"الإجابة الصحيحة هي متساوياً في الوعاءين A, B. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:309, section:"ch4", q:"ما عدد مولات غاز حجمه 11.2 L في الظروف المعيارية؟", options:["0.25 mol","0.5 mol","1 mol","2 mol"], correct:1, exp:"الإجابة الصحيحة هي 0.5 mol. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:310, section:"ch4", q:"نجعل غاز حقيقي يسلك سلوك غاز مثالي عند..", options:["زيادة الضغط ورفع درجة الحرارة","نقصان الضغط وخفض درجة الحرارة","نقصان الضغط ورفع درجة الحرارة","زيادة الضغط وخفض درجة الحرارة"], correct:2, exp:"الإجابة الصحيحة هي نقصان الضغط ورفع درجة الحرارة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:311, section:"ch4", q:"عند تحليل كمية من الماء بواسطة جهاز التحليل الكهربائي، تكونت كمية من الهيدروجين حجمها 4 لترات؛ وبالتالي فإن حجم الأكسجين الناتج يساوي..", options:["8 L","6 L","4 L","2 L"], correct:3, exp:"الإجابة الصحيحة هي 2 L. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:312, section:"ch4", q:"في المعادلة 2CO(g) + O₂(g) → 2C(s) + O₂(g) احسب حجم أول أكسيد الكربون الناتج من تفاعل 2 L من غاز O₂ مع كمية كافية من الكربون.", options:["8 L","6 L","4 L","2 L"], correct:2, exp:"الإجابة الصحيحة هي 4 L. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:313, section:"ch4", q:"المادة التي تُستهلك كلياً في التفاعل، ونحدّد كمية المادة الناتجة..", options:["المادة الفائضة","المادة المترددة","المادة المحدّدة للتفاعل","المادة الأموتية"], correct:2, exp:"الإجابة الصحيحة هي المادة المحدّدة للتفاعل. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:314, section:"ch4", q:"مادة متفاعلة تبقى دون توقف التفاعل..", options:["المادة المحدّدة للتفاعل","المادة الفائضة","المادة المنتهية","المادة المستهلكة"], correct:1, exp:"الإجابة هي المادة الفائضة. المادة المحددة للتفاعل هي التي تنفد أولاً وتحدد كمية الناتج. المادة الفائضة تبقى بعد انتهاء التفاعل دون أن تُستهلك بالكامل."},
  {id:315, section:"ch4", q:"عند احتراق قطعة خشب فإن المادة المحددة للتفاعل..", options:["الأكسجين","الكربون","الخشب","الهواء"], correct:2, exp:"الإجابة هي الخشب. المادة المحددة للتفاعل هي التي تنفد أولاً وتحدد كمية الناتج. المادة الفائضة تبقى بعد انتهاء التفاعل دون أن تُستهلك بالكامل."},
  {id:316, section:"ch4", q:"إذا تم الحصول على 20 g من AgCl وكانت نسبة المردود المئوية 50%؛ فإن المردود النظري يساوي..", options:["20 g","30 g","40 g","50 g"], correct:2, exp:"الإجابة هي 40 g. نسبة المردود المئوية = (المردود الفعلي ÷ المردود النظري) × 100. المردود الفعلي دائماً أقل من النظري بسبب فقد في التفاعل أو تفاعلات جانبية."},
  {id:317, section:"ch4", q:"نظرية الحركة الجزيئية تعتمد في وصفها لسلوك المادة على..", options:["كثافة الجسيمات","كتلة الجسيمات","كافة الجسيمات","حركة الجسيمات"], correct:3, exp:"الإجابة هي حركة الجسيمات. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:318, section:"ch4", q:"طاقة حركة جسيم الغاز تعتمد على..", options:["كتلته وحجمه","كتلته وسرعته","سرعته وحجمه","كتلته وسرعته وحجمه"], correct:1, exp:"الإجابة الصحيحة هي كتلته وسرعته. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:319, section:"ch4", q:"أي التالي لا يؤثر في طاقة جسيمات الغاز؟", options:["سرعتها واتجاهها","كتلتها وسرعتها","نوع جسيمات الغاز","سرعتها"], correct:2, exp:"الإجابة الصحيحة هي نوع جسيمات الغاز. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:320, section:"ch4", q:"أي المواد التالية قابلة للتمدد والانتشار؟", options:["السوائل","الغازات","المواد الصلبة","البلازما"], correct:1, exp:"الإجابة الصحيحة هي الغازات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:321, section:"ch4", q:"تُعرف خاصية تداخل الجسيمات مقارنة بـ..", options:["الانتشار","اللزوجة","التدفق","الغليان"], correct:0, exp:"التعريف الصحيح يشير إلى الانتشار. هذا المفهوم أساسي في الكيمياء ويجب حفظه وفهمه جيداً لأنه يُبنى عليه مفاهيم أخرى متقدمة."},
  {id:322, section:"ch4", q:"عندما تشم رائحة الطعام في أرجاء المنزل، فإن ذلك يعود إلى خاصية..", options:["الانتشار","التمدد","التفاعل","التدفق"], correct:0, exp:"الإجابة الصحيحة هي الانتشار. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:323, section:"ch4", q:"عند خروج الغاز من ثقب صغير فإن ذلك يعود إلى خاصية..", options:["الانتشار","الغليان","التدفق","اللزوجة"], correct:2, exp:"الإجابة الصحيحة هي التدفق. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:324, section:"ch4", q:"للمقارنة بين معدلي سرعة تدفق غازين يُستخدم قانون..", options:["شارل","دالتون","بويل","جراهام"], correct:3, exp:"الإجابة هي جراهام. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:325, section:"ch4", q:"معدل سرعة تدفق الغاز يتناسب عكسياً مع..", options:["كتلته المولية","مربع كتلته المولية","حجمه","الجذر التربيعي لكتلته المولية"], correct:3, exp:"الإجابة الصحيحة هي الجذر التربيعي لكتلته المولية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:326, section:"ch4", q:"وفقاً لقانون جراهام يتساوى معدل انتشار C₂H₄ مع أحد الغازات التالية، علماً أن الكتل الذرية H=1, C=12, N=14, O=16.", options:["N₂","O₂","CO₂","H₂"], correct:0, exp:"الإجابة هي N₂. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:327, section:"ch4", q:"إذا كانت الكتلة المولية للمادة A تساوي 2 والمادة B تساوي 50؛ فكم مرة يزيد معدل انتشار A عن B؟", options:["2","5","10","25"], correct:1, exp:"الإجابة الصحيحة هي 5. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:328, section:"ch4", q:"الضغط يعادل ........ على وحدة المساحة.", options:["الكتلة","القوة","الحجم","الكثافة"], correct:1, exp:"الإجابة الصحيحة هي القوة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:329, section:"ch4", q:"الجهاز المستخدم في قياس الضغط الجوي..", options:["الثانومتر","المانومتر","الترمومتر","البارومتر"], correct:3, exp:"الإجابة الصحيحة هي البارومتر. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:330, section:"ch4", q:"المانومتر يُستعمل لقياس..", options:["الكتلة","ضغط غاز محصور","الكثافة","الضغط الجوي"], correct:1, exp:"الإجابة الصحيحة هي ضغط غاز محصور. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:331, section:"ch4", q:"الضغط الكلي لخليط من الغاز يساوي مجموع الضغوط الجزئية للغازات المكوّنة له..", options:["قانون بويل","قانون شارل","قانون جاي لوساك","قانون دالتون للضغوط الجزئية"], correct:3, exp:"الإجابة الصحيحة هي قانون دالتون للضغوط الجزئية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:332, section:"ch4", q:"العامل غير المؤثر على الضغط الجزئي للغاز..", options:["نوع الغاز","عدد المولات","حجم الوعاء","درجة حرارة خليط الغازات"], correct:0, exp:"الإجابة الصحيحة هي نوع الغاز. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:333, section:"ch4", q:"طاقة مخزنة في المادة نتيجة تركيبها..", options:["الطاقة النووية","الطاقة الحرارية","الطاقة الحركية","طاقة الوضع الكيميائية"], correct:3, exp:"الإجابة الصحيحة هي طاقة الوضع الكيميائية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:334, section:"ch4", q:"ما نوع التحول في الطاقة الناتج من احتراق غاز الميثان المستخدم في الطبخ؟", options:["طاقة وضع كيميائية إلى حرارية","طاقة حركية إلى حرارية","طاقة حرارية إلى كيميائية","طاقة حرارية إلى حركية"], correct:0, exp:"نوع هذا هو طاقة وضع كيميائية إلى حرارية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:335, section:"ch4", q:"الحرارة تنتقل من الجسم..", options:["الأبرد إلى الأسخن","الأسخن إلى الأبرد","الكبير إلى الصغير","الصغير إلى الكبير"], correct:1, exp:"الإجابة الصحيحة هي الأسخن إلى الأبرد. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:336, section:"ch4", q:"كمية الحرارة اللازمة لرفع درجة حرارة 1 g من الماء النقي 1°C..", options:["السُّعر","الجول","الحرارة القياسية","حرارة التكوين"], correct:0, exp:"الإجابة الصحيحة هي السُّعر. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:337, section:"ch4", q:"أي التغيرات التالية طارد للحرارة؟", options:["تحول 1 g من الماء إلى ثلج عند 0°C","تحول 1 g من الماء إلى ثلج عند 20°C","ذوبان الآيس كريم في درجة حرارة الغرفة","تحول 1 g من الماء إلى بخار عند 100°C"], correct:0, exp:"الإجابة الصحيحة هي تحول 1 g من الماء إلى ثلج عند 0°C. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:338, section:"ch4", q:"إذا كان التغيّر في المحتوى الحراري kJ 2270-؛ فإن نوع التفاعل..", options:["تبخر","تفكك","احتراق","انصهار"], correct:2, exp:"نوع هذا هو احتراق. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:339, section:"ch4", q:"في المعادلة 2CO(g) + O₂(g) → 2C(s) + 52 kcal، تبلغ قيمة الحرارة الناتجة عن احتراق 12 g من الكربون؟ علماً أن الكتلة الذرية C=12.", options:["2 kcal","6 kcal","13 kcal","26 kcal"], correct:3, exp:"الإجابة الصحيحة هي 26 kcal. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:340, section:"ch4", q:"سبب استخدام نترات الأمونيوم في عمل الكمادات الباردة أنها..", options:["عازلة للحرارة","ماصة للحرارة","طاردة للحرارة","لا تتفاعل مع حرارة الجسم"], correct:1, exp:"الإجابة الصحيحة هي ماصة للحرارة. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:341, section:"ch4", q:"أي التالي يناسب التفاعل الذي يحدث في الكمادة الباردة؟", options:["ΔHrxn = -600 kJ","ΔHrxn = -65 kJ","ΔHrxn = 0 kJ","ΔHrxn = +65 kJ"], correct:3, exp:"الإجابة الصحيحة هي ΔHrxn = +65 kJ. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:342, section:"ch4", q:"المحتوى الحراري الناتج عن حرق 1 mol من المادة احتراقاً كاملاً..", options:["حرارة الاحتراق","حرارة التبخر","حرارة الانصهار المولارية","حرارة التكثف المولارية"], correct:0, exp:"الإجابة الصحيحة هي حرارة الاحتراق. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:343, section:"ch4", q:"حرارة التبخر المولارية تكفي لتبخير ....... من سائل.", options:["4.3 mol","3 mol","2.5 mol","1 mol"], correct:3, exp:"الإجابة هي 1 mol. المولارية = عدد مولات المذاب ÷ حجم المحلول باللتر (mol/L). تعتمد على حجم المحلول الكلي وليس حجم المذيب فقط."},
  {id:344, section:"ch4", q:"أي العمليات التالية يُمثّل تفاعل ماص للحرارة؟", options:["H₂O(l) → H₂O(g)","C₁₀H₈(s) → C₁₀H₈(l)","Br₂(l) → Br₂(s)","NH₃(l) → NH₃(s)"], correct:0, exp:"الإجابة الصحيحة هي H₂O(l) → H₂O(g). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:345, section:"ch4", q:"ما الحرارة المنطلقة عن تكثُّف 2.3 mol من غاز الأمونيا إلى سائلة عند درجة غليانها؟ علماً أن حرارة تكثُّف الأمونيا ΔHcond = -24 kJ.", options:["-102 kJ","-55.2 kJ","-43.5 kJ","-10.12 kJ"], correct:1, exp:"الإجابة الصحيحة هي -55.2 kJ. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:346, section:"ch4", q:"إذا علمت أن حرارة تبخر الماء المولارية 40.7 kJ، فإن حرارة تكثُّف الماء المولارية..", options:["+20.35 kJ","-20.35 kJ","+40.7 kJ","-40.7 kJ"], correct:3, exp:"الإجابة هي -40.7 kJ. المولارية = عدد مولات المذاب ÷ حجم المحلول باللتر (mol/L). تعتمد على حجم المحلول الكلي وليس حجم المذيب فقط."},
  {id:347, section:"ch4", q:"أي التغيرات التالية يُمثّل تفاعلاً طارداً للحرارة؟", options:["H₂O(l) → H₂O(s)","H₂O(l) → H₂O(g)","CH₃OH(l) → CH₃OH(g)","Ca(s) → Ca(l)"], correct:0, exp:"الإجابة الصحيحة هي H₂O(l) → H₂O(s). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:348, section:"ch4", q:"ما نوع التغير الحراري في المعادلة H₂O(g) → H₂O(l)؟", options:["تجمد","ماص للحرارة","تكثف","طارد للحرارة"], correct:2, exp:"نوع هذا هو تكثف. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:349, section:"ch4", q:"تتوقف حرارة التفاعل مع المواد المتفاعلة والمواد الناتجة منه، وليس على الخطوات أو المسار الذي يتم فيه التفاعل يُمثل هذا النص..", options:["القانون العام للغازات","قانون الغاز المثالي","قانون هس","قانون سرعة التفاعل"], correct:2, exp:"الإجابة الصحيحة هي قانون هس. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:350, section:"ch4", q:"في التفاعل البطيء جداً الذي يستحيل فيه حساب ΔH يُستعمل..", options:["قانون هس","قانون بويل","القانون العام للغازات","قانون شارل"], correct:0, exp:"الإجابة الصحيحة هي قانون هس. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:351, section:"ch4", q:"التغيُّر في المحتوى الحراري الذي يرافق تكوُّن مول واحد من المركب من عناصره في الظروف القياسية من عناصره في حالاتها القياسية..", options:["حرارة الاحتراق","قانون هس","حرارة الانصهار المولارية","حرارة التكوين القياسية"], correct:3, exp:"الإجابة الصحيحة هي حرارة التكوين القياسية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:352, section:"ch4", q:"حرارة التكوين للعنصر في حالته القياسية تساوي..", options:["0 kJ/mol","1 kJ/mol","2 kJ/mol","3 kJ/mol"], correct:0, exp:"الإجابة الصحيحة هي 0 kJ/mol. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:353, section:"ch4", q:"أي التالي حرارة التكوين القياسية له 21- ؟", options:["N₂","H₂","H₂S","O₂"], correct:2, exp:"الإجابة الصحيحة هي H₂S. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:354, section:"ch5", q:"«معدل التغيُّر في كميات المواد المتفاعلة أو الناتجة في وحدة الزمن»، هذا النص يعبّر عن..", options:["الاتزان الكيميائي","المادة المحفّزة","متوسط سرعة التفاعل","التعادل"], correct:2, exp:"الإجابة الصحيحة هي متوسط سرعة التفاعل. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:355, section:"ch5", q:"إذا كان تركيز الهيدروجين في بداية تفاعله مع الكلور يساوي 0.7 mol/L، ثم أصبح 0.3 mol/L بعد مرور 4 s؛ فما متوسط سرعة التفاعل؟", options:["0.1 mol/L·s","2 mol/L·s","8 mol/L·s","16 mol/L·s"], correct:0, exp:"الإجابة هي 0.1 mol/L·s. تتأثر سرعة التفاعل بعدة عوامل: طبيعة المتفاعلات، التركيز، درجة الحرارة، مساحة السطح، والعوامل المحفّزة. كل عامل يؤثر على عدد التصادمات الفعالة بين الجسيمات."},
  {id:356, section:"ch5", q:"أي التالي صحيح للتصادم المثمر في التفاعلات الكيميائية؟", options:["لا ينتج عنه تفاعل","يحدث للنواتج","من العوامل المحفّزة","من شروط بدء التفاعل"], correct:3, exp:"الإجابة الصحيحة هي من شروط بدء التفاعل. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:357, section:"ch5", q:"أي التالي لا يُمثل شرطاً لحدوث التفاعل وفقاً لنظرية التصادمات؟", options:["حدوث تصادمات بين الجزيئات المتفاعلة","التصادمات في الاتجاه الصحيح","ثبوت درجة الحرارة عند حدوث التصادمات","أن تكون طاقة التصادم كافية لتكوّن المعقد المنشط"], correct:2, exp:"الإجابة الصحيحة هي ثبوت درجة الحرارة عند حدوث التصادمات. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:358, section:"ch5", q:"المعقد المنشط..", options:["عامل محفّز","حالة غير مستقرة","حالة مستقرة","من النواتج"], correct:1, exp:"الإجابة هي حالة غير مستقرة. المعقد المنشط حالة وسطية غير مستقرة تتكون أثناء التفاعل عندما تتحول الروابط القديمة وتتكون الجديدة. عمره قصير جداً ولا يمكن عزله."},
  {id:359, section:"ch5", q:"الحد الأدنى من الطاقة اللازمة لإحداث التفاعل..", options:["طاقة التنشيط","نوع المادة","الاتجاه المناسب","مساحة السطح"], correct:0, exp:"الإجابة الصحيحة هي طاقة التنشيط. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:360, section:"ch5", q:"في التفاعل الطارد للحرارة طاقة الناتج ........ طاقة المتفاعلات.", options:["تساوي","أقل من","أكثر من","ضعف"], correct:1, exp:"الإجابة الصحيحة هي أقل من. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:361, section:"ch5", q:"الشكل يُمثّل تفاعلاً..", options:["متعادلاً","طارداً للحرارة","مساوياً في الطاقة","ماصاً للحرارة"], correct:1, exp:"الإجابة الصحيحة هي طارداً للحرارة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:362, section:"ch5", q:"في مخطط الطاقة، أي الرموز التالية يُمثّل طاقة تنشيط التفاعل؟", options:["1","2","3","4"], correct:2, exp:"الإجابة الصحيحة هي 3. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:363, section:"ch5", q:"الشكل يُمثّل تفاعلاً..", options:["متعادلاً","طارداً للحرارة","متساوياً للحرارة","ماصاً للحرارة"], correct:3, exp:"الإجابة الصحيحة هي ماصاً للحرارة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:364, section:"ch5", q:"الخارصين أسرع من النحاس عند التفاعل مع نترات الفضة بسبب..", options:["طبيعة المتفاعلات","درجة الحرارة","التركيز","مساحة السطح"], correct:0, exp:"الإجابة الصحيحة هي طبيعة المتفاعلات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:365, section:"ch5", q:"تعمل زيادة مساحة سطح التفاعل على..", options:["تقليل سرعة التفاعل","زيادة سرعة التفاعل","لا تؤثر على سرعة التفاعل","تثبيت سرعة التفاعل"], correct:1, exp:"الإجابة الصحيحة هي زيادة سرعة التفاعل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:366, section:"ch5", q:"تصدّأ برادة الحديد بشكل أسرع من قضيب الحديد عندما تتفاعل مع الأكسجين، لأنه يعتمد على..", options:["مساحة السطح","درجة الحرارة","الضغط","المواد المحفزة"], correct:0, exp:"الإجابة الصحيحة هي مساحة السطح. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:367, section:"ch5", q:"في الشكل، كلما زادت درجة حرارة التفاعل زاد..", options:["حجم التفاعل","ضغط التفاعل","المادة المحفّزة للتفاعل","عدد التصادمات بين الجسيمات"], correct:3, exp:"الإجابة الصحيحة هي عدد التصادمات بين الجسيمات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:368, section:"ch5", q:"في الشكل، أي الإنزيمات التالية يُعد أكثرها فعالية؟", options:["1","2","3","4"], correct:2, exp:"الإجابة الصحيحة هي 3. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:369, section:"ch5", q:"الجدول يوضح مادة غذائية وُضعت في أربعة أنابيب في كل منها إنزيم هاضم بكميات غير متساوية، أي هذه الأنابيب يُعد الأسرع في التفاعل؟", options:["1","2","3","4"], correct:3, exp:"الإجابة الصحيحة هي 4. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:370, section:"ch5", q:"أي العوامل التالية لا يؤثر في سرعة التفاعل؟", options:["طبيعة المواد المتفاعلة","طبيعة المواد الناتجة","درجة الحرارة","التركيز"], correct:1, exp:"الإجابة هي طبيعة المواد الناتجة. تتأثر سرعة التفاعل بعدة عوامل: طبيعة المتفاعلات، التركيز، درجة الحرارة، مساحة السطح، والعوامل المحفّزة. كل عامل يؤثر على عدد التصادمات الفعالة بين الجسيمات."},
  {id:371, section:"ch5", q:"تُضاف المواد الحافظة في صناعة الأغذية لكي..", options:["تقلل طاقة التنشيط أثناء التفاعل","تزيد قيمة الطاقة الناتجة من احتراق الغذاء","تساعد على عملية أكسدة الغذاء","تعمل كمثبّط للتفاعل"], correct:3, exp:"الإجابة الصحيحة هي تعمل كمثبّط للتفاعل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:372, section:"ch5", q:"إذا كانت رتبة تفاعل للمادة A تساوي صفراً فإن تغيير تركيزها..", options:["يزيد سرعة التفاعل","يُنقص سرعة التفاعل","يوقف التفاعل","لا يؤثر على التفاعل"], correct:3, exp:"الإجابة هي لا يؤثر على التفاعل. رتبة التفاعل الكلية = مجموع أسس تراكيز المواد المتفاعلة في قانون السرعة. تُحدد تجريبياً ولا علاقة لها بمعاملات المعادلة الموزونة بالضرورة."},
  {id:373, section:"ch5", q:"سرعة التفاعل تتناسب ........ تركيز المتفاعلات.", options:["طردياً مع","عكسياً مع","طردياً مع مربع","عكسياً مع مربع"], correct:0, exp:"الإجابة هي طردياً مع. تتأثر سرعة التفاعل بعدة عوامل: طبيعة المتفاعلات، التركيز، درجة الحرارة، مساحة السطح، والعوامل المحفّزة. كل عامل يؤثر على عدد التصادمات الفعالة بين الجسيمات."},
  {id:374, section:"ch5", q:"أي التالي ليس من وحدات قياس ثابت سرعة التفاعل؟", options:["L/mol·s","L/mol","s⁻¹","L²/mol²·s"], correct:1, exp:"الإجابة الصحيحة هي L/mol. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:375, section:"ch5", q:"قانون سرعة التفاعل في المعادلة 2NO(g) + O₂(g) → 2NO₂(g)..", options:["R = k[NO]²[O₂]","R = k[NO][O₂]²","R = k[NO]²[O₂]²","R = k[NO][O₂]³"], correct:0, exp:"الإجابة هي R = k[NO]²[O₂]. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:376, section:"ch5", q:"رتبة التفاعل الكلية لتفاعل قانون السرعة R = k[A]²[B]²..", options:["2","3","4","5"], correct:2, exp:"الإجابة هي 4. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:377, section:"ch5", q:"قانون السرعة العام لتفاعل ما R = k[A][B]، ما رتبة هذا التفاعل؟", options:["الأولى","الثانية","الثالثة","الرابعة"], correct:1, exp:"الإجابة هي الثانية. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:378, section:"ch5", q:"من خلال قانون سرعة التفاعل R = k[H₂][NO]² يُصنّف التفاعل من الرتبة..", options:["الأولى","الثانية","الثالثة","الرابعة"], correct:2, exp:"الإجابة هي الثالثة. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:379, section:"ch5", q:"في تفاعل ما إذا كان قانون سرعته R = k[A]^m[B]², والتفاعل من الرتبة الثالثة، فما قيمة m؟", options:["1","2","3","4"], correct:0, exp:"الإجابة الصحيحة هي 1. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:380, section:"ch5", q:"سرعة التفاعل الابتدائية تكون لحظة..", options:["منتصف التفاعل","إضافة المتفاعلات","إضافة العامل المحفّز","الحصول على النواتج"], correct:1, exp:"الإجابة هي إضافة المتفاعلات. تتأثر سرعة التفاعل بعدة عوامل: طبيعة المتفاعلات، التركيز، درجة الحرارة، مساحة السطح، والعوامل المحفّزة. كل عامل يؤثر على عدد التصادمات الفعالة بين الجسيمات."},
  {id:381, section:"ch5", q:"تفاعل يحدث في الاتجاهين الأمامي والعكسي..", options:["التفاعل المكتمل","التفاعل العكسي","التفاعل غير النشط","التفاعل غير المتّزن"], correct:1, exp:"الإجابة الصحيحة هي التفاعل العكسي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:382, section:"ch5", q:"حالة النظام عندما تتساوى سرعتا التفاعل الأمامي والعكسي..", options:["الاتزان الكيميائي","سرعة التفاعل الكيميائي","المعقد النشط","التفاعل غير المتّزن"], correct:0, exp:"الإجابة الصحيحة هي الاتزان الكيميائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:383, section:"ch5", q:"إذا وصل تفاعل ما إلى حالة اتزان، فإن..", options:["حركة الجزيئات الناتجة تبقى كما هي","حركة الجزيئات المتفاعلة تبقى كما هي","سرعتا التفاعل الأمامي والعكسي مختلفتان","سرعتي التفاعل الأمامي والعكسي متساويتان"], correct:3, exp:"الإجابة الصحيحة هي سرعتي التفاعل الأمامي والعكسي متساويتان. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:384, section:"ch5", q:"أي التالي صحيح عند حالة الاتزان؟", options:["يُعد الاتزان حالة ساكنة","سرعة المتفاعلات والنواتج مختلفة","تحول المتفاعلات إلى نواتج","تراكيز المتفاعلات والنواتج ثابتة"], correct:3, exp:"الإجابة الصحيحة هي تراكيز المتفاعلات والنواتج ثابتة. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:385, section:"ch5", q:"كتابة معادلة التفاعل بسهم مزدوج تعني أن التفاعل وصل إلى..", options:["المعقد النشط","طاقة التنشيط","الاتزان الكيميائي","نهاية التفاعل"], correct:2, exp:"الإجابة الصحيحة هي الاتزان الكيميائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:386, section:"ch5", q:"إذا كان تركيز المتفاعلات أكبر من تركيز النواتج عند الاتزان؛ فإن..", options:["Keq = 0","Keq = 1","Keq < 1","Keq > 1"], correct:2, exp:"الإجابة هي Keq < 1. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:387, section:"ch5", q:"إذا كان تركيز المواد الناتجة أكبر من تركيز المواد المتفاعلة عند الاتزان؛ فإن..", options:["Keq = 0","Keq = 1","Keq < 1","Keq > 1"], correct:3, exp:"الإجابة هي Keq > 1. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:388, section:"ch5", q:"في التفاعل 2H₂S(g) ⇌ 2H₂(g) + S₂(g)، إذا كانت قيمة Keq عند الاتزان ذات قيمة كبيرة؛ فإن..", options:["التفاعل لا يمكن حدوثه","تراكيز المواد الناتجة أكبر","تراكيز المواد المتفاعلة أكبر","التفاعل بطيء جداً"], correct:1, exp:"الإجابة هي تراكيز المواد الناتجة أكبر. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:389, section:"ch5", q:"ما قانون الاتزان للتفاعل 2H₂O₂(g) ⇌ 2H₂O(g) + O₂(g)؟", options:["Keq = [O₂]","Keq = [H₂O]²[O₂]","Keq = [H₂O]²[O₂]/[H₂O₂]²","Keq = [O₂]/[H₂O₂]²"], correct:2, exp:"الإجابة هي Keq = [H₂O]²[O₂]/[H₂O₂]². هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:390, section:"ch5", q:"ما قيمة ثابت الاتزان للتفاعل I₂(g) + H₂(g) ⇌ 2HI(g)؟ علماً أن تركيز [I₂]=4 M، [H₂]=5 M، [HI]=10 M.", options:["5","6","7","8"], correct:0, exp:"الإجابة الصحيحة هي 5. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:391, section:"ch5", q:"إذا كانت المتفاعلات والنواتج حالاتها الفيزيائية مختلفة؛ فإن التفاعل..", options:["في حالة اتزان متجانس","في حالة اتزان غير متجانس","في حالة توقف","مكتمل"], correct:1, exp:"الإجابة الصحيحة هي في حالة اتزان غير متجانس. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:392, section:"ch5", q:"تعبير ثابت الاتزان للمعادلة التالية 2H₂O₂(l) ⇌ 2H₂O(g) + O₂(g)..", options:["Keq = [H₂O]²[O₂]/[H₂O₂]²","Keq = [H₂O]²[O₂]","Keq = [H₂O₂]²","Keq = 1/[H₂O₂]"], correct:1, exp:"الإجابة هي Keq = [H₂O]²[O₂]. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:393, section:"ch5", q:"ما ثابت الاتزان Keq للتفاعل التالي: Zn(s) + 2Ag⁺(aq) ⇌ Zn²⁺(aq) + 2Ag(s)؟", options:["Keq = [Ag⁺]²/[Zn²⁺]","Keq = [Ag⁺]²","Keq = [Zn²⁺]/[Ag⁺]²","Keq = [Zn²⁺][Ag⁺]²"], correct:2, exp:"الإجابة هي Keq = [Zn²⁺]/[Ag⁺]². وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:394, section:"ch5", q:"أي التالي ليس من خواص الاتزان؟", options:["تظل درجة الحرارة ثابتة","التفاعل يتم في نظام مغلق","يزيد حجم التفاعل","المتفاعلات والنواتج في حالة اتزان"], correct:2, exp:"الإجابة الصحيحة هي يزيد حجم التفاعل. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:395, section:"ch5", q:"أي التالي يُعد من العوامل المؤثرة في الاتزان الكيميائي؟", options:["التغيّر في الحجم والضغط","التغيّر في التركيز","تغيّر درجة الحرارة","جميع ما سبق"], correct:3, exp:"الإجابة الصحيحة هي جميع ما سبق. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:396, section:"ch5", q:"إذا كان التفاعل CO(g) + H₂O(g) ⇌ CO₂(g) + H₂(g) في حالة اتزان كيميائي؛ فإن إضافة المزيد من CO(g) إلى خليط التفاعل يؤدي إلى..", options:["نقص سرعة التفاعل الأمامي","تكوين مزيد من المواد الناتجة","زيادة سرعة التفاعل العكسي","تكوين مزيد من المواد المتفاعلة"], correct:1, exp:"الإجابة الصحيحة هي تكوين مزيد من المواد الناتجة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:397, section:"ch5", q:"في التفاعل 2NO₂(g) ⇌ 2O₂(g) + N₂(g) عند زيادة تركيز N₂ مع كمية كافية من الأكسجين فإن التفاعل..", options:["لا يتأثر","ينشط باتجاه تكوين N₂","ينشط باتجاه تكوين O₂","ينشط باتجاه تكوين NO₂"], correct:3, exp:"الإجابة الصحيحة هي ينشط باتجاه تكوين NO₂. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:398, section:"ch5", q:"في التفاعل N₂(g) + 3H₂(g) ⇌ 2NH₃(g) عند زيادة تركيز غاز النيتروجين N₂ فإن الاتزان..", options:["يُزاح نحو المتفاعلات","يُزاح نحو النواتج","يتوقف التفاعل","لا يتأثر"], correct:1, exp:"الإجابة هي يُزاح نحو النواتج. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:399, section:"ch5", q:"إذا زاد الضغط في تفاعل متزن فإنه يُزاح نحو..", options:["عدد المولات الأكبر","عدد المولات الأقل","التركيز الأكبر","لا يتأثر التفاعل"], correct:1, exp:"الإجابة الصحيحة هي عدد المولات الأقل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:400, section:"ch5", q:"في التفاعل CH₄(g) + H₂O(g) ⇌ CO(g) + 3H₂(g)، إذا زاد الضغط فإن الاتزان..", options:["لا يتأثر","يُزاح نحو عدد المولات الأقل","يُزاح نحو المتفاعلات","يُزاح نحو عدد المولات الأكثر"], correct:2, exp:"الإجابة هي يُزاح نحو المتفاعلات. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:401, section:"ch5", q:"في التفاعل 2HCl(g) ⇌ H₂(g) + Cl₂(g) إذا زاد الضغط فإن الاتزان..", options:["لا يتأثر","يُزاح نحو المتفاعلات","يُزاح نحو النواتج","يُزاح نحو عدد المولات الأكثر"], correct:0, exp:"الإجابة هي لا يتأثر. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:402, section:"ch5", q:"لإزاحة الاتزان نحو اليسار في التفاعل A + B ⇌ C + D + Heat، فإننا نقوم بـ..", options:["إضافة حرارة","سحب حرارة","زيادة أحد المتفاعلات","إزالة أحد النواتج"], correct:0, exp:"الإجابة هي إضافة حرارة. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:403, section:"ch5", q:"في التفاعل PCl₃(g) + Cl₂(g) + Heat ⇌ PCl₅(g) سحب الحرارة يغير من حالة الاتزان نحو..", options:["اليسار فتزيد النواتج","اليمين فتزيد النواتج","اليسار فتزيد المتفاعلات","اليمين فيتوقف التفاعل"], correct:1, exp:"الإجابة هي اليمين فتزيد النواتج. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:404, section:"ch5", q:"سحب الحرارة من تفاعل متزن طارد للحرارة يُغير حالة الاتزان نحو..", options:["اليسار فتزيد النواتج","اليمين فتزيد النواتج","اليسار فتزيد المتفاعلات","اليمين فيتوقف التفاعل"], correct:1, exp:"الإجابة هي اليمين فتزيد النواتج. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:405, section:"ch5", q:"في التفاعل حرارة + CO(g) + 3H₂(g) ⇌ CH₄(g) + H₂O(g)، سحب الحرارة يغير من حالة الاتزان نحو..", options:["اليسار فتزيد النواتج","اليمين فتزيد النواتج","اليسار فتزيد المتفاعلات","اليمين فيتوقف التفاعل"], correct:2, exp:"الإجابة هي اليسار فتزيد المتفاعلات. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:406, section:"ch5", q:"في المعادلة CH₄(g) + 2O₂(g) ⇌ 2CO₂(g) + 2H₂O(g) + Δ، عند رفع درجة حرارة التفاعل فإن ذلك يؤدي إلى..", options:["نقص كمية CH₄","نقص كمية O₂","زيادة كمية CO₂","نقص كمية H₂O"], correct:3, exp:"الإجابة الصحيحة هي نقص كمية H₂O. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:407, section:"ch5", q:"في التفاعل CO(g) + H₂(g) + Heat ⇌ CH₃OH(g)، أي التغيرات التالية تُزيح الاتزان نحو تكوين المزيد من الميثانول CH₃OH؟", options:["زيادة درجة الحرارة","زيادة حجم وعاء التفاعل","إضافة CO","إضافة عامل محفّز"], correct:2, exp:"الإجابة هي إضافة CO. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:408, section:"ch5", q:"عند نقص درجة الحرارة لتفاعل ماص للحرارة موجود في حالة اتزان..", options:["يتجه التفاعل نحو اليمين","يزيد تركيز المتفاعلات","يزيد تركيز النواتج","لا يتأثر ثابت الاتزان"], correct:1, exp:"الإجابة الصحيحة هي يزيد تركيز المتفاعلات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:409, section:"ch5", q:"ما أثر زيادة الحرارة للتفاعل المتزن 2NO₂(g) ⇌ N₂O₄(g) + 55.3 kJ؟", options:["زيادة كمية NO₂","نقص كمية NO₂","زيادة كمية N₂O₄","توقف التفاعل"], correct:0, exp:"الإجابة الصحيحة هي زيادة كمية NO₂. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:410, section:"ch5", q:"العامل الوحيد الذي يُغيّر من قيمة ثابت الاتزان..", options:["الضغط والحجم","التركيز","درجة الحرارة","العامل المحفّز"], correct:2, exp:"الإجابة هي درجة الحرارة. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:411, section:"ch5", q:"ماذا يحدث لثابت الاتزان عند رفع درجة الحرارة للتفاعل الماص للحرارة؟", options:["يقل","يزيد","يثبت","لا يتغير"], correct:1, exp:"الإجابة هي يزيد. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:412, section:"ch5", q:"لدينا تفاعل ماص للحرارة في حالة اتزان أي العوامل التالية تزيد من قيمة ثابت الاتزان حسب مبدأ لوتشاتلييه؟", options:["العامل المحفّز","نقص درجة الحرارة","إضافة النواتج","زيادة درجة الحرارة"], correct:3, exp:"الإجابة هي زيادة درجة الحرارة. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:413, section:"ch5", q:"العلاقة بين ثابت الاتزان ودرجة الحرارة في التفاعل الماص للحرارة..", options:["ثابتة","تربيعية عكسية","عكسية","طردية"], correct:3, exp:"الإجابة هي طردية. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:414, section:"ch5", q:"أي التالي لا يؤثر في حالة الاتزان؟", options:["زيادة درجة الحرارة","نقص الحجم","العامل المحفّز","زيادة الضغط"], correct:2, exp:"الإجابة الصحيحة هي العامل المحفّز. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:415, section:"ch5", q:"وفقاً للمعادلة CaCO₃(s) ⇌ CaO(s) + CO₂(g)، أي العوامل التالية لا يؤثر على حالة الاتزان لانحلال كربونات الكالسيوم حرارياً؟", options:["تغير تركيز CO₂","إضافة عامل محفّز","رفع درجة الحرارة","إنقاص حجم الوعاء"], correct:1, exp:"الإجابة هي إضافة عامل محفّز. وفقاً لمبدأ لوتشاتلييه: عند الإخلال بنظام في حالة اتزان فإنه يتجه لمقاومة التغيير والعودة لحالة اتزان جديدة. يجب تحليل تأثير التغيير على كل طرف من المعادلة."},
  {id:416, section:"ch5", q:"إذا كان Ksp < Qsp فإن المحلول..", options:["غير مشبع ولا يتكوّن راسب","غير مشبع ويتكوّن راسب","مشبع ويتكوّن راسب","مشبع ولا يتكوّن راسب"], correct:2, exp:"الإجابة هي مشبع ويتكوّن راسب. ثابت الاتزان Keq = حاصل ضرب تراكيز النواتج ÷ حاصل ضرب تراكيز المتفاعلات (كل منها مرفوع لأس معامله). المواد الصلبة والسائلة النقية لا تُدخل في التعبير."},
  {id:417, section:"ch5", q:"في أي الحالات التالية يتكوّن راسب؟", options:["Qsp = Ksp","Qsp ≈ Ksp","Qsp > Ksp","Qsp < Ksp"], correct:2, exp:"الإجابة الصحيحة هي Qsp > Ksp. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:418, section:"ch5", q:"ماذا يحدث لذائبية مادة عند وجود أيونات مشتركة؟", options:["تقل","تزداد","تثبت","لا تتأثر"], correct:0, exp:"الإجابة الصحيحة هي تقل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:419, section:"ch6", q:"من خواص المخلوط..", options:["لا تفقد مكوناته خواصها","ينتج عن تفاعل كيميائي","تكوّن مواده بنسب ثابتة","تُفصل مكوناته بطرق كيميائية"], correct:0, exp:"الإجابة هي لا تفقد مكوناته خواصها. المخلوط المتجانس مكوناته موزعة بانتظام ولا يمكن تمييزها. المخلوط غير المتجانس (المعلق والغروي) يمكن رؤية مكوناته أو فصلها بالترشيح."},
  {id:420, section:"ch6", q:"من خواص المخاليط المتجانسة..", options:["تنفصل مكوناتها مع مرور الوقت","مكوناتها مختلطة بانتظام ولا يمكن التمييز بينها","تحدث فيها ظاهرة تندال","تحدث فيها ظاهرة الحركة البراونية"], correct:1, exp:"الإجابة الصحيحة هي مكوناتها مختلطة بانتظام ولا يمكن التمييز بينها. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:421, section:"ch6", q:"السكر الذائب في الماء يُعد..", options:["مخلوطاً غير متجانس","مخلوطاً متجانساً","غروياً","معلقاً"], correct:1, exp:"الإجابة الصحيحة هي مخلوطاً متجانساً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:422, section:"ch6", q:"مواد غير موزعة بانتظام ولا تمتزج مكوناتها تماماً..", options:["مخلوط متجانس","مخلوط غير متجانس","محلول","سبيكة"], correct:1, exp:"الإجابة الصحيحة هي مخلوط غير متجانس. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:423, section:"ch6", q:"مخلوط الماء والطباشير يُعد..", options:["مخلوطاً متجانساً","مخلوطاً معلقاً","مخلوطاً غروياً","مركباً"], correct:1, exp:"الإجابة الصحيحة هي مخلوطاً معلقاً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:424, section:"ch6", q:"من أمثلة المخلوط المعلق..", options:["الدم","محلول السكر","الماء مع الرمل","المشروب الغازي"], correct:2, exp:"الإجابة الصحيحة هي الماء مع الرمل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:425, section:"ch6", q:"أي التالي يُعد من المخاليط غير المتجانسة؟", options:["الهواء الجوي","دم الإنسان","العملة النقدية","محلول سكر وماء"], correct:1, exp:"الإجابة الصحيحة هي دم الإنسان. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:426, section:"ch6", q:"أي التالي يُعد مخلوطاً غير متجانس؟", options:["الحليب","السكر الذائب في الماء","الملح المذاب في الماء","الهواء"], correct:0, exp:"الإجابة الصحيحة هي الحليب. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:427, section:"ch6", q:"الطريقة المناسبة لفصل مكونات مخلوط غير متجانس مكوّن من مادة صلبة وسائل..", options:["الترشيح","التقطير","التبلور","التسامي"], correct:0, exp:"الإجابة هي الترشيح. المخلوط المتجانس مكوناته موزعة بانتظام ولا يمكن تمييزها. المخلوط غير المتجانس (المعلق والغروي) يمكن رؤية مكوناته أو فصلها بالترشيح."},
  {id:428, section:"ch6", q:"طريقة لفصل مكونات الحبر المختلفة..", options:["الترشيح","التبلور","الكروماتوجرافيا","التقطير"], correct:2, exp:"الإجابة الصحيحة هي الكروماتوجرافيا. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:429, section:"ch6", q:"طريقة لفصل المواد اعتماداً على الاختلاف في درجات غليانها..", options:["الترشيح","التقطير","التبلور","التسامي"], correct:1, exp:"الإجابة الصحيحة هي التقطير. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:430, section:"ch6", q:"عملية تتبخر فيها المادة الصلبة دون أن تنصهر، وتُستخدم في فصل المخلوط..", options:["التسامي","التقطير","التبلور","الترشيح"], correct:0, exp:"الإجابة الصحيحة هي التسامي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:431, section:"ch6", q:"حركة عشوائية وعنيفة للجسيمات المنتشرة في المخاليط الغروية السائلة..", options:["الحركة الدورانية","الحركة الغرويّة","الحركة البراونية","الحركة الاهتزازية"], correct:2, exp:"الإجابة هي الحركة البراونية. الحركة البراونية هي حركة عشوائية للجسيمات المنتشرة في المخاليط الغروية بسبب اصطدام جزيئات المذيب بها. اكتشفها روبرت براون وهي تمنع ترسب الجسيمات."},
  {id:432, section:"ch6", q:"تعمل الحركة البراونية في المخلوط على منع جسيمات المذاب من..", options:["الترابط","التأين","الترسب","الذوبان"], correct:2, exp:"الإجابة هي الترسب. الحركة البراونية هي حركة عشوائية للجسيمات المنتشرة في المخاليط الغروية بسبب اصطدام جزيئات المذيب بها. اكتشفها روبرت براون وهي تمنع ترسب الجسيمات."},
  {id:433, section:"ch6", q:"أي التالي يُمثّل عملية تشتيت الضوء بفعل الجسيمات المنتشرة في المخلوط الغروي والمعلّق؟", options:["الحركة البراونية","تأثير تندال","المخلوط المتجانس","الذائبية"], correct:1, exp:"الإجابة الصحيحة هي تأثير تندال. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:434, section:"ch6", q:"المزيج المتجانس من مادتين نقيتين أو أكثر..", options:["المذاب","المذيب","المحلول","المركب"], correct:2, exp:"الإجابة الصحيحة هي المحلول. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:435, section:"ch6", q:"يُعد الهواء الجوي من أنواع المحاليل التي فيها المذاب والمذيب..", options:["سائل - غاز","غاز - سائل","سائل - سائل","غاز - غاز"], correct:3, exp:"الإجابة الصحيحة هي غاز - غاز. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:436, section:"ch6", q:"إضافة غاز النشادر إلى الماء يُعد محلولاً..", options:["غاز - سائل","سائل - صلب","صلب - صلب","غاز - غاز"], correct:0, exp:"الإجابة الصحيحة هي غاز - سائل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:437, section:"ch6", q:"يحوي محلول حمض الكبريتيك المخفف مذاباً ومذيباً من نوع..", options:["صلب - سائل","غاز - سائل","سائل - سائل","غاز - غاز"], correct:2, exp:"الإجابة الصحيحة هي سائل - سائل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:438, section:"ch6", q:"يُعد ماء البحر من أنواع المحاليل التي فيها المذيب والمذاب..", options:["غاز - غاز","سائل - سائل","سائل - غاز","سائل - صلب"], correct:3, exp:"الإجابة الصحيحة هي سائل - صلب. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:439, section:"ch6", q:"سبيكة الفولاذ تُعد..", options:["مخلوطاً متجانساً","مخلوطاً غروياً","مخلوطاً غير متجانس","مخلوطاً معلّقاً"], correct:0, exp:"الإجابة الصحيحة هي مخلوطاً متجانساً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:440, section:"ch6", q:"يُعبّر عن النسبة بين كمية المذاب في كمية من المذيب أو المحلول بـ..", options:["الكثافة","الحجم","التركيز","الكتلة"], correct:2, exp:"الإجابة الصحيحة هي التركيز. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:441, section:"ch6", q:"ما النسبة المئوية بالكتلة لمحلول يحوي 5 g من مادة مذابة في 50 g ماء؟", options:["5%","9%","10%","12%"], correct:1, exp:"الإجابة الصحيحة هي 9%. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:442, section:"ch6", q:"ما تركيز محلول يحوي 9 mL من الإيثانول في 50 mL من المحلول؟", options:["9%","18%","25%","36%"], correct:1, exp:"الإجابة الصحيحة هي 18%. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:443, section:"ch6", q:"لتحضير 1000 mL من محلول حمض HCl المالي تركيزه 5% بالحجم فإنه يلزم..", options:["إضافة 50 mL من HCl إلى 950 mL من الماء","إضافة 950 mL من HCl إلى 5 mL من الماء","إضافة 5 mL من HCl إلى 950 mL من الماء","إضافة 5 mL من HCl إلى 1000 mL من الماء"], correct:0, exp:"الإجابة الصحيحة هي إضافة 50 mL من HCl إلى 950 mL من الماء. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:444, section:"ch6", q:"عدد مولات المذاب في 1000 mL من المحلول هي..", options:["المولالية","المولارية","النسبة المئوية الحجمية","النسبة المئوية الوزنية"], correct:1, exp:"الإجابة هي المولارية. المولارية = عدد مولات المذاب ÷ حجم المحلول باللتر (mol/L). تعتمد على حجم المحلول الكلي وليس حجم المذيب فقط."},
  {id:445, section:"ch6", q:"تعتمد المولارية على..", options:["كتلة المذاب","حجم المذاب","حجم المحلول","كتلة المحلول"], correct:2, exp:"الإجابة هي حجم المحلول. المولارية = عدد مولات المذاب ÷ حجم المحلول باللتر (mol/L). تعتمد على حجم المحلول الكلي وليس حجم المذيب فقط."},
  {id:446, section:"ch6", q:"أي الوحدات التالية صحيح للتعبير عن المولارية؟", options:["مول/ملي لتر","ملي لتر/مول","لتر/مول","مول/لتر"], correct:3, exp:"الإجابة هي مول/لتر. المولارية = عدد مولات المذاب ÷ حجم المحلول باللتر (mol/L). تعتمد على حجم المحلول الكلي وليس حجم المذيب فقط."},
  {id:447, section:"ch6", q:"ما مولارية حمض هيدروكلوريك عدد مولاته 0.5 mol وحجمه 10 L؟", options:["0.005 M","0.05 M","0.5 M","5 M"], correct:1, exp:"الإجابة هي 0.05 M. المولارية = عدد مولات المذاب ÷ حجم المحلول باللتر (mol/L). تعتمد على حجم المحلول الكلي وليس حجم المذيب فقط."},
  {id:448, section:"ch6", q:"عند إذابة 52 g من LiF في كمية من الماء لتكوّن محلول حجمه 2 L، فما مولارية هذا المحلول؟ علماً أن الكتلة الذرية Li=7, F=19.", options:["1 M","2 M","13 M","26 M"], correct:0, exp:"الإجابة الصحيحة هي 1 M. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:449, section:"ch6", q:"محلول حجمه 100 mL وعدد مولات المذاب فيه 2 mol، كم تبلغ مولارية هذا المحلول؟", options:["0.1 mol/L","0.2 mol/L","2 mol/L","20 mol/L"], correct:3, exp:"الإجابة الصحيحة هي 20 mol/L. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:450, section:"ch6", q:"ما عدد مولات حمض الكلور في 250 mL من محلول تركيزه 5 M؟", options:["0.25 mol","1.25 mol","2 mol","2.5 mol"], correct:1, exp:"الإجابة الصحيحة هي 1.25 mol. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:451, section:"ch6", q:"ما حجم محلول قياسي KI تركيزه 2 M، واللازم لتحضير محلول مخفف منه تركيزه 1 M وحجمه 0.2 L؟", options:["100 mL","200 mL","300 mL","400 mL"], correct:0, exp:"الإجابة الصحيحة هي 100 mL. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:452, section:"ch6", q:"محلول قياسي من H₂SO₄ تركيزه 2 M، وحجمه 0.5 L، لخفّف ليصبح حجم 1 L، ما كتلة H₂SO₄؟ علماً أن H=1, O=16, S=32.", options:["24.5 g","49 g","98 g","196 g"], correct:2, exp:"الإجابة الصحيحة هي 98 g. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:453, section:"ch6", q:"ما حجم الماء اللازم إضافته إلى 6 mL من محلول قياسي تركيزه 0.05 M ليصبح تركيز المحلول 0.02 M؟", options:["15 mL","9 mL","6 mL","2.4 mL"], correct:1, exp:"الإجابة الصحيحة هي 9 mL. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:454, section:"ch6", q:"عدد مولات المذاب في 1 kg من المذيب..", options:["المولارية","المولالية","الكسر المولي","النسبة المئوية بدلالة الكتلة"], correct:1, exp:"الإجابة هي المولالية. المولالية = عدد مولات المذاب ÷ كتلة المذيب بالكيلوجرام (mol/kg). تختلف عن المولارية في أنها تعتمد على كتلة المذيب وليس حجم المحلول."},
  {id:455, section:"ch6", q:"تُعرف المولالية بأنها عدد مولات المذاب في ..", options:["100 g من المذيب","100 g من المحلول","1000 g من المذيب","1000 g من المحلول"], correct:2, exp:"التعريف الصحيح يشير إلى 1000 g من المذيب. هذا المفهوم أساسي في الكيمياء ويجب حفظه وفهمه جيداً لأنه يُبنى عليه مفاهيم أخرى متقدمة."},
  {id:456, section:"ch6", q:"إذا أذبنا 0.5 mol من ملح في 500 g ماء فإنّ مولالية المحلول تساوي..", options:["1","1.5","2","3"], correct:0, exp:"الإجابة هي 1. المولالية = عدد مولات المذاب ÷ كتلة المذيب بالكيلوجرام (mol/kg). تختلف عن المولارية في أنها تعتمد على كتلة المذيب وليس حجم المحلول."},
  {id:457, section:"ch6", q:"ما قيمة مولالية محلول يحوي 20 g من المذاب في 2 kg من المذيب؟ علماً أن الكتلة المولية للمذاب 100 g/mol.", options:["0.01","0.1","0.21","0.3"], correct:1, exp:"الإجابة الصحيحة هي 0.1. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:458, section:"ch6", q:"أي التالي يُعبّر عن المولالية؟", options:["mol/1000 g","mol/1000 L","mol/100 L","mol/100 g"], correct:0, exp:"الإجابة الصحيحة هي mol/1000 g. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:459, section:"ch6", q:"تُسمى عملية إحاطة جزيئات المذاب بالمذيب..", options:["التأيّن","التفكك","الذوبان","التفاعل"], correct:2, exp:"الإجابة الصحيحة هي الذوبان. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:460, section:"ch6", q:"أي التالي لا يُعد من طرق زيادة سرعة الذوبان؟", options:["تحريك المحلول","عدم ملامسة المذاب للمذيب","زيادة مساحة سطح المذاب","رفع درجة حرارة المذيب"], correct:1, exp:"الإجابة الصحيحة هي عدم ملامسة المذاب للمذيب. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:461, section:"ch6", q:"الشكل يوضح العلاقة بين الذائبية ودرجة الحرارة، فإن أكثر المواد ذائبية عند ارتفاع درجة الحرارة..", options:["E","F","G","H"], correct:2, exp:"الإجابة الصحيحة هي G. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:462, section:"ch6", q:"ينص قانون هنري على أن ........ تتناسب طردياً مع ........ فوق السائل عند ثبوت درجة الحرارة.", options:["الضغط - الحجم","ذائبية الغاز - ضغط الغاز","درجة الحرارة - الضغط","حجم الوعاء - قياس المائع"], correct:1, exp:"الإجابة هي ذائبية الغاز - ضغط الغاز. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:463, section:"ch6", q:"أي العوامل التالية يزيد من ذائبية الغاز في سائل؟", options:["رفع درجة الحرارة فقط","زيادة ضغط الغاز فقط","زيادة ضغط الغاز ورفع درجة الحرارة","خفض ضغط الغاز ورفع درجة الحرارة"], correct:1, exp:"الإجابة الصحيحة هي زيادة ضغط الغاز فقط. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:464, section:"ch6", q:"ذائبية غاز 20 g/L عند ضغط 40 Pa، ما قيمة الضغط التي تصبح عندها ذائبية الغاز 10 g/L؟", options:["20 Pa","200 Pa","400 Pa","800 Pa"], correct:0, exp:"الإجابة الصحيحة هي 20 Pa. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:465, section:"ch6", q:"ذائبية غاز في سائل تزيد بـ..", options:["نقصان الضغط","زيادة التحريك","نقصان درجة الحرارة","زيادة الحجم"], correct:2, exp:"الإجابة الصحيحة هي نقصان درجة الحرارة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:466, section:"ch6", q:"تسمع صوتاً قوياً عند فتح علبة مشروب غازي تصاعد غاز..", options:["CO₂(g)","H₂O(g)","O₂(g)","H₂(g)"], correct:0, exp:"الإجابة الصحيحة هي CO₂(g). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:467, section:"ch6", q:"أي التالي ليس من الخواص الجامعة للمحاليل؟", options:["الضغط الأسموزي","الانخفاض في الضغط البخاري","الضغط الجوي","الانخفاض في درجة التجمد"], correct:2, exp:"الإجابة الصحيحة هي الضغط الجوي. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:468, section:"ch6", q:"أي التالي ليس من الخواص الجامعة للمحاليل؟", options:["الارتفاع في درجة الغليان","الكثافة","الانخفاض في درجة التجمد","الضغط الأسموزي"], correct:1, exp:"الإجابة الصحيحة هي الكثافة. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:469, section:"ch6", q:"الضغط البخاري ........ عدد جسيمات المذاب في المذيب.", options:["يزيد بزيادة","لا يتأثر بتغيّر","ينقص بزيادة","ينقص بنقصان"], correct:2, exp:"الإجابة هي ينقص بزيادة. الضغط البخاري ينخفض عند إضافة مذاب غير متطاير لأن جسيمات المذاب تحتل جزءاً من سطح السائل وتقلل عدد جزيئات المذيب المتبخرة."},
  {id:470, section:"ch6", q:"الفرق بين درجة حرارة غليان المحلول ودرجة غليان المذيب النقي..", options:["الانخفاض في درجة الغليان","الارتفاع في درجة الغليان","الانخفاض في درجة التجمد","درجة غليان المذاب"], correct:1, exp:"الإجابة الصحيحة هي الارتفاع في درجة الغليان. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:471, section:"ch6", q:"عندما يعادل السائل ضغط الغاز المحيط به يحدث..", options:["ذوبان","انصهار","انخفاض في درجة التجمد","غليان"], correct:3, exp:"الإجابة الصحيحة هي غليان. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:472, section:"ch6", q:"سبب ارتفاع درجة غليان المحلول عن درجة غليان الماء النقي..", options:["ارتفاع الضغط البخاري لجسيمات المذاب","ارتفاع الضغط البخاري لجسيمات المذيب","انخفاض الضغط البخاري لجسيمات المذاب","انخفاض الضغط البخاري لجسيمات المذيب"], correct:3, exp:"الإجابة الصحيحة هي انخفاض الضغط البخاري لجسيمات المذيب. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:473, section:"ch6", q:"يعتمد ثابت الارتفاع في درجة الغليان على..", options:["طبيعة المذيب","طبيعة المذاب","مولارية المحلول","مولالية المحلول"], correct:0, exp:"الإجابة هي طبيعة المذيب. درجة الغليان تعتمد على قوة الروابط بين الجزيئية: الروابط الهيدروجينية أقوى من ثنائية القطبية وأقوى من قوى التشتت. كلما زادت الكتلة المولية وزادت القطبية ارتفعت درجة الغليان."},
  {id:474, section:"ch6", q:"عند الصعود إلى أعلى قمة جبل مرتفع فإن درجة غليان الماء..", options:["تقل كلما ارتفعنا إلى أعلى، ينخفض الضغط الجوي","تزيد","تتضاعف","لا تتأثر"], correct:0, exp:"الإجابة الصحيحة هي تقل كلما ارتفعنا إلى أعلى، ينخفض الضغط الجوي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:475, section:"ch6", q:"إضافة الملح إلى الجليد على الطرق في فصل الشتاء تؤدي إلى..", options:["رفع درجة تجمد الجليد فتزيد صلابة الطريق","خفض درجة حرارة الجليد فيزيد صلابة","رفع درجة حرارة الجليد فينصهر","خفض درجة التجمد للجليد فينصهر"], correct:3, exp:"الإجابة الصحيحة هي خفض درجة التجمد للجليد فينصهر. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:476, section:"ch6", q:"عند إضافة مادة غير متطايرة إلى سائل نقي فإن..", options:["درجة الغليان تنخفض ودرجة التجمد ترتفع","درجة الغليان ترتفع ودرجة التجمد تنخفض","درجة الغليان لا تتأثر","درجة الغليان ودرجة التجمد تنخفضان"], correct:1, exp:"الإجابة الصحيحة هي درجة الغليان ترتفع ودرجة التجمد تنخفض. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:477, section:"ch6", q:"إذابة مادة صلبة في محلول تؤدي إلى..", options:["انخفاض درجة الغليان","ارتفاع درجة الغليان","ارتفاع الضغط البخاري","ارتفاع درجة التجمد"], correct:1, exp:"الإجابة الصحيحة هي ارتفاع درجة الغليان. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:478, section:"ch6", q:"انتشار المذيب من المحلول الأقل تركيزاً إلى المحلول الأكثر تركيزاً..", options:["التخفيف","التركيز المولاري","الخاصية الأسموزية","الذائبية"], correct:2, exp:"الإجابة هي الخاصية الأسموزية. درجة الغليان تعتمد على قوة الروابط بين الجزيئية: الروابط الهيدروجينية أقوى من ثنائية القطبية وأقوى من قوى التشتت. كلما زادت الكتلة المولية وزادت القطبية ارتفعت درجة الغليان."},
  {id:479, section:"ch7", q:"من خواص المركبات القاعدية أنها..", options:["طعمها مر وملمسها صابوني","لا توصل الكهرباء","تغير لون ورقة تباع الشمس من الأزرق إلى الأحمر","تتفاعل مع الفلزات وينتج غاز الهيدروجين"], correct:0, exp:"الإجابة الصحيحة هي طعمها مر وملمسها صابوني. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:480, section:"ch7", q:"الخاصية المشتركة بين الأحماض والقواعد..", options:["قابلية التوصيل الكهربائي","طعمها مر","إنتاج أيونات الهيدروكسيد","إنتاج أيونات الهيدروجين"], correct:0, exp:"الإجابة الصحيحة هي قابلية التوصيل الكهربائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:481, section:"ch7", q:"محاليل الأحماض تحوّل لون ورقة تباع الشمس..", options:["الأزرق إلى الأحمر","الأحمر إلى الأزرق","الأزرق إلى الأصفر","الأزرق إلى الأخضر"], correct:0, exp:"الإجابة الصحيحة هي الأزرق إلى الأحمر. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:482, section:"ch7", q:"من خواص المركبات الحامضية أنها..", options:["تغير لون ورقة تباع الشمس الحمراء","تتفاعل مع الفلزات وينتج غاز الهيدروجين","طعمها مر وملمسها صابوني","محاليلها غير موصلة للكهرباء"], correct:1, exp:"الإجابة الصحيحة هي تتفاعل مع الفلزات وينتج غاز الهيدروجين. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:483, section:"ch7", q:"مادة كيميائية يمكن أن تحوّل ورق تباع الشمس الأحمر إلى اللون الأزرق..", options:["HCl","CH₃COOH","NaOH","KCl"], correct:2, exp:"الإجابة الصحيحة هي NaOH. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:484, section:"ch7", q:"من خواص المحلول القاعدي..", options:["يحوي أيون الهيدرونيوم","pH ثابت","تركيز أيونات الهيدروكسيد أكبر من تركيز أيونات الهيدرونيوم","تركيز أيونات الهيدرونيوم أكبر من تركيز أيونات الهيدروكسيد"], correct:2, exp:"الإجابة الصحيحة هي تركيز أيونات الهيدروكسيد أكبر من تركيز أيونات الهيدرونيوم. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:485, section:"ch7", q:"يُصنّف الماء النقي بأنه مادة..", options:["قاعدية","متعادلة","حمضية","مترددة"], correct:3, exp:"الإجابة الصحيحة هي مترددة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:486, section:"ch7", q:"ارتباط الماء مع أيون الهيدروجين ينتج عنه أيون..", options:["أمونيوم","هيدروكسيد","هيدرونيوم","هيدروجين"], correct:2, exp:"الناتج هو هيدرونيوم. يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:487, section:"ch7", q:"أيون هيدروجين مرتبط مع جزيء ماء برابطة تساهمية..", options:["H₃O⁺","OH⁻","H₂O","H⁺"], correct:0, exp:"الإجابة الصحيحة هي H₃O⁺. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:488, section:"ch7", q:"تعريف الحمض حسب نظرية أرهينيوس هي المادة التي..", options:["تمنح زوجاً من الإلكترونات","تستقبل زوجاً من الإلكترونات","تحوي H⁺ وتتأين منتجة أيوناته","تحوي OH⁻"], correct:2, exp:"التعريف الصحيح يشير إلى تحوي H⁺ وتتأين منتجة أيوناته. هذا المفهوم أساسي في الكيمياء ويجب حفظه وفهمه جيداً لأنه يُبنى عليه مفاهيم أخرى متقدمة."},
  {id:489, section:"ch7", q:"أي المركبات التالية حمض حسب نظرية أرهينيوس؟", options:["PCl₃","NaOH","NH₃","HCl"], correct:3, exp:"الإجابة الصحيحة هي HCl. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:490, section:"ch7", q:"يعتبر الجزيء H₂S حسب نظرية أرهينيوس..", options:["حمضي","قاعدي","متردد","متعادل"], correct:0, exp:"الإجابة هي حمضي. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:491, section:"ch7", q:"تعريف القاعدة حسب نظرية أرهينيوس هي المادة التي..", options:["تُنتج H⁺","تستقبل زوجاً من الإلكترونات","تُنتج OH⁻","تمنح زوجاً من الإلكترونات"], correct:2, exp:"التعريف الصحيح يشير إلى تُنتج OH⁻. هذا المفهوم أساسي في الكيمياء ويجب حفظه وفهمه جيداً لأنه يُبنى عليه مفاهيم أخرى متقدمة."},
  {id:492, section:"ch7", q:"أي التالي يُمثّل قاعدة حسب نظرية أرهينيوس؟", options:["CH₃COOH","HCl","H₂SO₄","Mg(OH)₂"], correct:3, exp:"الإجابة الصحيحة هي Mg(OH)₂. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:493, section:"ch7", q:"أي التالي يُصنّف حمضاً حسب برونستد - لوري؟", options:["NH₃","NH₄⁺","I⁻","SO₄²⁻"], correct:1, exp:"الإجابة الصحيحة هي NH₄⁺. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:494, section:"ch7", q:"المادة التي لديها القابلية لنقل البروتون تُمثّل تعريف القاعدة حسب نظرية..", options:["أرهينيوس","الأيونية","برونستد - لوري","لويس"], correct:2, exp:"التعريف الصحيح يشير إلى برونستد - لوري. هذا المفهوم أساسي في الكيمياء ويجب حفظه وفهمه جيداً لأنه يُبنى عليه مفاهيم أخرى متقدمة."},
  {id:495, section:"ch7", q:"القاعدة المرافقة في المعادلة التالية: HCOOH(aq) + H₂O(l) ⇌ HCOO⁻(aq) + H₃O⁺(aq)..", options:["HCOOH","H₂O","HCOO⁻","H₃O⁺"], correct:2, exp:"الإجابة هي HCOO⁻. الحمض المرافق ينتج عند إضافة H⁺ للقاعدة، والقاعدة المرافقة تنتج عند نزع H⁺ من الحمض. كل زوج مرافق يختلف بأيون هيدروجين واحد فقط."},
  {id:496, section:"ch7", q:"القاعدة المرافقة لحمض الفوسفوريك H₃PO₄..", options:["H₃PO₄⁻","H₂PO₄⁻","HPO₄²⁻","PO₄³⁻"], correct:1, exp:"الإجابة هي H₂PO₄⁻. الحمض المرافق ينتج عند إضافة H⁺ للقاعدة، والقاعدة المرافقة تنتج عند نزع H⁺ من الحمض. كل زوج مرافق يختلف بأيون هيدروجين واحد فقط."},
  {id:497, section:"ch7", q:"القاعدة المرافقة لحمض الكبريتيك H₂SO₄..", options:["H₃SO₄⁺","HSO₄⁻","H₂SO₃","SO₄²⁻"], correct:1, exp:"الإجابة هي HSO₄⁻. الحمض المرافق ينتج عند إضافة H⁺ للقاعدة، والقاعدة المرافقة تنتج عند نزع H⁺ من الحمض. كل زوج مرافق يختلف بأيون هيدروجين واحد فقط."},
  {id:498, section:"ch7", q:"الحمض المرافق للقاعدة HCO₃⁻..", options:["CO₃²⁻","H₂CO₃","HCO₃","HCO₃²⁻"], correct:1, exp:"الإجابة هي H₂CO₃. الحمض المرافق ينتج عند إضافة H⁺ للقاعدة، والقاعدة المرافقة تنتج عند نزع H⁺ من الحمض. كل زوج مرافق يختلف بأيون هيدروجين واحد فقط."},
  {id:499, section:"ch7", q:"الحمض المرافق للقاعدة NH₃..", options:["NH₂⁻","NH₄⁺","NH₃⁺","N₂H₄"], correct:1, exp:"الإجابة هي NH₄⁺. الحمض المرافق ينتج عند إضافة H⁺ للقاعدة، والقاعدة المرافقة تنتج عند نزع H⁺ من الحمض. كل زوج مرافق يختلف بأيون هيدروجين واحد فقط."},
  {id:500, section:"ch7", q:"حسب نموذج برونستد - لوري يُعد الماء في التفاعل NH₃(aq) + H₂O(l) ⇌ NH₄⁺(aq) + OH⁻(aq)..", options:["قاعدة","حمض","حمض مرافق","قاعدة مرافقة"], correct:1, exp:"الإجابة هي حمض. حسب نظرية برونستد-لوري: الحمض مادة مانحة لأيون H⁺ والقاعدة مادة مستقبلة له. هذه النظرية أشمل من أرهينيوس لأنها تشمل المحاليل غير المائية أيضاً."},
  {id:501, section:"ch7", q:"المادة التي تسلك سلوك الحمض والقاعدة معاً..", options:["الملحية","المتعادلة","المنظمة","المترددة"], correct:3, exp:"الإجابة الصحيحة هي المترددة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:502, section:"ch7", q:"الحمض أحادي البروتون يمنح..", options:["هيدروكسيد واحد","نيتروجين واحد","أكسجين واحد","هيدروجين واحد"], correct:3, exp:"الإجابة الصحيحة هي هيدروجين واحد. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:503, section:"ch7", q:"حمض الهيدروكلوريك HCl..", options:["حمض أحادي البروتون","حمض ثنائي البروتون","حمض ثلاثي البروتون","قاعدة"], correct:0, exp:"الإجابة هي حمض أحادي البروتون. حسب نظرية برونستد-لوري: الحمض مادة مانحة لأيون H⁺ والقاعدة مادة مستقبلة له. هذه النظرية أشمل من أرهينيوس لأنها تشمل المحاليل غير المائية أيضاً."},
  {id:504, section:"ch7", q:"حمض ثنائي البروتون..", options:["HCl","HCOOH","H₂SO₄","H₃PO₄"], correct:2, exp:"الإجابة الصحيحة هي H₂SO₄. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:505, section:"ch7", q:"حمض الفوسفوريك H₃PO₄ يُعد حمضاً..", options:["أحادي البروتون","ثنائي البروتون","ثلاثي البروتون","رباعي البروتون"], correct:2, exp:"الإجابة الصحيحة هي ثلاثي البروتون. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:506, section:"ch7", q:"المادة المستقبلة لزوج من الإلكترونات هي..", options:["قاعدة لويس","حمض لويس","قاعدة أرهينيوس","حمض برونستد"], correct:1, exp:"الإجابة الصحيحة هي حمض لويس. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:507, section:"ch7", q:"أي مما يلي يمثل حمض لويس؟", options:["NH₃","F⁻","BF₃","Cl⁻"], correct:2, exp:"الإجابة هي BF₃. حسب نظرية لويس: الحمض يستقبل زوج إلكترونات والقاعدة تمنح زوج إلكترونات. هذه أوسع نظرية للأحماض والقواعد وتشمل مركبات لا تحتوي H أو OH."},
  {id:508, section:"ch7", q:"أي المركبات التالية يُصنّف على أنه حمض لويس؟", options:["PCl₃","H₂O","NH₃","Ag⁺"], correct:3, exp:"الإجابة الصحيحة هي Ag⁺. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:509, section:"ch7", q:"أي المواد التالية يُصنّف على أنها قاعدة لويس؟", options:["SO₂","NaOH","BF₃","HCl"], correct:1, exp:"الإجابة هي NaOH. حسب نظرية لويس: الحمض يستقبل زوج إلكترونات والقاعدة تمنح زوج إلكترونات. هذه أوسع نظرية للأحماض والقواعد وتشمل مركبات لا تحتوي H أو OH."},
  {id:510, section:"ch7", q:"الأنهيدريد الحمضي ينتج عن تفاعل..", options:["فلز مع الأكسجين","لا فلز مع الأكسجين","فلز مع الماء","لا فلز مع الماء"], correct:1, exp:"الناتج هو لا فلز مع الأكسجين. يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:511, section:"ch7", q:"أي الأكاسيد التالية يُعد أنهيدريد قاعدي؟", options:["SO₃","CO₂","أكسيد الكالسيوم (CaO)","NO₂"], correct:2, exp:"الإجابة الصحيحة هي أكسيد الكالسيوم (CaO). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:512, section:"ch7", q:"أي المركبات الكيميائية التالية يُصنّف على أنه قاعدة قوية؟", options:["NH₃","SO₂","NaOH","NaCl"], correct:2, exp:"الإجابة الصحيحة هي NaOH. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:513, section:"ch7", q:"أي التالي من الأحماض القوية؟", options:["HF","HCl","CH₃COOH","H₂S"], correct:1, exp:"الإجابة الصحيحة هي HCl. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:514, section:"ch7", q:"حاصل ضرب تراكيز أيون الهيدروجين وأيون الهيدروكسيد في المحاليل المائية المخففة يُعبر عن..", options:["الرقم الهيدروجيني","الرقم الهيدروكسيدي","المولارية","ثابت تأين الماء"], correct:3, exp:"الإجابة الصحيحة هي ثابت تأين الماء. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:515, section:"ch7", q:"إذا كان [H⁺] > [OH⁻] فإن المحلول..", options:["حمضي","متعادل","قاعدي","متردد"], correct:0, exp:"الإجابة الصحيحة هي حمضي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:516, section:"ch7", q:"إذا كان [H⁺] = 10⁻⁹ فإن المحلول..", options:["حمضي","متعادل","قاعدي","مركب"], correct:2, exp:"الإجابة الصحيحة هي قاعدي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:517, section:"ch7", q:"إذا كان 2 > pH لمحلول ما فإنه يُعد..", options:["متعادلاً","حمضاً","قاعدة","مترددًا"], correct:1, exp:"الإجابة هي حمضاً. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:518, section:"ch7", q:"عند قياس pH لكريم البشرة وُجد أنه يساوي 7، لذا يمكن استنتاج أن الوسط..", options:["قاعدي","متعادل","حمضي","ملح"], correct:1, exp:"الإجابة هي متعادل. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:519, section:"ch7", q:"الرقم الهيدروجيني للماء المقطر..", options:["13","7.5","7","0"], correct:2, exp:"الإجابة هي 7. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:520, section:"ch7", q:"حسب مقياس الحموضة pH يكون المحلول قاعدياً إذا كانت قيمة..", options:["pH = 0","pH = 7","pH > 7","pH < 7"], correct:2, exp:"الإجابة هي pH > 7. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:521, section:"ch7", q:"إذا كانت قيمة تركيز أيون الهيدرونيوم في محلول تساوي 10⁻⁹ M؛ فإن الوسط يُعد..", options:["متعادلاً","حمضياً","قاعدياً","مادة مترددة"], correct:2, exp:"الإجابة الصحيحة هي قاعدياً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:522, section:"ch7", q:"إذا كانت قيمة الرقم الهيدروجيني لمحلول تساوي 13؛ فإن هذا المحلول يحمل الصفة..", options:["القاعدية","الحامضية","المتعادلة","المترددة"], correct:0, exp:"الإجابة هي القاعدية. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:523, section:"ch7", q:"قيمة pH للحمض القوي تساوي..", options:["14","7","4","1"], correct:3, exp:"الإجابة هي 1. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
