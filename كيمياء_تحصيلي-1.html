  {id:524, section:"ch7", q:"إذا كانت قيمة pH لمحلول تساوي 1.6؛ فإنه يُعد..", options:["حمضاً ضعيفاً","حمضاً قوياً","قاعدة ضعيفة","قاعدة قوية"], correct:1, exp:"الإجابة هي حمضاً قوياً. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:525, section:"ch7", q:"إذا كانت قيمة [H⁺] = 1×10⁻¹¹ M لمحلول؛ فإن ذلك يُمثّل..", options:["حمضاً","قاعدة","متعادلاً","مشبعاً"], correct:1, exp:"الإجابة الصحيحة هي قاعدة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:526, section:"ch7", q:"إذا كانت قيمة pOH لمحلول تساوي 8.5؛ فإنه يُعد..", options:["حمضاً","قاعدة","متعادلاً","مترددًا"], correct:0, exp:"الإجابة هي حمضاً. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:527, section:"ch7", q:"قيمة pOH للقاعدة القوية..", options:["تساوي 14","تساوي 7","أقل من 7","أكثر من 7"], correct:2, exp:"الإجابة هي أقل من 7. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:528, section:"ch7", q:"محلول مائي من كلوريد الأمونيوم pH = 5، فإن قيمة pOH له..", options:["5","6","9","11"], correct:2, exp:"الإجابة هي 9. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:529, section:"ch7", q:"إذا كانت قيمة pOH = 3 فإن [H⁺] يساوي..", options:["1×10⁻³ M","1×10⁻¹¹ M","11 M","3 M"], correct:1, exp:"الإجابة هي 1×10⁻¹¹ M. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:530, section:"ch7", q:"إذا كانت [OH⁻] = 10⁻⁵ فأوجد الرقم الهيدروجيني pH..", options:["5","9","4","2"], correct:1, exp:"الإجابة هي 9. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:531, section:"ch7", q:"إذا كانت قيمة pH لمحلول تساوي 14 فما تركيز أيون الهيدروكسيد؟", options:["14","2","1","0"], correct:2, exp:"الإجابة هي 1. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:532, section:"ch7", q:"إذا كانت قيمة pOH = 3 فإن [H⁺] يساوي..", options:["1×10⁻³ M","1×10⁻¹¹ M","11 M","3 M"], correct:1, exp:"الإجابة هي 1×10⁻¹¹ M. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:533, section:"ch7", q:"يُقاس الرقم الهيدروجيني باستخدام..", options:["مقياس pH الرقمي","الهيدرومتر","المانومتر","مقياس فنتوري"], correct:0, exp:"الإجابة هي مقياس pH الرقمي. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:534, section:"ch7", q:"أصباغ كيميائية تتأثر ألوانها بالمحاليل الحمضية والقاعدية..", options:["المخاليط","الكواشف","المحاليل القياسية","المحاليل المنظمة"], correct:1, exp:"الإجابة الصحيحة هي الكواشف. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:535, section:"ch7", q:"أي التالي ينتج من تفاعل حمض وقاعدة؟", options:["ملح","إستر","حمض كربوكسيلي","بنزين"], correct:0, exp:"الإجابة الصحيحة هي ملح. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:536, section:"ch7", q:"حمض + قاعدة → ملح + ماء، هذا يُمثّل تفاعل..", options:["احتراق","تفكك","إحلال بسيط","إحلال مزدوج"], correct:3, exp:"الإجابة الصحيحة هي إحلال مزدوج. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:537, section:"ch7", q:"أي المواد التالية يُمثّل ملحاً؟", options:["NH₃","CH₃COOH","CaCO₃","HCl"], correct:2, exp:"الإجابة الصحيحة هي CaCO₃. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:538, section:"ch7", q:"أي تفاعلات التعادل التالية يعطي قيمة pH = 7؟", options:["NaOH(aq) + HCl(aq)","NH₃(aq) + HCl(aq)","NaOH(aq) + HF(aq)","KOH(aq) + CH₃COOH(aq)"], correct:0, exp:"الإجابة هي NaOH(aq) + HCl(aq). تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:539, section:"ch7", q:"تفاعل حمض مع قاعدة واستخدام أحدهما في معرفة تركيز الآخر..", options:["المعايرة","الاحتراق","التقطير","التميّه"], correct:0, exp:"الإجابة الصحيحة هي المعايرة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:540, section:"ch7", q:"محلول معروف التركيز يُستعمل لمعايرة محلول مجهول التركيز..", options:["المحلول القياسي","المحلول المنظم","المحلول المركز","المحلول المخفف"], correct:0, exp:"الإجابة الصحيحة هي المحلول القياسي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:541, section:"ch7", q:"عند نقطة نهاية المعايرة يتغير لون..", options:["الحمض","القاعدة","الملح","الكاشف"], correct:3, exp:"الإجابة هي الكاشف. المعايرة تقنية تحليلية تُستخدم لتحديد تركيز محلول مجهول باستخدام محلول قياسي معلوم التركيز. عند نقطة التكافؤ يتساوى عدد مولات H⁺ مع OH⁻."},
  {id:542, section:"ch7", q:"عندما تتميه الأملاح فإن الشق السالب من الملح يكتسب..", options:["أيونات الهيدروجين","أيونات الهيدروكسيد","أيونات الأكسجين","أيونات النيتروجين"], correct:0, exp:"الإجابة هي أيونات الهيدروجين. تميؤ الأملاح هو تفاعل أيونات الملح مع الماء. الشق السالب (من حمض ضعيف) يستقبل H⁺ فيعطي محلولاً قاعدياً، والشق الموجب (من قاعدة ضعيفة) يعطي محلولاً حمضياً."},
  {id:543, section:"ch7", q:"أملاح تُنتج محاليل قاعدية، نتجت عن..", options:["حمض قوي وقاعدة ضعيفة","قاعدة قوية وحمض ضعيف","حمض قوي وقاعدة قوية","حمض ضعيف وقاعدة ضعيفة"], correct:1, exp:"الإجابة الصحيحة هي قاعدة قوية وحمض ضعيف. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:544, section:"ch7", q:"أي المواد التالية يُمثل ملحاً حامضياً؟", options:["فلوريد البوتاسيوم","كلوريد الأمونيوم","نترات الصوديوم","هيدروكسيد الليثيوم"], correct:1, exp:"الإجابة الصحيحة هي كلوريد الأمونيوم. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:545, section:"ch7", q:"ملح خلات (أسيتات) الصوديوم CH₃COONa يَنتج من تفاعل..", options:["CH₃COOH(aq) + NaOH(aq)","CH₃COOH(aq) + NaCl(aq)","CH₃COOH(aq) + Na₂SO₄(aq)","CH₃COOH(aq) + NaNO₃(aq)"], correct:0, exp:"الإجابة الصحيحة هي CH₃COOH(aq) + NaOH(aq). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:546, section:"ch7", q:"محلول يقاوم تغير الرقم الهيدروجيني..", options:["المحلول المعياري","المحلول المنظم","المحلول المركز","المحلول المشبع"], correct:1, exp:"الإجابة هي المحلول المنظم. تذكر أن pH + pOH = 14 دائماً في المحاليل المائية عند 25°C. المحلول الحمضي pH < 7، المتعادل pH = 7، والقاعدي pH > 7."},
  {id:547, section:"ch7", q:"ينتج عن إضافة قاعدة ضعيفة إلى حمضها المرافق..", options:["المحلول القياسي","المحلول المشبع","المحلول المنظم","المحلول المخفف"], correct:2, exp:"الناتج هو المحلول المنظم. يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:548, section:"ch7", q:"وفقاً لمبدأ لوتشاتلييه: تضاف المواد المنظمة للمحاليل لتظل قيمة pH..", options:["تزيد","تُضاعف","تنقص","ثابتة"], correct:3, exp:"الإجابة هي ثابتة. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:549, section:"ch7", q:"سعة المحلول المنظم تزداد بزيادة..", options:["درجة الحرارة","الضغط","تراكيز الجزيئات والأيونات","الحجم"], correct:2, exp:"الإجابة هي تراكيز الجزيئات والأيونات. المحلول المنظم يقاوم التغير في pH عند إضافة كميات محدودة من حمض أو قاعدة. يتكون من حمض ضعيف وقاعدته المرافقة (أو العكس)، ويعمل وفق مبدأ لوتشاتلييه."},
  {id:550, section:"ch8", q:"في عملية الأكسدة يحدث..", options:["زيادة في عدد التأكسد","نقصان في عدد التأكسد","اكتساب إلكترونات","اكتساب نيوترونات"], correct:0, exp:"الإجابة هي زيادة في عدد التأكسد. الأكسدة هي فقد إلكترونات مع زيادة عدد التأكسد. العامل المختزل هو المادة التي تفقد الإلكترونات (تتأكسد)، بينما العامل المؤكسد يكتسبها (يُختزل)."},
  {id:551, section:"ch8", q:"ماذا يحدث للعامل المختزل؟", options:["يُختزل","يتأكسد","يكتسب إلكترونات","لا يحدث شيء"], correct:1, exp:"الإجابة الصحيحة هي يتأكسد. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:552, section:"ch8", q:"العامل المختزل القوي..", options:["كهروسالبيته منخفضة","كهروسالبيته مرتفعة","درجة غليانه مرتفعة جداً","طاقة تأيّنه منخفضة"], correct:0, exp:"الإجابة الصحيحة هي كهروسالبيته منخفضة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:553, section:"ch8", q:"المجموعة التي عناصرها تُعد عوامل مختزلة قوية..", options:["الهالوجينات","العناصر الانتقالية","الغازات النبيلة","الفلزات القلوية"], correct:3, exp:"الإجابة الصحيحة هي الفلزات القلوية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:554, section:"ch8", q:"يُعد العنصر عاملاً مؤكسداً قوياً إذا..", options:["كانت كهروسالبيته مرتفعة","وصل للتركيب الثماني","كانت طاقة تأينه منخفضة","كانت درجة غليانه مرتفعة"], correct:0, exp:"الإجابة الصحيحة هي كانت كهروسالبيته مرتفعة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:555, section:"ch8", q:"القطب الذي يحدث له عملية أكسدة في التفاعل 2Al(s) + 3Sn²⁺(aq) → 2Al³⁺(aq) + 3Sn(s)..", options:["Sn(s)","Al(s)","Al³⁺(aq)","Sn²⁺(aq)"], correct:1, exp:"الإجابة الصحيحة هي Al(s). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:556, section:"ch8", q:"أي العناصر التالية يُعد عاملاً مؤكسداً قوياً؟", options:["F","Cl","Br","I"], correct:0, exp:"الإجابة الصحيحة هي F. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:557, section:"ch8", q:"أي المعادلات التالية يُمثّل عملية الأكسدة؟", options:["Ag(s) → Ag⁺(aq) + e⁻","Hg²⁺(aq) + 2e⁻ → Hg(l)","Mg²⁺(aq) + 2e⁻ → Mg(s)","Al³⁺(aq) + 3e⁻ → Al(s)"], correct:0, exp:"الإجابة هي Ag(s) → Ag⁺(aq) + e⁻. الأكسدة هي فقد إلكترونات مع زيادة عدد التأكسد. العامل المختزل هو المادة التي تفقد الإلكترونات (تتأكسد)، بينما العامل المؤكسد يكتسبها (يُختزل)."},
  {id:558, section:"ch8", q:"في التفاعل Fe³⁺ + MnO₄⁻ → MnO₂ + Fe²⁺..", options:["المنجنيز يتأكسد","الحديد يتأكسد","المنجنيز يُختزل","الأكسجين يتأكسد"], correct:2, exp:"الإجابة الصحيحة هي المنجنيز يُختزل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:559, section:"ch8", q:"ما العامل المختزل في المعادلة التالية Zn(s) + Cu²⁺(aq) → Zn²⁺(aq) + Cu(s)؟", options:["Zn²⁺(aq)","Cu(s)","Cu²⁺(aq)","Zn(s)"], correct:3, exp:"الإجابة الصحيحة هي Zn(s). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:560, section:"ch8", q:"أي التالي يُمثّل نصف التفاعل Fe²⁺(aq) + 2e⁻ → Fe(s)؟", options:["الحديد عامل مختزل","ذرة الحديد اكتسبت إلكترونين","نقص عدد تأكسد ذرة الحديد","الحديد عامل مؤكسد"], correct:2, exp:"الإجابة الصحيحة هي نقص عدد تأكسد ذرة الحديد. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:561, section:"ch8", q:"أي التالي صحيح للتفاعل 2Na(s) + Cl₂(g) → 2NaCl(s)؟", options:["الصوديوم عامل مختزل","الكلور زاد عدد تأكسده","الصوديوم عامل مؤكسد","الكلور عامل مختزل"], correct:0, exp:"الإجابة الصحيحة هي الصوديوم عامل مختزل. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:562, section:"ch8", q:"العامل المختزل في التفاعل H₂S(g) + Cl₂(g) → S(s) + 2HCl(g)..", options:["H₂(g)","HCl(g)","H₂S(g)","Cl₂(g)"], correct:2, exp:"الإجابة الصحيحة هي H₂S(g). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:563, section:"ch8", q:"طبقاً للتفاعل Zn(s) + Cu²⁺(aq) → Zn²⁺(aq) + Cu(s)..", options:["Zn(s) عامل مؤكسد","Cu²⁺(aq) عامل مختزل","Zn(s) حدث له اختزال","Cu²⁺(aq) عامل مؤكسد"], correct:3, exp:"الإجابة الصحيحة هي Cu²⁺(aq) عامل مؤكسد. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:564, section:"ch8", q:"عنصر تكافؤه (+2) فإنه يُصنّف..", options:["لا فلزاً","فلزاً","شبه فلز","خاملاً"], correct:1, exp:"الإجابة الصحيحة هي فلزاً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:565, section:"ch8", q:"عدد تأكسد الألومنيوم Al₁₃ في مركباته..", options:["-3","+2","+3","+1"], correct:2, exp:"عدد التأكسد هو +3. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:566, section:"ch8", q:"عدد تأكسد ذرة النيون ₁₀Ne..", options:["+10","+8","+6","0"], correct:3, exp:"عدد التأكسد هو 0. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:567, section:"ch8", q:"عدد الأكسدة للأكسجين في جزيء الماء H₂O يساوي..", options:["0","-2","+1","+2"], correct:1, exp:"الإجابة الصحيحة هي -2. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:568, section:"ch8", q:"عدد تأكسد الأكسجين في H₂O₂..", options:["0","-1","+1","+2"], correct:1, exp:"عدد التأكسد هو -1. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:569, section:"ch8", q:"عدد تأكسد الكبريت في مركب H₂SO₄..", options:["-2","+2","+6","+8"], correct:2, exp:"عدد التأكسد هو +6. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:570, section:"ch8", q:"عدد تأكسد الكربون في مركب كربونات الصوديوم Na₂CO₃..", options:["+4","+2","+1","-2"], correct:0, exp:"عدد التأكسد هو +4. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:571, section:"ch8", q:"عدد تأكسد الكلور في NaClO₄..", options:["+2","+8","-7","+7"], correct:3, exp:"عدد التأكسد هو +7. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:572, section:"ch8", q:"عدد تأكسد النيتروجين في مركب HNO₃..", options:["-2","+2","+5","+3"], correct:2, exp:"عدد التأكسد هو +5. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:573, section:"ch8", q:"عدد تأكسد الحديد في Fe(OH)₃..", options:["-1","+1","-3","+3"], correct:3, exp:"عدد التأكسد هو +3. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:574, section:"ch8", q:"عدد تأكسد Cr في مركب K₂Cr₂O₇..", options:["-12","+12","-6","+6"], correct:3, exp:"عدد التأكسد هو +6. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:575, section:"ch8", q:"عدد تأكسد الكلور في أيون ClO⁻..", options:["+2","+1","-1","-2"], correct:1, exp:"عدد التأكسد هو +1. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:576, section:"ch8", q:"علم يدرس تحويل الطاقة الكيميائية إلى طاقة كهربائية خلال عمليات الأكسدة والاختزال..", options:["الكيمياء التحليلية","الكيمياء الذرية","الكيمياء الكهربائية","الكيمياء الحيوية"], correct:2, exp:"الإجابة الصحيحة هي الكيمياء الكهربائية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:577, section:"ch8", q:"الأنود قطب يحدث عنده..", options:["تفاعل اختزال","تفاعل أكسدة","اكتساب إلكترونات","تراكم ترسبات"], correct:1, exp:"الإجابة هي تفاعل أكسدة. في الخلية الجلفانية: الأنود = قطب الأكسدة (فقد إلكترونات)، والكاثود = قطب الاختزال (اكتساب إلكترونات). الإلكترونات تنتقل من الأنود للكاثود عبر السلك الخارجي."},
  {id:578, section:"ch8", q:"في الخلية الكهروكيميائية الكاثود قطب يحدث عنده تفاعل..", options:["النحلل","الأكسدة","الاختزال","التعادل"], correct:2, exp:"الإجابة هي الاختزال. الخلايا الكهروكيميائية تحوّل الطاقة الكيميائية إلى كهربائية (جلفانية) أو العكس (تحليلية). الأنود قطب الأكسدة والكاثود قطب الاختزال."},
  {id:579, section:"ch8", q:"الخلية الجلفانية نوع من الخلايا..", options:["الكهرومغناطيسية","الكهروكيميائية","الكهروحرارية","الشمسية"], correct:1, exp:"الإجابة هي الكهروكيميائية. الخلايا الكهروكيميائية تحوّل الطاقة الكيميائية إلى كهربائية (جلفانية) أو العكس (تحليلية). الأنود قطب الأكسدة والكاثود قطب الاختزال."},
  {id:580, section:"ch8", q:"ينشأ التيار الكهربائي من خلال التفاعل الكيميائي في..", options:["عملية مقاومة المعادن للتآكل","الخلايا التحليلية","عملية الطلاء المعدني","الخلايا الجلفانية"], correct:3, exp:"الإجابة الصحيحة هي الخلايا الجلفانية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:581, section:"ch8", q:"أي التالي يُمثّل معادلة نصف تفاعل صحيحة؟", options:["Ag⁺(aq) → Ag(s) + e⁻","Hg²⁺(aq) → Hg(l) + 2e⁻","2O²⁻(aq) + 2e⁻ → O₂(g)","Cu(s) → Cu²⁺(aq) + 2e⁻"], correct:3, exp:"الإجابة الصحيحة هي Cu(s) → Cu²⁺(aq) + 2e⁻. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:582, section:"ch8", q:"الأيونات الموجبة والسالبة تنتقل في الخلية الجلفانية عبر..", options:["المهبط","المصعد","السلك","القنطرة الملحية"], correct:3, exp:"الإجابة هي القنطرة الملحية. الخلايا الكهروكيميائية تحوّل الطاقة الكيميائية إلى كهربائية (جلفانية) أو العكس (تحليلية). الأنود قطب الأكسدة والكاثود قطب الاختزال."},
  {id:583, section:"ch8", q:"طاقة تدفع الإلكترونات من أنود الخلية الكهروكيميائية إلى كاثودها..", options:["طاقة الوضع الكيميائية","جهد الكاثود","جهد الأنود","فرق جهد الخلية الجلفانية"], correct:3, exp:"الإجابة هي فرق جهد الخلية الجلفانية. الخلايا الكهروكيميائية تحوّل الطاقة الكيميائية إلى كهربائية (جلفانية) أو العكس (تحليلية). الأنود قطب الأكسدة والكاثود قطب الاختزال."},
  {id:584, section:"ch8", q:"جهد الاختزال هو قابلية المادة..", options:["لفقد إلكترونات","للتأكسد","لاكتساب إلكترونات","للتحلل"], correct:2, exp:"الإجابة هي لاكتساب إلكترونات. جهد الاختزال القياسي يقيس ميل المادة لاكتساب إلكترونات. نصف التفاعل ذو الجهد الأعلى يحدث عنده الاختزال (كاثود) والأقل يحدث عنده الأكسدة (أنود)."},
  {id:585, section:"ch8", q:"الجدول يوضح جهود الاختزال القياسية لبعض أنصاف الخلايا عند 25°C و 1 M، أي هذه الأيونات يُعد الأسهل اختزالاً؟", options:["Ag⁺(aq) + e⁻ → Ag(s)","Hg²⁺(aq) + 2e⁻ → Hg(s)","Mg²⁺(aq) + 2e⁻ → Mg(s)","Al³⁺(aq) + 3e⁻ → Al(s)"], correct:0, exp:"الإجابة الصحيحة هي Ag⁺(aq) + e⁻ → Ag(s). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:586, section:"ch8", q:"جهد الاختزال القياسي للهيدروجين يساوي..", options:["0 V","1 V","1.5 V","2 V"], correct:0, exp:"الإجابة هي 0 V. جهد الاختزال القياسي يقيس ميل المادة لاكتساب إلكترونات. نصف التفاعل ذو الجهد الأعلى يحدث عنده الاختزال (كاثود) والأقل يحدث عنده الأكسدة (أنود)."},
  {id:587, section:"ch8", q:"أي التالي يُمثّل معادلة جهد الخلية؟", options:["E°cell = E°anode + E°cathode","E°cell = E°cathode - E°anode","E°cell = E°anode - E°cathode","E°cell = E°cathode + E°anode"], correct:1, exp:"الإجابة الصحيحة هي E°cell = E°cathode - E°anode. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:588, section:"ch8", q:"خلية جلفانية إذا علمت أنصاف تفاعلات الاختزال فيها E° = +0.54 V و E° = -0.45 V، فكم تبلغ قيمة الجهد القياسي E°cell؟", options:["-0.99 V","-0.45 V","+0.45 V","+0.99 V"], correct:3, exp:"الإجابة الصحيحة هي +0.99 V. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:589, section:"ch8", q:"خلية جلفانية إذا كان E°anode = -0.76 V و E°cathode = +0.8 V، فكم تبلغ قيمة الجهد القياسي E°cell؟", options:["-1.56 V","+0.56 V","+1.56 V","+1.1 V"], correct:2, exp:"الإجابة الصحيحة هي +1.56 V. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:590, section:"ch8", q:"إذا كان التفاعل تلقائياً فإن جهد الخلية..", options:["سالب","موجب","منخفض","يساوي صفراً"], correct:1, exp:"الإجابة هي موجب. الخلايا الكهروكيميائية تحوّل الطاقة الكيميائية إلى كهربائية (جلفانية) أو العكس (تحليلية). الأنود قطب الأكسدة والكاثود قطب الاختزال."},
  {id:591, section:"ch8", q:"إذا كان التفاعل غير تلقائي فإن الجهد القياسي للخلية يساوي..", options:["-1","0","+1","+2"], correct:0, exp:"الإجابة هي -1. جهد الاختزال القياسي يقيس ميل المادة لاكتساب إلكترونات. نصف التفاعل ذو الجهد الأعلى يحدث عنده الاختزال (كاثود) والأقل يحدث عنده الأكسدة (أنود)."},
  {id:592, section:"ch8", q:"أي البطاريات التالية تُستخدم لمرة واحدة وتعتمد على التفاعل في اتجاه واحد؟", options:["بطارية السيارة","بطارية الحاسوب","البطارية القلوية","البطارية الجافة"], correct:3, exp:"الإجابة هي البطارية الجافة. البطاريات الأولية (مثل الجافة) تُستخدم مرة واحدة. البطاريات الثانوية (مثل بطارية السيارة) يمكن إعادة شحنها لأن تفاعلها عكسي."},
  {id:593, section:"ch8", q:"لإنتاج طاقة كهربائية عن طريق تفاعل أكسدة واختزال عكسي نستخدم..", options:["البطارية القلوية","الخلية الجافة","البطارية الثانوية","بطارية الفضة"], correct:2, exp:"الإجابة الصحيحة هي البطارية الثانوية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:594, section:"ch8", q:"من أمثلة البطاريات الثانوية..", options:["خلية الخارصين والكربون","بطارية الفضة","المركم الرصاصي","البطارية القلوية"], correct:2, exp:"الإجابة هي المركم الرصاصي. البطاريات الأولية (مثل الجافة) تُستخدم مرة واحدة. البطاريات الثانوية (مثل بطارية السيارة) يمكن إعادة شحنها لأن تفاعلها عكسي."},
  {id:595, section:"ch8", q:"من أمثلة البطاريات الثانوية..", options:["البطارية القلوية","بطارية الحاسوب المحمول","خلية الخارصين والكربون","بطارية الفضة"], correct:1, exp:"الإجابة هي بطارية الحاسوب المحمول. البطاريات الأولية (مثل الجافة) تُستخدم مرة واحدة. البطاريات الثانوية (مثل بطارية السيارة) يمكن إعادة شحنها لأن تفاعلها عكسي."},
  {id:596, section:"ch8", q:"أنود الخلية الجافة عبارة عن حافظة من..", options:["الخارصين","الكربون","الفسفور","الكبريت"], correct:0, exp:"الإجابة هي الخارصين. الخلايا الكهروكيميائية تحوّل الطاقة الكيميائية إلى كهربائية (جلفانية) أو العكس (تحليلية). الأنود قطب الأكسدة والكاثود قطب الاختزال."},
  {id:597, section:"ch8", q:"في بطارية الخارصين والكربون الكاثود يُمثّل..", options:["الخارصين","عمود الكربون","ملف نحاسي","KOH"], correct:1, exp:"الإجابة هي عمود الكربون. في الخلية الجلفانية: الأنود = قطب الأكسدة (فقد إلكترونات)، والكاثود = قطب الاختزال (اكتساب إلكترونات). الإلكترونات تنتقل من الأنود للكاثود عبر السلك الخارجي."},
  {id:598, section:"ch8", q:"مسحوق الخارصين Zn المخلوط مع هيدروكسيد البوتاسيوم KOH يُمثّل الأنود في..", options:["بطارية البنيوم","بطارية الفضة","البطارية القلوية","الخلية الجلفانية"], correct:2, exp:"الإجابة هي البطارية القلوية. في الخلية الجلفانية: الأنود = قطب الأكسدة (فقد إلكترونات)، والكاثود = قطب الاختزال (اكتساب إلكترونات). الإلكترونات تنتقل من الأنود للكاثود عبر السلك الخارجي."},
  {id:599, section:"ch8", q:"المحلول الموصل في المركم الرصاصي هو حمض..", options:["HNO₃","HCl","H₂SO₄","H₃PO₄"], correct:2, exp:"الإجابة الصحيحة هي H₂SO₄. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:600, section:"ch8", q:"فلز قلوي يُستخدم في البطاريات ويمتاز بحالة تأكسد أحادية..", options:["Na₁₁","Li₃","₁₄Si","Fr"], correct:1, exp:"الإجابة هي Li₃. البطاريات الأولية (مثل الجافة) تُستخدم مرة واحدة. البطاريات الثانوية (مثل بطارية السيارة) يمكن إعادة شحنها لأن تفاعلها عكسي."},
  {id:601, section:"ch8", q:"العنصر الذي له أقل جهد اختزال قياسي..", options:["F","Li","Na","Fr"], correct:1, exp:"الإجابة الصحيحة هي Li. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:602, section:"ch8", q:"تُستخدم خلايا وقود ........ في تزويد سفن الفضاء بالماء والكهرباء.", options:["الرصاص","الميثان","الكبريت","الهيدروجين"], correct:3, exp:"الإجابة هي الهيدروجين. خلايا وقود الهيدروجين تولد الكهرباء من تفاعل H₂ مع O₂ وتنتج ماءً نقياً فقط. تُستخدم في سفن الفضاء وبدأت تُستخدم في السيارات الكهربائية."},
  {id:603, section:"ch8", q:"خسارة الفلز الناتجة عن تفاعل أكسدة واختزال بين الفلز والمواد التي في البيئة..", options:["التآين","الجلفنة","التآكل","التحلل"], correct:2, exp:"الإجابة الصحيحة هي التآكل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:604, section:"ch8", q:"تُسمى عملية تغليف الحديد بفلز أكثر مقاومة للتأكسد..", options:["التحلل","الجلفنة","التأيّن","الترسيب"], correct:1, exp:"الإجابة الصحيحة هي الجلفنة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:605, section:"ch8", q:"أي الطرق التالية تُستخدم لمنع التآكل؟", options:["الأكسدة","الاختزال","الكربنة","الجلفنة"], correct:3, exp:"الإجابة هي الجلفنة. التآكل تفاعل أكسدة بطيء للفلز مع البيئة المحيطة (خاصة الأكسجين والرطوبة). يُمنع بالطلاء أو الجلفنة (تغليف بفلز أكثر مقاومة مثل الزنك) أو الحماية الكاثودية."},
  {id:606, section:"ch8", q:"يُمكن فصل مكونات الماء H₂O باستخدام..", options:["الترشيح","التقطير","التسامي","التحليل الكهربائي"], correct:3, exp:"الإجابة الصحيحة هي التحليل الكهربائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:607, section:"ch8", q:"للحصول على غاز الكلور من التحليل الكهربائي لمصهور كلوريد الصوديوم نستخدم..", options:["عملية الجلفنة","خلية داون","عملية هول هيروليت","تفاعل الهلجنة"], correct:1, exp:"الإجابة هي خلية داون. حسب نظرية برونستد-لوري: الحمض مادة مانحة لأيون H⁺ والقاعدة مادة مستقبلة له. هذه النظرية أشمل من أرهينيوس لأنها تشمل المحاليل غير المائية أيضاً."},
  {id:608, section:"ch8", q:"عملية يتم من خلالها إنتاج الهيدروجين في الاستعمالات التجارية وإنتاج الألومنيوم وتنقية الفلزات..", options:["التحليل الكهربائي","الجلفنة","الطلاء","التكسير الحراري"], correct:0, exp:"الإجابة الصحيحة هي التحليل الكهربائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:609, section:"ch8", q:"أي التالي ليس من تطبيقات التحليل الكهربائي؟", options:["خلية داون","الطلاء بالكهرباء","تفاعل الهلجنة","عملية هول هيروليت"], correct:2, exp:"الإجابة الصحيحة هي تفاعل الهلجنة. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:610, section:"ch9", q:"قسم من الكيمياء يهتم بدراسة الكربون ومركباته..", options:["الألكينات","الكيمياء العضوية","الألكانات","الألكاينات"], correct:1, exp:"الإجابة الصحيحة هي الكيمياء العضوية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:611, section:"ch9", q:"ما عدد الروابط التي يكوّنها الكربون مع غيره من الذرات؟", options:["الألكينات","4","الألكانات","الألكاينات"], correct:1, exp:"ذرة الكربون تحتوي 4 إلكترونات تكافؤ، لذلك تستطيع تكوين 4 روابط تساهمية مع ذرات أخرى. هذه الخاصية تجعل الكربون قادراً على تكوين سلاسل طويلة ومتفرعة ومركبات متنوعة جداً."},
  {id:612, section:"ch9", q:"أقصى عدد من ذرات الهيدروجين يمكن أن يرتبط بذرة كربون واحدة..", options:["الألكانات","الألكينات","الألكاينات","4"], correct:3, exp:"كل رابطة من روابط الكربون الأربع يمكن أن ترتبط بذرة هيدروجين واحدة، فيتكون الميثان CH₄. هذا هو أبسط الهيدروكربونات وأول مركب في سلسلة الألكانات."},
  {id:613, section:"ch9", q:"أي المركبات التالية من الألكانات؟", options:["الألكينات","C₂H₆","الألكاينات","الألكانات"], correct:1, exp:"C₂H₆ (الإيثان) ينطبق عليه الصيغة العامة للألكانات CnH₂n₊₂ حيث n=2. الألكانات هيدروكربونات مشبعة جميع روابطها أحادية بين ذرات الكربون."},
  {id:614, section:"ch9", q:"أي المركبات التالية غير مشبع؟", options:["الألكانات","C₂H₄","الألكاينات","الألكينات"], correct:1, exp:"C₂H₄ (الإيثيلين) غير مشبع لأنه يحتوي رابطة ثنائية بين ذرتي كربون. المركبات غير المشبعة تحتوي روابط ثنائية أو ثلاثية وتنتمي للألكينات أو الألكاينات."},
  {id:615, section:"ch9", q:"فصل النفط إلى مكونات أبسط بتكثيفها عند درجات حرارة مختلفة..", options:["الألكانات","التقطير التجزيئي","الألكينات","الألكاينات"], correct:1, exp:"التقطير التجزيئي يفصل مكونات النفط الخام بناءً على اختلاف درجات غليانها. يُسخن النفط في برج التقطير فتتبخر المكونات الخفيفة أولاً وتتكثف عند ارتفاعات مختلفة."},
  {id:616, section:"ch9", q:"أي العمليات التالية تتم في غياب الأكسجين ووجود عامل مساعد؟", options:["الألكينات","الألكاينات","الألكانات","التكسير الحراري"], correct:3, exp:"التكسير الحراري يحوّل الهيدروكربونات الثقيلة إلى جزيئات أصغر وأخف في غياب الأكسجين. يتم بوجود عامل مساعد (مثل الزيوليت) وعند درجات حرارة عالية لزيادة إنتاج البنزين."},
  {id:617, section:"ch9", q:"الروابط بين ذرات الكربون في الألكانات..", options:["أحادية","الألكاينات","الألكانات","الألكينات"], correct:0, exp:"الألكانات تحتوي فقط على روابط تساهمية أحادية (سيجما) بين ذرات الكربون. لذلك تُسمى هيدروكربونات مشبعة لأن كل ذرة كربون مرتبطة بأقصى عدد ممكن من الذرات."},
  {id:618, section:"ch9", q:"الألكانات..", options:["الألكانات","الألكينات","الألكاينات","لا تذوب في الماء لأنها غير قطبية"], correct:3, exp:"الإجابة الصحيحة هي لا تذوب في الماء لأنها غير قطبية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:619, section:"ch9", q:"الصيغة الجزيئية للميثان..", options:["الألكاينات","CH₄","الألكانات","الألكينات"], correct:1, exp:"الميثان CH₄ هو أبسط الألكانات ويتكون من ذرة كربون واحدة مرتبطة بأربع ذرات هيدروجين. يوجد كغاز طبيعي ويُستخدم كوقود رئيسي للطبخ والتدفئة."},
  {id:620, section:"ch9", q:"الصيغة الجزيئية للإيثان..", options:["الألكاينات","الألكانات","C₂H₆","الألكينات"], correct:2, exp:"الإيثان C₂H₆ ثاني أعضاء سلسلة الألكانات ويتكون من ذرتي كربون مرتبطتين برابطة أحادية. يوجد في الغاز الطبيعي ويُستخدم في صناعة الإيثيلين."},
  {id:621, section:"ch9", q:"صيغة البروبان..", options:["CH₃CH₂CH₃","الألكينات","الألكاينات","الألكانات"], correct:0, exp:"البروبان CH₃CH₂CH₃ يتكون من 3 ذرات كربون متصلة بسلسلة مستقيمة. يُستخدم كوقود في اسطوانات الغاز المنزلية وفي التدفئة."},
  {id:622, section:"ch9", q:"الصيغة البنائية المكثفة للبروبيل..", options:["-CH₂CH₂CH₃","الألكانات","الألكاينات","الألكينات"], correct:0, exp:"مجموعة البروبيل -CH₂CH₂CH₃ هي مجموعة ألكيل ناتجة عن نزع ذرة هيدروجين من البروبان. تُضاف كمجموعة بديلة على السلسلة الرئيسية عند تسمية الألكانات."},
  {id:623, section:"ch9", q:"صيغة الأيزوبيوتان..", options:["الألكاينات","الألكينات","CH₃CH(CH₃)₂","الألكانات"], correct:2, exp:"الأيزوبيوتان CH₃CH(CH₃)₂ هو متشكل للبيوتان العادي، حيث تتفرع مجموعة ميثيل على الكربون الثاني. التفرع يقلل من درجة الغليان مقارنة بالسلسلة المستقيمة."},
  {id:624, section:"ch9", q:"الصيغة البنائية المكثفة CH₃(CH₂)₅CH₃ تسمى..", options:["الألكاينات","هبتان","الألكانات","الألكينات"], correct:1, exp:"هذه الصيغة تحتوي 7 ذرات كربون في سلسلة مستقيمة، فتُسمى هبتان (heptane). المقطع hepta يعني سبعة باللاتينية، واللاحقة (ان) تدل على ألكان."},
  {id:625, section:"ch9", q:"أي الصيغ البنائية التالية تمثل صيغة 2-ميثيل بيوتان؟", options:["الألكينات","الألكاينات","الألكانات","CH₃CH(CH₃)CH₂CH₃"], correct:3, exp:"في 2-ميثيل بيوتان، السلسلة الرئيسية هي بيوتان (4 كربون) مع مجموعة ميثيل CH₃ على الكربون رقم 2. الترقيم يبدأ من الطرف الأقرب للتفرع لإعطاء أصغر رقم."},
  {id:626, section:"ch9", q:"الصيغة البنائية للمركب (2،2-ثنائي ميثيل بنتان)..", options:["CH₃-C(CH₃)₂-CH₂CH₂CH₃","الألكينات","الألكاينات","الألكانات"], correct:0, exp:"السلسلة الرئيسية بنتان (5 كربون) مع مجموعتي ميثيل على الكربون رقم 2. كلمة (ثنائي) تعني وجود مجموعتين متماثلتين على نفس ذرة الكربون."},
  {id:627, section:"ch9", q:"اسم المركب الحلقي الخماسي المرتبط بمجموعة إيثيل..", options:["الألكينات","إيثيل بنتان حلقي","الألكاينات","الألكانات"], correct:1, exp:"يُسمى إيثيل بنتان حلقي: (بنتان حلقي) لأن الحلقة خماسية، و(إيثيل) هي المجموعة البديلة المرتبطة بالحلقة. الألكانات الحلقية تشبه الألكانات المفتوحة لكن بصيغة CnH₂n."},
  {id:628, section:"ch9", q:"اسم المركب الحلقي الرباعي المرتبط بمجموعة ميثيل..", options:["ميثيل بيوتان حلقي","الألكينات","الألكانات","الألكاينات"], correct:0, exp:"يُسمى ميثيل بيوتان حلقي: (بيوتان حلقي) لأن الحلقة رباعية (4 كربون)، و(ميثيل) هي المجموعة البديلة. عند وجود بديل واحد لا حاجة لترقيم."},
  {id:629, section:"ch9", q:"الألكينات تحوي..", options:["الألكينات","الألكانات","الألكاينات","رابطة ثنائية"], correct:3, exp:"الألكينات هيدروكربونات غير مشبعة تحتوي على رابطة ثنائية واحدة على الأقل بين ذرتي كربون. الرابطة الثنائية تتكون من رابطة سيجما ورابطة باي، وتجعل الجزيء أكثر تفاعلاً."},
  {id:630, section:"ch9", q:"الصيغة العامة للألكينات..", options:["الألكينات","الألكاينات","CnH2n","الألكانات"], correct:2, exp:"الصيغة العامة CnH₂n تعني أن الألكينات تحتوي ذرتي هيدروجين أقل من الألكان المقابل. هذا النقص بسبب تكوّن الرابطة الثنائية التي تستهلك ذرتي هيدروجين."},
  {id:631, section:"ch9", q:"المركب CH₃CH=CHCH₃ يسمى..", options:["الألكاينات","الألكانات","الألكينات","2-بيوتين"], correct:3, exp:"يُسمى 2-بيوتين لأن الرابطة الثنائية تقع على الكربون رقم 2 من سلسلة بيوتان (4 كربون). الترقيم يبدأ من الطرف الأقرب للرابطة الثنائية."},
  {id:632, section:"ch9", q:"الاسم النظامي لمركب حلقي خماسي برابطة ثنائية ومجموعتي ميثيل متجاورتين..", options:["1،2-ثنائي ميثيل بنتين حلقي","الألكاينات","الألكينات","الألكانات"], correct:0, exp:"الاسم الصحيح هو 1،2-ثنائي ميثيل بنتين حلقي. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:633, section:"ch9", q:"الاسم النظامي لمركب هكسين حلقي مرتبط بميثيل وبروبيل..", options:["الألكانات","الألكينات","1-ميثيل-2-بروبيل هكسين حلقي","الألكاينات"], correct:2, exp:"الاسم الصحيح هو 1-ميثيل-2-بروبيل هكسين حلقي. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:634, section:"ch9", q:"أي المركبات التالية يحوي رابطة باي؟", options:["C₂H₄","الألكينات","الألكاينات","الألكانات"], correct:0, exp:"C₂H₄ (الإيثيلين) يحتوي رابطة باي π ضمن الرابطة الثنائية بين ذرتي الكربون. رابطة باي تنشأ من التداخل الجانبي بين أوربيتالات p المتوازية."},
  {id:635, section:"ch9", q:"هيدروكربون له نفس نوع الهيدروكربون ذو الصيغة C₃H₆..", options:["الألكينات","C₂H₄","الألكاينات","الألكانات"], correct:1, exp:"الصيغة الصحيحة هي C₂H₄. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:636, section:"ch9", q:"أي المركبات التالية يصنف ضمن الألكاينات؟", options:["C₂H₂","الألكاينات","الألكانات","الألكينات"], correct:0, exp:"C₂H₂ (الأسيتيلين) ينتمي للألكاينات لأنه يحتوي رابطة ثلاثية بين ذرتي الكربون. صيغته العامة CnH₂n₋₂ وهو أبسط عضو في سلسلة الألكاينات."},
  {id:637, section:"ch9", q:"المركب CH₃CH₂C≡CH يسمى..", options:["الألكينات","1-بيوتاين","الألكانات","الألكاينات"], correct:1, exp:"يُسمى 1-بيوتاين: السلسلة الرئيسية 4 كربون (بيوت) واللاحقة (اين) تدل على رابطة ثلاثية على الكربون رقم 1. الترقيم يعطي أصغر رقم للرابطة الثلاثية."},
  {id:638, section:"ch9", q:"ظاهرة وجود أكثر من صيغة بنائية لنفس الصيغة الجزيئية..", options:["الألكينات","الألكانات","التشكل","الألكاينات"], correct:2, exp:"التشكل (الأيزوميرية) يعني وجود مركبات لها نفس الصيغة الجزيئية لكن تختلف في ترتيب الذرات. هذا الاختلاف ينتج خواص فيزيائية مختلفة رغم تطابق التركيب العنصري."},
  {id:639, section:"ch9", q:"المتشكلات الناتجة عن اختلاف ترتيب المجموعات واتجاهها حول الرابطة الثنائية..", options:["الألكينات","الألكاينات","الألكانات","متشكلات هندسية"], correct:3, exp:"الإجابة الصحيحة هي متشكلات هندسية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:640, section:"ch9", q:"أي المصطلحات التالية يصف بدقة L-ألانين و D-ألانين؟", options:["الألكانات","الألكينات","الألكاينات","متشكلات ضوئية"], correct:3, exp:"الإجابة الصحيحة هي متشكلات ضوئية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:641, section:"ch9", q:"ما التشابه بين المتشكلات؟", options:["الألكينات","الخواص الكيميائية","الألكاينات","الألكانات"], correct:1, exp:"الإجابة الصحيحة هي الخواص الكيميائية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:642, section:"ch9", q:"أي التالية ليست من أنواع المتشكلات؟", options:["الألكانات","الألكينات","الألكاينات","المتشكلات الذرية"], correct:3, exp:"الإجابة الصحيحة هي المتشكلات الذرية. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:643, section:"ch9", q:"مركب عضوي به حلقة بنزين..", options:["الألكاينات","الألكانات","الألكينات","هيدروكربون أروماتي"], correct:3, exp:"الإجابة الصحيحة هي هيدروكربون أروماتي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:644, section:"ch9", q:"البنزين يعتبر من..", options:["المركبات الأروماتية","الألكاينات","الألكينات","الألكانات"], correct:0, exp:"البنزين C₆H₆ أبسط المركبات الأروماتية، وتتميز حلقته بنظام إلكترونات باي π غير متمركزة فوق وتحت مستوى الحلقة. هذا التوزيع يمنح البنزين استقراراً كبيراً وخواص كيميائية مميزة."},
  {id:645, section:"ch9", q:"اسم حلقة البنزين المرتبطة بمجموعة إيثيل..", options:["الألكانات","الألكاينات","إيثيل بنزين","الألكينات"], correct:2, exp:"الإجابة الصحيحة هي إيثيل بنزين. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:646, section:"ch9", q:"حلقة بنزين مرتبطة بمجموعتي ميثيل في الموقعين 1 و 4 تُسمى..", options:["الألكينات","الألكاينات","1،4-ثنائي ميثيل بنزين","الألكانات"], correct:2, exp:"الإجابة الصحيحة هي 1،4-ثنائي ميثيل بنزين. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:647, section:"ch9", q:"مادة مسرطنة توجد في سناج المداخن..", options:["الألكينات","البنزوبايرين","الألكاينات","الألكانات"], correct:1, exp:"البنزوبايرين مركب أروماتي متعدد الحلقات يوجد في دخان السجائر وسناج المداخن. يُصنف كمادة مسرطنة خطيرة لأنه يتفاعل مع الحمض النووي DNA ويسبب طفرات جينية."},
  {id:648, section:"ch9", q:"المركب الذي لا يكوّن روابط هيدروجينية بين جزيئاته..", options:["الألكاينات","الألكينات","الألكانات","CH₃-O-CH₃"], correct:3, exp:"الإجابة الصحيحة هي CH₃-O-CH₃. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:649, section:"ch9", q:"يطلق على حمض الأكساليك والأديبيك..", options:["الألكينات","ثنائي الحمض","الألكانات","الألكاينات"], correct:1, exp:"الإجابة الصحيحة هي ثنائي الحمض. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:650, section:"ch9", q:"الصيغة المكثفة لهكسانوات الميثيل..", options:["الألكينات","CH₃(CH₂)₄COOCH₃","الألكاينات","الألكانات"], correct:1, exp:"الصيغة الصحيحة هي CH₃(CH₂)₄COOCH₃. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:651, section:"ch9", q:"الصيغة البنائية المكثفة للأسيتاميد..", options:["الألكينات","الألكاينات","الألكانات","CH₃CONH₂"], correct:3, exp:"الصيغة الصحيحة هي CH₃CONH₂. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:652, section:"ch9", q:"جميع الروابط بين ذرات الكربون أحادية في..", options:["الألكانات","الألكاينات","الألكينات","الدهون المشبعة"], correct:3, exp:"الإجابة الصحيحة هي الدهون المشبعة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:653, section:"ch10", q:"ما الاسم النظامي للمركب الحلقي الخماسي المرتبط بكلور؟", options:["الأمينات","الإيثرات","كلورو بنتان حلقي","الكحولات"], correct:2, exp:"يُسمى كلورو بنتان حلقي: نسمي الهالوجين أولاً بإضافة (و) ثم اسم الحلقة. الهالوجينات تُعد من أبسط المجموعات البديلة على الحلقات."},
  {id:654, section:"ch10", q:"أبسط مجموعة وظيفية ترتبط مع الهيدروكربونات..", options:["الهالوجينات","الكحولات","الإيثرات","الأمينات"], correct:0, exp:"الإجابة الصحيحة هي الهالوجينات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:655, section:"ch10", q:"الصيغة العامة لهاليدات الألكيل..", options:["الإيثرات","الكحولات","R-X","الأمينات"], correct:2, exp:"الصيغة الصحيحة هي R-X. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:656, section:"ch10", q:"اسم المركب CH₃CH₂CH₂Cl..", options:["الإيثرات","الأمينات","1-كلورو بروبان","الكحولات"], correct:2, exp:"الاسم الصحيح هو 1-كلورو بروبان. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:657, section:"ch10", q:"اسم المركب المكون من حلقة بنزين مرتبطة بكلور..", options:["الأمينات","كلورو بنزين","الكحولات","الإيثرات"], correct:1, exp:"الاسم الصحيح هو كلورو بنزين. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:658, section:"ch10", q:"مركب بنتان حلقي مرتبط بذرّتي بروم متجاورتين..", options:["الكحولات","1،2-ثنائي برومو بنتان حلقي","الإيثرات","الأمينات"], correct:1, exp:"الإجابة الصحيحة هي 1،2-ثنائي برومو بنتان حلقي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:659, section:"ch10", q:"المركب الذي له أعلى درجة غليان..", options:["الأمينات","1-يودو البنتان","الكحولات","الإيثرات"], correct:1, exp:"الإجابة الصحيحة هي 1-يودو البنتان. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:660, section:"ch10", q:"أي المشتقات الهيدروكربونية التالية له الصيغة R-OH؟", options:["الألدهيدات","الإيثرات","الكحولات","الأمينات"], correct:2, exp:"الصيغة الصحيحة هي الكحولات. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:661, section:"ch10", q:"المركب الأكثر قابلية للذوبان في الماء هو..", options:["الكحولات","الأمينات","CH₃CH₂OH","الإيثرات"], correct:2, exp:"الإجابة هي CH₃CH₂OH. درجة الغليان تعتمد على قوة الروابط بين الجزيئية: الروابط الهيدروجينية أقوى من ثنائية القطبية وأقوى من قوى التشتت. كلما زادت الكتلة المولية وزادت القطبية ارتفعت درجة الغليان."},
  {id:662, section:"ch10", q:"المجموعة الوظيفية في الكحولات..", options:["الهيدروكسيل (-OH)","الأمينات","الكحولات","الإيثرات"], correct:0, exp:"الإجابة الصحيحة هي الهيدروكسيل (-OH). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:663, section:"ch10", q:"أي الصيغ التالية يصنف على أنه كحول؟", options:["الإيثرات","CH₃CH₂OH","الكحولات","الأمينات"], correct:1, exp:"يُصنف ضمن CH₃CH₂OH بناءً على المجموعة الوظيفية الموجودة في المركب. المجموعة الوظيفية هي جزء من الجزيء يحدد سلوكه الكيميائي: -OH كحول، -COOH حمض كربوكسيلي، -CHO ألدهيد، C=O كيتون."},
  {id:664, section:"ch10", q:"أي الصيغ الكيميائية التالية تمثل الإيثانول؟", options:["الأمينات","CH₃CH₂OH","الإيثرات","الكحولات"], correct:1, exp:"الإجابة الصحيحة هي CH₃CH₂OH. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:665, section:"ch10", q:"كحول يحوي أكثر من مجموعة هيدروكسيل..", options:["الأمينات","الكحولات","الإيثرات","الجليسرول"], correct:3, exp:"الإجابة الصحيحة هي الجليسرول. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:666, section:"ch10", q:"أي الصيغ التالية يمثل الإيثرات؟", options:["الأمينات","الكحولات","R-O-R\'","الإيثرات"], correct:2, exp:"الإجابة الصحيحة هي R-O-R\\'. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:667, section:"ch10", q:"إلى أي المجموعات العضوية ينتمي المركب CH₃CH₂-O-CH₂CH₃؟", options:["الكحولات","الألدهيدات","الأمينات","الإيثرات"], correct:3, exp:"يُصنف ضمن الإيثرات بناءً على المجموعة الوظيفية الموجودة في المركب. المجموعة الوظيفية هي جزء من الجزيء يحدد سلوكه الكيميائي: -OH كحول، -COOH حمض كربوكسيلي، -CHO ألدهيد، C=O كيتون."},
  {id:668, section:"ch10", q:"يمكن تسمية المركب العضوي CH₃-O-CH₃ بـ..", options:["ثنائي ميثيل إيثر","الإيثرات","الأمينات","الكحولات"], correct:0, exp:"الإجابة الصحيحة هي ثنائي ميثيل إيثر. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:669, section:"ch10", q:"المركب العضوي CH₃CH₂-O-CH₃ يسمى..", options:["الأمينات","الإيثرات","إيثيل ميثيل إيثر","الكحولات"], correct:2, exp:"الإجابة الصحيحة هي إيثيل ميثيل إيثر. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:670, section:"ch10", q:"المجموعة الوظيفية في الألدهيدات..", options:["الكحولات","الإيثرات","الكربونيل","الأمينات"], correct:2, exp:"الإجابة الصحيحة هي الكربونيل. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:671, section:"ch10", q:"اسم المركب HCHO..", options:["ميثانال (فورمالدهيد)","الأمينات","الإيثرات","الكحولات"], correct:0, exp:"الاسم الصحيح هو ميثانال (فورمالدهيد). في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:672, section:"ch10", q:"المركب CH₃-CO-CH₂CH₃ ينتمي إلى مجموعة..", options:["الكحولات","الإيثرات","الكيتونات","الأمينات"], correct:2, exp:"يُصنف ضمن الكيتونات بناءً على المجموعة الوظيفية الموجودة في المركب. المجموعة الوظيفية هي جزء من الجزيء يحدد سلوكه الكيميائي: -OH كحول، -COOH حمض كربوكسيلي، -CHO ألدهيد، C=O كيتون."},
  {id:673, section:"ch10", q:"أي المركبات التالية تستخدم مذيبات شائعة للمواد القطبية؟", options:["الكيتونات","الكحولات","الإيثرات","الأمينات"], correct:0, exp:"الإجابة الصحيحة هي الكيتونات. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:674, section:"ch10", q:"ماذا ينتج عن اختزال الأسيتون؟", options:["الكحولات","2-بروبانول","الإيثرات","الأمينات"], correct:1, exp:"الناتج هو 2-بروبانول. يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:675, section:"ch10", q:"عند أكسدة 2-بروبانول ينتج..", options:["الأمينات","الإيثرات","2-بروبانون (أسيتون)","الكحولات"], correct:2, exp:"الإجابة الصحيحة هي 2-بروبانون (أسيتون). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:676, section:"ch10", q:"يصنف المركب العضوي CH₃COOH إلى..", options:["الإيثرات","الأحماض الكربوكسيلية","الكحولات","الأمينات"], correct:1, exp:"يُصنف ضمن الأحماض الكربوكسيلية بناءً على المجموعة الوظيفية الموجودة في المركب. المجموعة الوظيفية هي جزء من الجزيء يحدد سلوكه الكيميائي: -OH كحول، -COOH حمض كربوكسيلي، -CHO ألدهيد، C=O كيتون."},
  {id:677, section:"ch10", q:"أي التالي يصنف من ضمن الأحماض الكربوكسيلية؟", options:["الكحولات","الإيثرات","CH₃COOH","الأمينات"], correct:2, exp:"الإجابة الصحيحة هي CH₃COOH. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:678, section:"ch10", q:"الحمض الموجود في الخل..", options:["الكحولات","الإيثانوئيك (حمض الخليك)","الأمينات","الإيثرات"], correct:1, exp:"الإجابة الصحيحة هي الإيثانوئيك (حمض الخليك). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:679, section:"ch10", q:"اسم المركب الذي صيغته CH₃COOH..", options:["الكحولات","حمض الخل","الإيثرات","الأمينات"], correct:1, exp:"الاسم الصحيح هو حمض الخل. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:680, section:"ch10", q:"يدافع النمل عن نفسه بإفراز حمض..", options:["الإيثرات","الأمينات","الكحولات","الميثانوئيك (الفورميك)"], correct:3, exp:"الإجابة الصحيحة هي الميثانوئيك (الفورميك). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:681, section:"ch10", q:"أي المركبات التالية حمض كربوكسيلي؟", options:["الإيثرات","الأمينات","CH₃COOH","الكحولات"], correct:2, exp:"الإجابة الصحيحة هي CH₃COOH. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:682, section:"ch10", q:"مركبان: CH₃COOH و CH₃CH₂OH، الثاني كحول والأول..", options:["الأمينات","الكحولات","الإيثرات","حمض كربوكسيلي"], correct:3, exp:"الإجابة الصحيحة هي حمض كربوكسيلي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:683, section:"ch10", q:"الصيغة العامة للإسترات..", options:["الإيثرات","الكحولات","RCOOR\'","الأمينات"], correct:2, exp:"الصيغة الصحيحة هي RCOOR\\'. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:684, section:"ch10", q:"أي المركبات التالية لا تحوي مجموعة كربونيل؟", options:["الكحولات","الإيثرات","الأمينات","الألدهيدات"], correct:0, exp:"الإجابة الصحيحة هي الكحولات. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:685, section:"ch10", q:"أي المركبات التالية تكون روابط هيدروجينية بين جزيئاتها؟", options:["الكحولات","الإيثرات","الأمينات","CH₃COOH"], correct:3, exp:"الإجابة الصحيحة هي CH₃COOH. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:686, section:"ch10", q:"أي المركبات التالية يذوب أكثر في الماء؟", options:["الكحولات","الحمض الكربوكسيلي","الأمينات","الإيثرات"], correct:1, exp:"الإجابة الصحيحة هي الحمض الكربوكسيلي. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:687, section:"ch10", q:"المركب الأعلى في درجة الغليان..", options:["CH₃COOH","الأمينات","الكحولات","الإيثرات"], correct:0, exp:"الإجابة هي CH₃COOH. درجة الغليان تعتمد على قوة الروابط بين الجزيئية: الروابط الهيدروجينية أقوى من ثنائية القطبية وأقوى من قوى التشتت. كلما زادت الكتلة المولية وزادت القطبية ارتفعت درجة الغليان."},
  {id:688, section:"ch10", q:"إلى أي المجموعات العضوية تنتمي الصيغة العامة R-CO-NHR\'؟", options:["الأمينات","الكحولات","الإيثرات","الأميدات"], correct:3, exp:"الصيغة الصحيحة هي الأميدات. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:689, section:"ch10", q:"نوع المركب H-CO-NH₂..", options:["أميد","الإيثرات","الأمينات","الكحولات"], correct:0, exp:"الإجابة هي أميد. يُحدد نوع التفاعل أو المركب من تحليل بنيته وطبيعة التغيير: تفاعلات الإضافة تكسر الروابط المتعددة، والاستبدال تحل ذرة محل أخرى، والحذف تزيل ذرات لتكوين رابطة متعددة."},
  {id:690, section:"ch10", q:"نوع التفاعل CH₂=CH₂ + H₂ → CH₃-CH₃..", options:["إضافة","الأمينات","الإيثرات","الكحولات"], correct:0, exp:"نوع هذا هو إضافة. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:691, section:"ch10", q:"ينتج عن أكسدة المركب CH₃OH..", options:["HCHO (ميثانال)","الأمينات","الإيثرات","الكحولات"], correct:0, exp:"الناتج هو HCHO (ميثانال). يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:692, section:"ch10", q:"ما التفاعل الذي يحول الكحول إلى ألكين؟", options:["الأمينات","حذف","الإيثرات","الكحولات"], correct:1, exp:"الإجابة الصحيحة هي حذف. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:693, section:"ch10", q:"أكسدة كحول أولي تعطي..", options:["الكحولات","ألدهيد","الأمينات","الإيثرات"], correct:1, exp:"الإجابة الصحيحة هي ألدهيد. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:694, section:"ch10", q:"إضافة الهيدروجين إلى الألكين ينتج عنه..", options:["الإيثرات","الكحولات","الأمينات","ألكان"], correct:3, exp:"الناتج هو ألكان. يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:695, section:"ch10", q:"ماذا ينتج عند إضافة الماء إلى البروبين بمساعدة حمض الكبريتيك المركز؟", options:["الإيثرات","الكحولات","2-بروبانول","الأمينات"], correct:2, exp:"الناتج هو 2-بروبانول. يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:696, section:"ch10", q:"تفاعل الإيثان مع الكلور (الهلجنة)..", options:["الكحولات","الإيثرات","استبدال","الأمينات"], correct:2, exp:"الإجابة الصحيحة هي استبدال. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:697, section:"ch10", q:"نوع التفاعل C₂H₆ + Cl₂ → C₂H₅Cl + HCl..", options:["الكحولات","الإيثرات","الأمينات","استبدال (إحلال)"], correct:3, exp:"نوع هذا هو استبدال (إحلال). يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:698, section:"ch10", q:"جزيئات كبيرة تتكون من العديد من الوحدات البنائية المتكررة..", options:["البوليمرات","الإيثرات","الكحولات","الأمينات"], correct:0, exp:"الإجابة الصحيحة هي البوليمرات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:699, section:"ch10", q:"أي المركبات التالية تعد مادة صناعية؟", options:["الإيثرات","البلاستيك","الكحولات","الأمينات"], correct:1, exp:"الإجابة الصحيحة هي البلاستيك. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:700, section:"ch10", q:"أي الخصائص التالية ليست من خصائص البولي إيثيلين؟", options:["الإيثرات","نشط كيميائياً","الكحولات","الأمينات"], correct:1, exp:"الإجابة الصحيحة هي نشط كيميائياً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:701, section:"ch10", q:"الاسم النظامي لـ PVC هو..", options:["بولي كلوريد الفينيل","الأمينات","الإيثرات","الكحولات"], correct:0, exp:"الاسم الصحيح هو بولي كلوريد الفينيل. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:702, section:"ch11", q:"المجموعة الوظيفية في CH₃-NH₂..", options:["الأمين","الكربوهيدرات","البروتينات","الليبيدات"], correct:0, exp:"الإجابة الصحيحة هي الأمين. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},

function removeDuplicateQuestions(questions) { const seen = new Set(); return questions.filter(q => { const key = q.q.trim(); if (seen.has(key)) return false; seen.add(key); return true; }); }
function getQuestionsBySection(secId) { return removeDuplicateQuestions(ALL_CHEM_QUESTIONS.filter(q => q.section === secId)); }

let state = { selectedSection: 'all', questions: [], currentIdx: 0, answers: {}, timerInterval: null, timeLimitSec: 120, warningAt: 30, timerActive: true, isRetest: false, wrongIds: [] };
function formatTime(sec) { const m = Math.floor(sec/60).toString().padStart(2,'0'); const s = (sec%60).toString().padStart(2,'0'); return `${m}:${s}`; }
function renderHome() {
  const grid = document.getElementById('sectionsGrid');
  const uniqueAll = removeDuplicateQuestions(ALL_CHEM_QUESTIONS);
  document.getElementById('totalQCount').textContent = uniqueAll.length + ' سؤال';
  grid.innerHTML = CHEM_SECTIONS.map(sec => {
    const count = getQuestionsBySection(sec.id).length;
    return `<div class="section-card" style="--primary:${sec.color}" onclick="selectSection('${sec.id}')"><span class="check-mark">✅</span><span class="icon">${sec.icon}</span><h3>${sec.name}</h3><span class="q-badge" style="background:${sec.color}">${count} سؤال</span></div>`;
  }).join('');
}
function selectSection(id) { state.selectedSection = id; document.querySelectorAll('.section-card, .full-exam-card').forEach(c=>c.classList.remove('selected')); if(id==='all') document.getElementById('fullExamCard').classList.add('selected'); else document.querySelector(`.section-card[onclick*="${id}"]`)?.classList.add('selected'); document.getElementById('startBtn').disabled = false; }
function startExam(retestWrong = false) {
  let pool = [];
  if (retestWrong) { pool = ALL_CHEM_QUESTIONS.filter(q => state.wrongIds.includes(q.id)); state.isRetest = true; }
  else { pool = state.selectedSection === 'all' ? [...ALL_CHEM_QUESTIONS] : getQuestionsBySection(state.selectedSection); state.isRetest = false; }
  pool = removeDuplicateQuestions(pool);
  if (pool.length===0) { alert('لا توجد أسئلة!'); return; }
  const shuffle = document.getElementById('shuffleCheck').checked;
  if (shuffle) pool = pool.sort(()=>Math.random()-0.5);
  const qCount = document.getElementById('qCountSelect').value;
  if (qCount !== 'all') pool = pool.slice(0, parseInt(qCount));
  state.questions = pool; state.currentIdx = 0; state.answers = {}; state.timerActive = document.getElementById('timerCheck').checked;
  document.getElementById('examTitleSpan').textContent = state.isRetest ? '🔁 مراجعة الأخطاء' : (state.selectedSection==='all'?'الاختبار الشامل': CHEM_SECTIONS.find(s=>s.id===state.selectedSection)?.name);
  document.getElementById('homeFloatBtn').style.display = 'block'; switchScreen('examScreen'); renderQuestion(); startQuestionTimer();
}
function switchScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function goHome() { clearInterval(state.timerInterval); document.getElementById('homeFloatBtn').style.display = 'none'; switchScreen('homeScreen'); }
function startQuestionTimer() {
  clearInterval(state.timerInterval);
  if (!state.timerActive) { document.getElementById('questionTimer').textContent = '--:--'; return; }
  state.questionStartTime = Date.now();
  state.timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - state.questionStartTime) / 1000);
    const remaining = Math.max(0, state.timeLimitSec - elapsed);
    const timerSpan = document.getElementById('questionTimer');
    timerSpan.textContent = formatTime(remaining);
    timerSpan.classList.toggle('warning', remaining <= state.warningAt);
    if (remaining <= 0) { clearInterval(state.timerInterval); if (state.currentIdx < state.questions.length-1) nextQuestion(); else showEndConfirm(); }
  }, 200);
}
function renderQuestion() {
  const q = state.questions[state.currentIdx]; const total = state.questions.length; const answered = Object.keys(state.answers).length;
  document.getElementById('progressText').textContent = `${state.currentIdx+1}/${total} (أجبت ${answered})`;
  const userAns = state.answers[q.id]; const letters = ['أ','ب','ج','د'];
  document.getElementById('questionPanel').innerHTML = `<div class="q-meta"><span>${CHEM_SECTIONS.find(s=>s.id===q.section)?.icon} ${CHEM_SECTIONS.find(s=>s.id===q.section)?.name}</span><span>⚡ سؤال ${state.currentIdx+1}</span></div><div class="q-text">${q.q}</div><ul class="options-list">${q.options.map((opt,i)=>`<li class="option-item ${userAns===i?'selected':''}" onclick="selectAnswer(${q.id},${i})"><span class="option-letter">${letters[i]}</span><span>${opt}</span></li>`).join('')}</ul>`;
  document.getElementById('prevBtn').disabled = state.currentIdx === 0;
  const isLast = state.currentIdx === total-1;
  document.getElementById('nextBtn').textContent = isLast ? '🏁 إنهاء' : 'التالي ◀';
  document.getElementById('nextBtn').onclick = isLast ? showEndConfirm : nextQuestion;
  startQuestionTimer();
}
function selectAnswer(qId, optIdx) { state.answers[qId] = optIdx; renderQuestion(); }
function nextQuestion() { if (state.currentIdx < state.questions.length-1) { state.currentIdx++; renderQuestion(); } }
function prevQuestion() { if (state.currentIdx > 0) { state.currentIdx--; renderQuestion(); } }
function showEndConfirm() { document.getElementById('modalMsg').textContent = state.questions.filter(q=> state.answers[q.id]===undefined).length ? 'لديك أسئلة غير مجابة. إنهاء؟' : 'جاهز لرؤية النتيجة؟'; document.getElementById('confirmModal').style.display = 'flex'; }
function closeModal() { document.getElementById('confirmModal').style.display = 'none'; }
function forceEndExam() { closeModal(); finishExam(); }
function finishExam() {
  clearInterval(state.timerInterval); let correct=0, wrong=0, skip=0; const wrongIds = [];
  state.questions.forEach(q=>{ const ans = state.answers[q.id]; if (ans === undefined) skip++; else if (ans === q.correct) correct++; else { wrong++; wrongIds.push(q.id); } });
  state.wrongIds = wrongIds; const total = state.questions.length; const pct = Math.round((correct/total)*100);
  document.getElementById('finalScore').textContent = pct+'%';
  document.getElementById('gradeMsg').textContent = pct>=90?'🌟 ممتاز':pct>=75?'👏 جيد جداً':pct>=60?'👍 جيد':'📖 يحتاج مراجعة';
  document.getElementById('correctStat').textContent = correct; document.getElementById('wrongStat').textContent = wrong; document.getElementById('skipStat').textContent = skip;
  document.getElementById('retestWrongBtn').style.display = wrongIds.length>0 ? 'inline-flex':'none';
  buildReviewList(); switchScreen('resultsScreen');
}
function buildReviewList() {
  const container = document.getElementById('reviewList'); const letters = ['أ','ب','ج','د'];
  container.innerHTML = state.questions.map(q=>{
    const ua = state.answers[q.id]; const isSkip = ua===undefined; const isCorrect = !isSkip && ua===q.correct;
    return `<div class="review-item ${isSkip?'skip-card':(isCorrect?'correct-card':'wrong-card')}" data-status="${isSkip?'skip':(isCorrect?'correct':'wrong')}">
      <strong>${isSkip?'⏭ لم تجب':(isCorrect?'✅ صحيح':'❌ خطأ')}</strong> · ${CHEM_SECTIONS.find(s=>s.id===q.section)?.name}<br>
      <div style="margin:10px 0; font-weight:600;">${q.q}</div>
      ${!isSkip && !isCorrect ? `<div style="margin:10px 0;">❌ إجابتك: ${letters[ua]}. ${q.options[ua]}</div>` : ''}
      <div style="background:#eaf7ea; padding:10px; border-radius:12px;">✅ الإجابة الصحيحة: ${letters[q.correct]}. ${q.options[q.correct]}</div>
      <div class="explain-box"><strong>💡 شرح:</strong> ${q.exp}</div>
    </div>`;
  }).join('');
}
function filterReview(type, btn) { document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.review-item').forEach(card=>{ card.style.display = (type==='all' || card.dataset.status===type) ? 'block':'none'; }); }
function startRetestWrong() { if (state.wrongIds.length===0) return; switchScreen('homeScreen'); setTimeout(()=> startExam(true), 50); }
function restartSameExam() { switchScreen('homeScreen'); setTimeout(()=> startExam(false), 50); }
document.addEventListener('DOMContentLoaded', ()=>{ renderHome(); selectSection('all'); });
</script>
