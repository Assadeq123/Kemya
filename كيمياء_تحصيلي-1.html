<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🧪 الاختبار الشامل في الكيمياء | تحصيلي 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0b3d5f; --primary-light: #1e6f9f; --secondary: #f39c12; --accent: #c0392b;
      --bg: #f4f7fc; --card: #ffffff; --text: #1e2a3a; --muted: #5e6f8d;
      --radius: 20px; --shadow: 0 10px 30px rgba(0,20,40,0.08);
      --correct: #27ae60; --wrong: #e74c3c; --skip: #e67e22;
    }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 16px; line-height: 1.6; }
    .screen { display: none; padding-bottom: 30px; }
    .screen.active { display: block; }
    .app-header { background: linear-gradient(145deg, #0b3d5f 0%, #1a5276 100%); color: white; padding: 28px 20px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .app-header h1 { font-size: 1.8rem; font-weight: 800; }
    .container { max-width: 1000px; margin: 20px auto; padding: 0 16px; }
    .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin: 20px 0; }
    .section-card { background: var(--card); border-radius: 16px; padding: 16px 12px; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; transition: all 0.2s; position: relative; border-right: 5px solid var(--primary-light); }
    .section-card:hover { transform: translateY(-4px); }
    .section-card.selected { border: 2px solid var(--primary); background: #eef7ff; }
    .section-card .icon { font-size: 1.7rem; margin-bottom: 6px; }
    .section-card h3 { font-size: 0.92rem; font-weight: 700; line-height: 1.3; }
    .q-badge { background: var(--primary-light); color: white; border-radius: 20px; padding: 2px 10px; font-size: 0.7rem; display: inline-block; margin-top: 8px; }
    .check-mark { position: absolute; top: 10px; left: 12px; font-size: 1.1rem; display: none; }
    .section-card.selected .check-mark { display: block; }
    .full-exam-card { background: linear-gradient(135deg, #1a5276, #0b3d5f); color: white; border-radius: 22px; padding: 22px; text-align: center; cursor: pointer; margin-bottom: 20px; }
    .full-exam-card.selected { border: 2px solid var(--secondary); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 28px; border-radius: 40px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 1rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-danger { background: var(--accent); color: white; }
    .exam-topbar { background: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 30; border-bottom: 1px solid #e0e8f0; }
    .timer-question { background: #f0f4fa; padding: 6px 16px; border-radius: 30px; font-weight: 700; font-size: 1.4rem; color: var(--primary); }
    .timer-question.warning { color: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .question-panel { background: var(--card); border-radius: 24px; padding: 24px 20px; margin: 16px 0 90px; box-shadow: var(--shadow); }
    .q-meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 10px; display: flex; justify-content: space-between; }
    .q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 22px; line-height: 1.7; }
    .options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .option-item { background: #f9fbfd; border: 2px solid #dde3ed; border-radius: 14px; padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .option-item.selected { background: #d4e6ff; border-color: var(--primary); }
    .option-letter { width: 32px; height: 32px; background: #dde3ed; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
    .option-item.selected .option-letter { background: var(--primary); color: white; }
    .nav-buttons { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 14px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); display: flex; justify-content: space-between; z-index: 25; gap: 10px; }
    .result-header { background: linear-gradient(145deg, #0b3d5f, #1e6f9f); color: white; padding: 30px 20px; text-align: center; }
    .stat-cards { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 16px; }
    .stat-card { background: white; border-radius: 14px; padding: 12px 18px; text-align: center; box-shadow: var(--shadow); min-width: 80px; }
    .review-item { background: white; border-radius: 16px; padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); border-right: 5px solid; }
    .review-item.correct-card { border-color: var(--correct); }
    .review-item.wrong-card { border-color: var(--wrong); }
    .review-item.skip-card { border-color: var(--skip); }
    .explain-box { background: #fff8e7; padding: 14px; border-radius: 12px; margin-top: 14px; border-right: 4px solid #f1c40f; }
    .filter-tabs { display: flex; gap: 8px; margin: 16px; flex-wrap: wrap; }
    .filter-tab { background: #e9ecf2; border: none; padding: 8px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .filter-tab.active { background: var(--primary); color: white; }
    .home-btn { position: fixed; top: 14px; left: 14px; background: white; border-radius: 30px; padding: 6px 14px; font-weight: 700; cursor: pointer; z-index: 50; border: 1px solid #ccc; font-size: 0.9rem; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
    .modal-card { background: white; border-radius: 24px; padding: 24px; max-width: 350px; text-align: center; width: 100%; }
    .settings-card { background: white; border-radius: 18px; padding: 16px; margin-top: 16px; }
    .settings-card label { display: inline-flex; align-items: center; gap: 8px; margin: 8px 14px 8px 0; font-size: 0.95rem; }
    .settings-card select { padding: 6px 10px; border-radius: 20px; border: 1px solid #ccc; font-family: inherit; }
  </style>
</head>
<body>

<div class="home-btn" id="homeFloatBtn" onclick="goHome()" style="display:none;">🏠 الرئيسية</div>

<!-- الشاشة الرئيسية -->
<div class="screen active" id="homeScreen">
  <div class="app-header"><h1>🧪 الاختبار الشامل في الكيمياء</h1><p>تحصيلي 2026 · جميع الفصول مع خيارات حقيقية من كتاب ناصر</p></div>
  <div class="container">
    <div class="full-exam-card" id="fullExamCard" onclick="selectSection('all')">
      <span style="font-size:2rem">📚</span><h2>الاختبار الشامل</h2><p>يشمل جميع الفصول (11 فصل)</p>
      <span class="q-badge" style="background:#f39c12; margin-top:10px;" id="totalQCount">--- سؤال</span>
    </div>
    <h3 style="margin: 20px 0 10px;">📌 اختر فصلاً محدداً</h3>
    <div class="section-grid" id="sectionsGrid"></div>
    <div class="settings-card">
      <label><span>عدد الأسئلة:</span><select id="qCountSelect"><option value="all">كل الأسئلة</option><option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="50">50</option></select></label>
      <label><input type="checkbox" id="shuffleCheck" checked> خلط عشوائي</label>
      <label><input type="checkbox" id="timerCheck" checked> مؤقت دقيقتان</label>
    </div>
    <div style="text-align:center; margin: 24px 0;"><button class="btn btn-primary" id="startBtn" onclick="startExam()" disabled style="padding:14px 44px;">🚀 ابدأ الاختبار</button></div>
  </div>
</div>

<!-- شاشة الاختبار -->
<div class="screen" id="examScreen">
  <div class="exam-topbar">
    <div><strong id="examTitleSpan">الاختبار</strong> <span style="color:var(--muted); font-size:0.85rem;" id="progressText">0/0</span></div>
    <div class="timer-question" id="questionTimer">02:00</div>
  </div>
  <div class="container">
    <div class="question-panel" id="questionPanel"></div>
  </div>
  <div class="nav-buttons">
    <button class="btn btn-outline" onclick="prevQuestion()" id="prevBtn">▶ السابق</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">التالي ◀</button>
  </div>
</div>

<!-- شاشة النتائج -->
<div class="screen" id="resultsScreen">
  <div class="result-header">
    <h2>🎉 انتهى الاختبار</h2>
    <div style="font-size:3rem; font-weight:800; margin:12px 0;" id="finalScore">0%</div>
    <div id="gradeMsg" style="font-size:1.2rem;">جيد</div>
  </div>
  <div class="stat-cards">
    <div class="stat-card"><div style="color:var(--correct); font-size:1.6rem; font-weight:800;" id="correctStat">0</div><div>صحيح</div></div>
    <div class="stat-card"><div style="color:var(--wrong); font-size:1.6rem; font-weight:800;" id="wrongStat">0</div><div>خطأ</div></div>
    <div class="stat-card"><div style="color:var(--skip); font-size:1.6rem; font-weight:800;" id="skipStat">0</div><div>تخطى</div></div>
  </div>
  <div style="text-align:center; margin:16px;">
    <button class="btn btn-danger" id="retestWrongBtn" onclick="startRetestWrong()" style="display:none;">🔁 راجع الأخطاء</button>
    <button class="btn btn-outline" onclick="restartSameExam()">🔄 إعادة</button>
    <button class="btn btn-primary" onclick="goHome()">🏠 الرئيسية</button>
  </div>
  <div class="container">
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterReview('all', this)">الكل</button>
      <button class="filter-tab" onclick="filterReview('wrong', this)">❌ الخطأ</button>
      <button class="filter-tab" onclick="filterReview('correct', this)">✅ الصحيح</button>
      <button class="filter-tab" onclick="filterReview('skip', this)">⏭ لم تجب</button>
    </div>
    <div id="reviewList"></div>
  </div>
</div>

<div class="modal" id="confirmModal"><div class="modal-card"><h3>إنهاء الاختبار؟</h3><p id="modalMsg">لديك أسئلة غير مجابة</p><div style="display:flex; gap:10px; margin-top:18px; justify-content:center;"><button class="btn btn-primary" onclick="forceEndExam()">نعم</button><button class="btn btn-outline" onclick="closeModal()">متابعة</button></div></div></div>

<script>

const CHEM_SECTIONS = [
  { id: 'ch1', name: 'مقدمة في الكيمياء', icon: '🧪', color: '#2c3e50' },
  { id: 'ch2', name: 'نظريات الذرة والجدول الدوري', icon: '⚛️', color: '#16a085' },
  { id: 'ch3', name: 'قوى التجاذب والروابط', icon: '🔗', color: '#8e44ad' },
  { id: 'ch4', name: 'الحساب الكيميائي والغازات والحرارة', icon: '🔢', color: '#c0392b' },
  { id: 'ch5', name: 'سرعة التفاعل والاتزان الكيميائي', icon: '⚖️', color: '#e67e22' },
  { id: 'ch6', name: 'المخاليط والمحاليل', icon: '💨', color: '#2980b9' },
  { id: 'ch7', name: 'الأحماض والقواعد', icon: '🧴', color: '#f39c12' },
  { id: 'ch8', name: 'الكيمياء الكهربائية', icon: '🔋', color: '#27ae60' },
  { id: 'ch9', name: 'الهيدروكربونات', icon: '⛽', color: '#34495e' },
  { id: 'ch10', name: 'مشتقات الهيدروكربونات', icon: '🧬', color: '#9b59b6' },
  { id: 'ch11', name: 'المركبات العضوية الحيوية', icon: '🧫', color: '#1abc9c' }
];
const ALL_CHEM_QUESTIONS = [
  {id:1, section:"ch1", q:"فرع الكيمياء الذي يقوم بدراسة أنواع المواد ومكوناتها؟", options:["الكيمياء التحليلية","الكيمياء العضوية","الكيمياء الفيزيائية","الكيمياء الحيوية"], correct:0, exp:"الكيمياء التحليلية هي الفرع المختص بتحديد مكونات المواد وتحليل تركيبها الكيميائي. تشمل طرق التحليل النوعي لمعرفة نوع المادة، والتحليل الكمي لتحديد كمياتها."},
  {id:2, section:"ch1", q:"علم يقوم بدراسة نظريات تركيب المادة؟", options:["الكيمياء النووية","الكيمياء الذرية","الكيمياء التحليلية","الكيمياء الحيوية"], correct:1, exp:"الكيمياء الذرية تهتم بدراسة البنية الداخلية للذرة ونظريات تركيبها مثل نموذج بور ونظرية الكم. تُعنى بفهم سلوك الإلكترونات والبروتونات والنيوترونات داخل الذرة."},
  {id:3, section:"ch1", q:"فرع الكيمياء الذي يستقصي تحلل مواد التغليف في البيئة؟", options:["الكيمياء التحليلية","الكيمياء البيئية","الكيمياء العضوية","الكيمياء الصناعية"], correct:1, exp:"الكيمياء البيئية تدرس التفاعلات الكيميائية التي تحدث في البيئة وتأثير الملوثات عليها. تشمل دراسة تحلل المواد البلاستيكية ومواد التغليف ومدى تأثيرها على النظام البيئي."},
  {id:4, section:"ch1", q:"الأشعة التي يمتص معظمها غاز الأوزون؟", options:["الأشعة تحت الحمراء","الأشعة السينية","الأشعة فوق البنفسجية","أشعة جاما"], correct:2, exp:"يمتص غاز الأوزون O₃ معظم الأشعة فوق البنفسجية الضارة القادمة من الشمس. بدون طبقة الأوزون ستصل هذه الأشعة إلى سطح الأرض مسببة سرطان الجلد وأضراراً بيئية خطيرة."},
  {id:5, section:"ch1", q:"غاز الأوزون O₃ يوجد في الهواء الجوي ضمن طبقة تُسمى؟", options:["التروبوسفير","الستراتوسفير","الميزوسفير","الثرموسفير"], correct:1, exp:"يتركز غاز الأوزون O₃ في طبقة الستراتوسفير على ارتفاع 15-35 كم من سطح الأرض. تعمل هذه الطبقة كدرع واقٍ يحمي الكائنات الحية من الأشعة فوق البنفسجية الضارة."},
  {id:6, section:"ch1", q:"ما عدد جزيئات الأوزون الناتجة عن 18 ذرة أكسجين؟", options:["6 جزيئات","3 جزيئات","9 جزيئات","18 جزيء"], correct:0, exp:"كل جزيء أوزون O₃ يتكون من 3 ذرات أكسجين. لذلك 18 ذرة أكسجين ÷ 3 ذرات لكل جزيء = 6 جزيئات أوزون."},
  {id:7, section:"ch1", q:"أي المواد التالية يسبب تناقصاً في طبقة الأوزون؟", options:["الأكسجين","الكلوروفلوروكربون (CFCs)","ثاني أكسيد الكربون","النيتروجين"], correct:1, exp:"مركبات الكلوروفلوروكربون (CFCs) هي المسبب الرئيسي لتآكل طبقة الأوزون. عند وصولها للستراتوسفير تتفكك بفعل الأشعة فوق البنفسجية وتُطلق ذرات الكلور التي تدمر جزيئات الأوزون."},
  {id:8, section:"ch1", q:"تمكن من قياس كمية الأوزون؟", options:["العالم أينشتاين","العالم دوبسون","العالم بور","العالم دالتون"], correct:1, exp:"العالم دوبسون هو أول من طوّر جهازاً لقياس تركيز الأوزون في الغلاف الجوي. سُمّيت وحدة قياس الأوزون باسمه (وحدة دوبسون DU) تكريماً لإسهاماته."},
  {id:9, section:"ch1", q:"تمكن الباحث دوبسون من قياس كمية الأوزون الطبيعي وتعادل؟", options:["100 DU","200 DU","300 DU","400 DU"], correct:2, exp:"الإجابة الصحيحة هي 300 DU. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:10, section:"ch1", q:"أي التالي ليس من قواعد السلامة في المختبر؟", options:["لبس النظارات الواقية","لبس معطف المختبر","لبس العدسات اللاصقة","ربط الشعر"], correct:2, exp:"يُمنع ارتداء العدسات اللاصقة في المختبر لأن الأبخرة الكيميائية قد تنحبس تحتها وتسبب ضرراً للعين. يجب ارتداء نظارات واقية بدلاً منها لحماية العينين من المواد الكيميائية."},
  {id:11, section:"ch1", q:"دراسة مركبات CFCs وتفاعلاتها مع غاز الأوزون بدون دليل بيئي تسمى؟", options:["البحث التطبيقي","البحث النظري","البحث التجريبي","البحث الميداني"], correct:1, exp:"الاسم الصحيح هو البحث النظري. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:12, section:"ch1", q:"بحث يُجرى لحل مشكلة محددة؟", options:["البحث النظري","البحث الأساسي","البحث التطبيقي","البحث التاريخي"], correct:2, exp:"البحث التطبيقي يُجرى بهدف إيجاد حلول عملية لمشكلات محددة في الحياة اليومية أو الصناعة. يعتمد على نتائج البحث النظري ويوظفها لتطوير منتجات أو حل تحديات قائمة."},
  {id:13, section:"ch1", q:"كل ما له كتلة ويشغل حيزاً من الفراغ؟", options:["الطاقة","المادة","الحرارة","الضوء"], correct:1, exp:"المادة هي كل شيء له كتلة ويشغل حيزاً من الفراغ. تشمل المواد الصلبة والسائلة والغازية، بينما الطاقة (كالحرارة والضوء) ليست مادة لأنها لا تحقق هذا التعريف."},
  {id:14, section:"ch1", q:"أي التالي يُعد مادة؟", options:["الحرارة","الصوت","الهواء","الضوء"], correct:2, exp:"الهواء يُعد مادة لأن له كتلة (وإن كانت صغيرة) ويشغل حيزاً من الفراغ. أما الحرارة والصوت والضوء فهي أشكال من الطاقة وليست مادة."},
  {id:15, section:"ch1", q:"أي التالي لا يُصنف مادة حسب التعريف العلمي للمادة؟", options:["الماء","الحديد","الحرارة","الهواء"], correct:2, exp:"الحرارة شكل من أشكال الطاقة وليست مادة لأنها لا تمتلك كتلة ولا تشغل حيزاً. الماء والحديد والهواء كلها مواد لأنها تحقق شرطي الكتلة والحجم."},
  {id:16, section:"ch1", q:"أي التالي يمثل مقياساً لكمية المادة فقط؟", options:["الوزن","الكتلة","الحجم","الكثافة"], correct:1, exp:"الكتلة هي مقياس لكمية المادة في الجسم ولا تتغير بتغير المكان. بينما الوزن يتأثر بالجاذبية ويختلف من مكان لآخر، والحجم والكثافة خواص أخرى للمادة."},
  {id:17, section:"ch1", q:"أي العبارات التالية يصف مادة في الحالة الصلبة؟", options:["جسيماتها متلاصقة بقوة","جسيماتها متباعدة","تأخذ شكل الوعاء","تتمدد بسرعة"], correct:0, exp:"في الحالة الصلبة تكون الجسيمات متلاصقة ومتماسكة بقوى تجاذب قوية. لذلك تحتفظ المادة الصلبة بشكلها وحجمها الثابتين، وتهتز جسيماتها في مواقعها دون أن تتحرك بحرية."},
  {id:18, section:"ch1", q:"أي حالات المادة شكلها وحجمها غير ثابتين؟", options:["الصلبة","السائلة","الغازية","البلازما"], correct:2, exp:"في الحالة الغازية تكون الجسيمات متباعدة جداً وتتحرك بحرية وسرعة عالية. لذلك ليس للغاز شكل أو حجم ثابت، بل يملأ الوعاء الذي يوضع فيه بالكامل."},
  {id:19, section:"ch1", q:"أي المواد التالية يتميز بأنه يأخذ شكل الوعاء الذي يوضع فيه؟", options:["الحديد","الخشب","الماء (H₂O)","الزجاج"], correct:2, exp:"الماء سائل يأخذ شكل الوعاء الذي يوضع فيه مع احتفاظه بحجم ثابت. جسيمات السائل متقاربة لكنها حرة الحركة، مما يسمح لها بالانسياب والتشكل حسب الوعاء."},
  {id:20, section:"ch1", q:"الحالة الفيزيائية التي يوجد عليها الزئبق في الطبيعة؟", options:["صلب","سائل","غاز","بلازما"], correct:1, exp:"الزئبق هو الفلز الوحيد الذي يوجد في الحالة السائلة عند درجة حرارة الغرفة (25°C). درجة انصهاره منخفضة جداً (-39°C)، لذلك يُستخدم في موازين الحرارة."},
  {id:21, section:"ch1", q:"أي حالات المادة شكلها وحجمها غير ثابتين وجسيماتها متباعدة؟", options:["الحالة الصلبة","الحالة السائلة","الحالة الغازية","الحالة البلازمية"], correct:2, exp:"في الحالة الغازية تكون الجسيمات متباعدة جداً وتتحرك بحرية وسرعة عالية. لذلك ليس للغاز شكل أو حجم ثابت، بل يملأ الوعاء الذي يوضع فيه بالكامل."},
  {id:22, section:"ch1", q:"أي الخواص التالية يمثل خاصية فيزيائية؟", options:["توصيل النحاس للكهرباء","صدأ الحديد","احتراق الخشب","تحلل السكر"], correct:0, exp:"الإجابة هي توصيل النحاس للكهرباء. الخاصية الفيزيائية يمكن ملاحظتها أو قياسها دون تغيير التركيب الكيميائي للمادة، مثل اللون والكثافة ودرجة الانصهار والتوصيل الكهربائي."},
  {id:23, section:"ch1", q:"أي التالي يُعد من الخواص المميزة؟", options:["الطول","الكثافة","الشكل","اللون"], correct:1, exp:"الإجابة الصحيحة هي الكثافة. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:24, section:"ch1", q:"أي التالي يُعد من الخواص النوعية للمادة؟", options:["الكتلة","اللون","الحجم","الوزن"], correct:1, exp:"الإجابة الصحيحة هي اللون. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:25, section:"ch1", q:"تُمثل رائحة العطر..", options:["خاصية كيميائية","خاصية فيزيائية","تفاعل كيميائي","تغير كيميائي"], correct:1, exp:"الرائحة خاصية فيزيائية يمكن ملاحظتها بالحواس دون تغيير تركيب المادة. عند شم العطر لا يحدث تفاعل كيميائي، بل مجرد انتشار لجزيئات المادة المتطايرة."},
  {id:26, section:"ch1", q:"الكتلة من الخواص..", options:["المميزة","الكيميائية","غير المميزة","النوعية"], correct:2, exp:"الكتلة خاصية غير مميزة لأنها تتغير بتغير كمية المادة ولا تساعد في التعرف عليها. بينما الخواص المميزة مثل الكثافة ودرجة الانصهار ثابتة لكل مادة مهما تغيرت الكمية."},
  {id:27, section:"ch1", q:"أي التالي يُمثل خاصية كمية؟", options:["اللون","الرائحة","تركيز المحلول 1 mol/L","الطعم"], correct:2, exp:"الإجابة الصحيحة هي تركيز المحلول 1 mol/L. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:28, section:"ch1", q:"الصفة الكمية لورقة الإجابة التي بين يديك..", options:["لونها","ملمسها","مقاسها","نوعها"], correct:2, exp:"الإجابة الصحيحة هي مقاسها. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:29, section:"ch1", q:"جميع التالي خواص فيزيائية للألومنيوم عدا خاصية واحدة هي..", options:["التوصيل الكهربائي","الكثافة","لا يتأكسد مع الهواء الجوي","البريق"], correct:2, exp:"الاستثناء هو لا يتأكسد مع الهواء الجوي لأنه لا ينطبق عليه الشرط المذكور في السؤال بينما باقي الخيارات تنطبق. هذا النوع من الأسئلة يتطلب معرفة خصائص جميع الخيارات للتمييز بينها."},
  {id:30, section:"ch1", q:"أي التالي يُمثل خاصية كيميائية؟", options:["يصدأ الحديد عندما يتعرض لسطح رطب","الكثافة","اللون","درجة الانصهار"], correct:0, exp:"الإجابة الصحيحة هي يصدأ الحديد عندما يتعرض لسطح رطب. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:31, section:"ch1", q:"أي التالي خاصية كيميائية؟", options:["ذوبان الملح في الماء","يتحلل السكر إلى كربون وبخار ماء","انصهار الجليد","تبخر الماء"], correct:1, exp:"الإجابة الصحيحة هي يتحلل السكر إلى كربون وبخار ماء. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:32, section:"ch1", q:"أي خواص ملح الطعام التالية يُمثل خاصية كيميائية؟", options:["يذوب في الماء","أبيض اللون","لا يتفاعل مع الماء النقي","متبلور"], correct:2, exp:"الإجابة هي لا يتفاعل مع الماء النقي. الخاصية الكيميائية تصف قدرة المادة على التفاعل وتكوين مواد جديدة. لا يمكن ملاحظتها إلا عند حدوث تفاعل كيميائي فعلي."},
  {id:33, section:"ch1", q:"التغير الذي يحدث للمادة دون أن تفقد خواصها الأصلية هو التغير..", options:["الكيميائي","الفيزيائي","النووي","البيولوجي"], correct:1, exp:"التغير الفيزيائي يغير مظهر المادة أو حالتها دون تغيير تركيبها الكيميائي. مثل كسر الزجاج وانصهار الجليد وتبخر الماء، حيث تبقى المادة نفسها مع تغير شكلها فقط."},
  {id:34, section:"ch1", q:"أي التالي يُعد تغيراً فيزيائياً؟", options:["احتراق الخشب","صدأ الحديد","كسر الزجاج","تحلل الماء"], correct:2, exp:"الإجابة الصحيحة هي كسر الزجاج. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:35, section:"ch1", q:"يتحكم متغيران في حالة المادة..", options:["الكتلة والحجم","درجة الحرارة والضغط","اللون والرائحة","الكتلة والضغط"], correct:1, exp:"حالة المادة (صلبة أو سائلة أو غازية) تتحدد بدرجة الحرارة والضغط المحيط. رفع الحرارة يحول الصلب لسائل ثم غاز، بينما زيادة الضغط قد تحول الغاز لسائل."},
  {id:36, section:"ch1", q:"أي التالي يُصنف ضمن التغيرات الفيزيائية للمادة؟", options:["الاحتراق","الانصهار","الصدأ","التحلل"], correct:1, exp:"الإجابة الصحيحة هي الانصهار. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:37, section:"ch1", q:"درجة الحرارة التي يتساوى عندها ضغط بخار السائل مع الضغط الجوي..", options:["درجة الانصهار","درجة التجمد","درجة الغليان","درجة التسامي"], correct:2, exp:"الإجابة الصحيحة هي درجة الغليان. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:38, section:"ch1", q:"عملية تحول المادة من الحالة الصلبة إلى الحالة الغازية دون المرور بالحالة السائلة..", options:["الانصهار","التبخر","التسامي","التكثف"], correct:2, exp:"الإجابة الصحيحة هي التسامي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:39, section:"ch1", q:"أي العمليات التالية يمثل تفاعل حالة التسامي؟", options:["H₂O(s) → H₂O(l)","I₂(s) → I₂(g)","H₂O(l) → H₂O(g)","H₂O(g) → H₂O(l)"], correct:1, exp:"التسامي هو تحول المادة مباشرة من الحالة الصلبة إلى الغازية دون المرور بالحالة السائلة. يحدث عند درجات حرارة وضغوط معينة، ومن أمثلته تسامي اليود والثلج الجاف (CO₂)."},
  {id:40, section:"ch1", q:"أي التالي يُصنف ضمن تغيرات الحالة الفيزيائية الطاردة للطاقة؟", options:["الانصهار","التبخر","التجمد","التسامي"], correct:2, exp:"الإجابة الصحيحة هي التجمد. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:41, section:"ch1", q:"يزيد حجمه عند التحول من الحالة السائلة إلى الحالة الصلبة..", options:["الحديد","الماء (H₂O)","الزئبق","الزيت"], correct:1, exp:"الإجابة الصحيحة هي الماء (H₂O). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:42, section:"ch1", q:"ما العملية التي يصاحبها انبعاث طاقة؟", options:["الانصهار","التبخر","التجمد","التسامي"], correct:2, exp:"الإجابة الصحيحة هي التجمد. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:43, section:"ch1", q:"عملية الترسب عكس عملية..", options:["الانصهار","التبخر","التسامي","التكثف"], correct:2, exp:"الترسب هو تحول المادة من الحالة الغازية مباشرة إلى الصلبة، وهو عكس التسامي. مثال ذلك ترسب بخار الماء على الأسطح الباردة مكوناً الصقيع في الشتاء."},
  {id:44, section:"ch1", q:"ما التغير الذي يحدث في تركيب المادة وخواصها ويؤدي إلى تكوين مواد جديدة؟", options:["التغير الفيزيائي","التغير الكيميائي","التغير النووي","التغير الحراري"], correct:1, exp:"الإجابة الصحيحة هي التغير الكيميائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:45, section:"ch1", q:"أي التالي يُعد تغيراً كيميائياً؟", options:["ذوبان الملح","انصهار الجليد","احتراق ورقة","تبخر الماء"], correct:2, exp:"الإجابة الصحيحة هي احتراق ورقة. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:46, section:"ch1", q:"مادة تحوي تركيباً محدداً وتتكون من عدة عناصر..", options:["العنصر","المركب","المخلوط","الذرة"], correct:1, exp:"الإجابة الصحيحة هي المركب. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:47, section:"ch1", q:"الخاصية التي تميز المركب أن مكوناته..", options:["مختلفة الخواص","يحدث بينها تفاعل كيميائي","يمكن فصلها فيزيائياً","متشابهة الخواص"], correct:1, exp:"الإجابة الصحيحة هي يحدث بينها تفاعل كيميائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:48, section:"ch1", q:"يُعد ملح الطعام..", options:["عنصراً","مركباً","مخلوطاً","ذرة"], correct:1, exp:"الإجابة الصحيحة هي مركباً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:49, section:"ch1", q:"يُصنف H₂SO₄ على أنه..", options:["عنصر","مركب","مخلوط","ذرة"], correct:1, exp:"الإجابة الصحيحة هي مركب. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:50, section:"ch1", q:"أي التالي يُعد مركباً؟", options:["الهواء","الذهب","الصدأ","الزئبق"], correct:2, exp:"الإجابة الصحيحة هي الصدأ. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:51, section:"ch1", q:"تُمثل نسبة كتلة الصوديوم Na إلى كتلة الكلور Cl في ملح الطعام NaCl قانون..", options:["حفظ الكتلة","النسب المتضاعفة","النسب الثابتة","الحسابات الكيميائية"], correct:2, exp:"الإجابة هي النسب الثابتة. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:52, section:"ch1", q:"أي أيونات الذرات التالية ترتبط بنسبة 1:1 مع أيونات الكلور؟", options:["Na","Ca","Al","Mg"], correct:0, exp:"الإجابة الصحيحة هي Na. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:53, section:"ch1", q:"كتلة الأكسجين في H₂O₂ إلى كتلته في H₂O تُمثل قانون..", options:["حفظ الكتلة","النسب الثابتة","النسب المتضاعفة","أفوجادرو"], correct:2, exp:"الإجابة هي النسب المتضاعفة. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:54, section:"ch1", q:"تُسمى العملية التي يُعاد فيها ترتيب ذرات مادة أو أكثر لإنتاج مواد جديدة..", options:["التحلل الفيزيائي","التفاعل الكيميائي","التسامي","الانصهار"], correct:1, exp:"الإجابة الصحيحة هي التفاعل الكيميائي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:55, section:"ch1", q:"نوع التفاعل الذي ينتج عنه مادة واحدة..", options:["تفكك","إحلال بسيط","تكوين","إحلال مزدوج"], correct:2, exp:"نوع هذا هو تكوين. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:56, section:"ch1", q:"أي التالي يُعد تفاعل تكوين؟", options:["CaCO₃ → CaO + CO₂","Mg(s) + Cl₂(g) → MgCl₂(s)","NaCl + AgNO₃ → NaNO₃ + AgCl","Zn + HCl → ZnCl₂ + H₂"], correct:1, exp:"الإجابة الصحيحة هي Mg(s) + Cl₂(g) → MgCl₂(s). يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:57, section:"ch1", q:"ما نوع التفاعل Ca(s) + Cl₂(g) → CaCl₂؟", options:["تفكك","تكوين","إحلال بسيط","إحلال مزدوج"], correct:1, exp:"نوع هذا هو تكوين. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:58, section:"ch1", q:"الناتج المكمل للمعادلة الموزونة التالية: CH₄(g) + 2O₂(g) → CO₂(g) + ...؟", options:["H₂O","2H₂O","3H₂O","H₂"], correct:1, exp:"الإجابة الصحيحة هي 2H₂O. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:59, section:"ch1", q:"ما المعادلة التي تمثل تفاعل احتراق؟", options:["Na + Cl₂ → NaCl","CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(g)","AgNO₃ + NaCl → AgCl + NaNO₃","CaCO₃ → CaO + CO₂"], correct:1, exp:"الإجابة الصحيحة هي CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(g). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:60, section:"ch1", q:"تفاعل غاز الأكسجين في المتفاعلات، فأي التالي لا يكون في النواتج؟", options:["CO₂","H₂O","الجلوكوز","NO₂"], correct:2, exp:"الإجابة الصحيحة هي الجلوكوز. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:61, section:"ch1", q:"تفاعل كيميائي تتفكك فيه مادة واحدة لإنتاج مادتين أو أكثر..", options:["تكوين","تفكك","إحلال بسيط","احتراق"], correct:1, exp:"تفاعل التفكك (التحلل) تتفكك فيه مادة واحدة إلى مادتين أو أكثر أبسط منها. صيغته العامة: AB → A + B، ويحتاج عادة إلى طاقة حرارية أو كهربائية."},
  {id:62, section:"ch1", q:"عند مرور تيار كهربائي في مصهور بروميد البوتاسيوم ينتج بروم وبوتاسيوم، هذا التفاعل يُعد..", options:["تكوين","تفكك","إحلال بسيط","إحلال مزدوج"], correct:1, exp:"الإجابة الصحيحة هي تفكك. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},

  {id:66, section:"ch1", q:"تفاعل الصوديوم مع الماء ينتج عنه غاز..", options:["O₂","H₂","Cl₂","N₂"], correct:1, exp:"الناتج هو H₂. يمكن التنبؤ بالنواتج من معرفة نوع التفاعل والمجموعات الوظيفية المشاركة. الأكسدة ترفع درجة أكسدة الكربون بينما الاختزال يخفضها."},
  {id:67, section:"ch1", q:"ما نوع التفاعل Ni(s) + CuCl₂(aq) → Cu(s) + NiCl₂(aq)؟", options:["تكوين","تفكك","إحلال بسيط","إحلال مزدوج"], correct:2, exp:"نوع هذا هو إحلال بسيط. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},

  {id:69, section:"ch1", q:"أكمل المعادلة F₂(g) + 2NaBr(aq) → 2NaF(aq) + ...؟", options:["Br₂(l)","NaBr","HBr","NaF"], correct:0, exp:"الإجابة الصحيحة هي Br₂(l). يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:70, section:"ch1", q:"ما سبب توقف التفاعل Br₂(l) + NaF(aq) → NR؟", options:["النشاط متساوٍ","الفلور أنشط من البروم","البروم أنشط","التفاعل ماص"], correct:1, exp:"الإجابة الصحيحة هي الفلور أنشط من البروم. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:71, section:"ch1", q:"ما نوع التفاعلات التي تحدث بكثرة في المحاليل المائية؟", options:["التكوين","التفكك","الإحلال البسيط","الإحلال المزدوج"], correct:3, exp:"نوع هذا هو الإحلال المزدوج. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},

  {id:73, section:"ch1", q:"ما نوع التفاعل التالي 2HI(aq) + (NH₄)₂S(aq) → H₂S(g) + 2NH₄I(aq)؟", options:["تكوين","تفكك","إحلال بسيط","إحلال مزدوج"], correct:3, exp:"نوع هذا هو إحلال مزدوج. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:74, section:"ch1", q:"إذا نتج مركبان من تفاعل كيميائي فإن التفاعل يُعد..", options:["تكوين","تفكك","إحلال بسيط","إحلال مزدوج"], correct:3, exp:"الإجابة الصحيحة هي إحلال مزدوج. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:75, section:"ch1", q:"المعادلات الكيميائية الموزونة تحقق قانون..", options:["النسب الثابتة","النسب المتضاعفة","حفظ الكتلة","أفوجادرو"], correct:2, exp:"الإجابة هي حفظ الكتلة. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:76, section:"ch1", q:"إذا تفاعل 12.2g من X مع 78.9g من Y، ونتج 91.1g من XY؛ فإن ذلك يُمثل قانون..", options:["النسب الثابتة","النسب المتضاعفة","حفظ الكتلة","دالتون"], correct:2, exp:"الإجابة هي حفظ الكتلة. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:77, section:"ch1", q:"عند تفاعل 20g من المادة X مع المادة Y نتج 30g من XY، فما كتلة Y المتفاعلة بالجرام؟", options:["5","10","15","20"], correct:1, exp:"الإجابة الصحيحة هي 10. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:78, section:"ch1", q:"دراسة العلاقة بين المواد المتفاعلة والمواد الناتجة في التفاعل الكيميائي..", options:["الكيمياء التحليلية","الحسابات الكيميائية","الكيمياء العضوية","الكيمياء الحيوية"], correct:1, exp:"الإجابة الصحيحة هي الحسابات الكيميائية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:79, section:"ch1", q:"أولى خطوات إجراء الحسابات الكيميائية في المعادلات..", options:["حساب الكتلة","وزن المعادلة","حساب التركيز","تحديد المذيب"], correct:1, exp:"الحسابات الكيميائية (الاستوكيومترية) تدرس العلاقات الكمية بين المواد المتفاعلة والناتجة. تعتمد على المعادلة الموزونة لحساب الكتل والمولات والحجوم في التفاعلات."},
  {id:80, section:"ch1", q:"ما المركب x الناتج في المعادلة الموزونة: Ag(s) + 2HNO₃(aq) → x + NO₂(g) + H₂O(l)؟", options:["AgNO₃(aq)","Ag₂O","AgN","Ag₂NO₂"], correct:0, exp:"الإجابة الصحيحة هي AgNO₃(aq). يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:81, section:"ch1", q:"ليُمثّل x , y على الترتيب في المعادلة الموزونة CH₄ + x → CO₂ + y..", options:["O₂, H₂O","2O₂, 2H₂O","O₂, 2H₂O","2O₂, H₂O"], correct:1, exp:"الإجابة الصحيحة هي 2O₂, 2H₂O. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:82, section:"ch1", q:"أي التالي يُمثل معامل الهيدروجين x في المعادلة N₂ + xH₂ → 2NH₃؟", options:["1","2","3","4"], correct:2, exp:"الإجابة الصحيحة هي 3. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:83, section:"ch1", q:"عدد جزيئات الماء المضافة في نواتج التفاعل عند وزن المعادلة في وسط حمضي: 2H⁺(aq) + 3H₂S(g) + 2NO₃⁻(aq) → 3S(s) + 2NO(g) + ...؟", options:["2H₂O","3H₂O","4H₂O","5H₂O"], correct:2, exp:"الإجابة الصحيحة هي 4H₂O. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},

  {id:86, section:"ch2", q:"أصغر جزء من العنصر ويحمل خواصه..", options:["الجزيء","الذرة","الإلكترون","الأيون"], correct:1, exp:"الإجابة الصحيحة هي الذرة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:87, section:"ch2", q:"جسيمات سالبة تدور حول النواة..", options:["البروتونات","النيوترونات","الإلكترونات","الفوتونات"], correct:2, exp:"الإجابة الصحيحة هي الإلكترونات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:88, section:"ch2", q:"أي التالي غير صحيح عن تركيب الذرة؟", options:["الإلكترونات حول النواة","البروتونات في النواة","لا وجود للفراغ","معظم الكتلة في النواة"], correct:2, exp:"الإجابة الصحيحة هي لا وجود للفراغ. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:89, section:"ch2", q:"الباحث الذي اكتشف الإلكترون..", options:["دالتون","طومسون","رذرفورد","بور"], correct:1, exp:"الإجابة الصحيحة هي طومسون. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:90, section:"ch2", q:"منطقة ثلاثية الأبعاد تصف الموقع المحتمل لوجود الإلكترون..", options:["المدار","السحابة الإلكترونية","النواة","مستوى الطاقة"], correct:1, exp:"الإجابة الصحيحة هي السحابة الإلكترونية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},

  {id:129, section:"ch2", q:"إذا كان حول الذرة المركزية أربعة أزواج من الإلكترونات وثلاث روابط فإن الجزيء المتوقع..", options:["CH₄","NH₃","H₂O","CO₂"], correct:1, exp:"الإجابة الصحيحة هي NH₃. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},

  {id:131, section:"ch2", q:"أي المركبات التالية تصل فيها ذرة الفوسفور إلى حالة الاستقرار بأكثر من ثمانية إلكترونات؟", options:["PH₃","PCl₃","PCl₅","P₂O₃"], correct:2, exp:"الإجابة الصحيحة هي PCl₅. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:132, section:"ch2", q:"الجدول الدوري الحديث يحوي..", options:["6 دورات و 18 مجموعة","7 دورات و 18 مجموعة","8 دورات و 16 مجموعة","7 دورات و 16 مجموعة"], correct:1, exp:"الإجابة الصحيحة هي 7 دورات و 18 مجموعة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:133, section:"ch2", q:"تسمى عناصر المجموعة 1 في الجدول الدوري الحديث باسم..", options:["الفلزات القلوية","الفلزات القلوية الأرضية","الهالوجينات","الغازات النبيلة"], correct:0, exp:"الاسم الصحيح هو الفلزات القلوية. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:134, section:"ch2", q:"جميع عناصر المجموعة 1 بالجدول الدوري فلزات عدا..", options:["الصوديوم","البوتاسيوم","الهيدروجين","الليثيوم"], correct:2, exp:"الاستثناء هو الهيدروجين لأنه لا ينطبق عليه الشرط المذكور في السؤال بينما باقي الخيارات تنطبق. هذا النوع من الأسئلة يتطلب معرفة خصائص جميع الخيارات للتمييز بينها."},
  {id:135, section:"ch2", q:"أقرب عنصر إلى الصوديوم Na في الخواص الكيميائية..", options:["الكالسيوم Ca","الليثيوم Li","المغنسيوم Mg","الكلور Cl"], correct:1, exp:"الإجابة هي الليثيوم Li. الخاصية الكيميائية تصف قدرة المادة على التفاعل وتكوين مواد جديدة. لا يمكن ملاحظتها إلا عند حدوث تفاعل كيميائي فعلي."},
  {id:136, section:"ch2", q:"عنصر الماغنسيوم ينتمي لمجموعة..", options:["الفلزات القلوية","الفلزات القلوية الأرضية","الهالوجينات","الغازات النبيلة"], correct:1, exp:"يُصنف ضمن الفلزات القلوية الأرضية بناءً على المجموعة الوظيفية الموجودة في المركب. المجموعة الوظيفية هي جزء من الجزيء يحدد سلوكه الكيميائي: -OH كحول، -COOH حمض كربوكسيلي، -CHO ألدهيد، C=O كيتون."},

  {id:145, section:"ch2", q:"الخواص الفيزيائية والكيميائية لعنصر Ne أقرب إلى..", options:["₁₁Na","₉F","₁₈Ar","₁₇Cl"], correct:2, exp:"الإجابة هي ₁₈Ar. الخاصية الفيزيائية يمكن ملاحظتها أو قياسها دون تغيير التركيب الكيميائي للمادة، مثل اللون والكثافة ودرجة الانصهار والتوصيل الكهربائي."},

  {id:150, section:"ch2", q:"إذا علمت أن عنصر النيون Ne ضمن عناصر المجموعة 18 في الجدول الدوري، فإن التوزيع الإلكتروني لذرة هذا العنصر..", options:["1s² 2s² 2p⁶","1s² 2s² 2p⁴","1s² 2s² 2p⁵","1s² 2p⁸"], correct:0, exp:"التوزيع الإلكتروني الصحيح هو 1s² 2s² 2p⁶. يتم ملء المستويات الفرعية حسب ترتيب الطاقة (مبدأ أوفباو) مع مراعاة مبدأ باولي وقاعدة هوند. بعض العناصر مثل النحاس والكروم لها استثناءات بسبب استقرار نصف أو كامل امتلاء المستوى d."},
  {id:151, section:"ch2", q:"تُعد ذرة العنصر خاملة كيميائياً إذا..", options:["فقدت إلكتروناً","اكتسبت إلكتروناً","وصلت للتركيب الثماني في مجالها الأخير","تحولت إلى أيون"], correct:2, exp:"الإجابة الصحيحة هي وصلت للتركيب الثماني في مجالها الأخير. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},

  {id:153, section:"ch2", q:"الترميز الإلكتروني يُعبّر عن مستويات الطاقة الرئيسة والفرعية لذرة عنصر يقع ضمن الدورة..", options:["الأولى","الثانية","الثالثة","الرابعة"], correct:1, exp:"يقع العنصر في الثانية. يُحدد موقع العنصر من التوزيع الإلكتروني: رقم الدورة = عدد الكم الرئيس الأكبر، ورقم المجموعة يُحدد من المستوى الفرعي الأخير وعدد إلكتروناته."},

  {id:161, section:"ch2", q:"عنصر الفوسفور ₁₅P يقع في..", options:["الدورة 2، المجموعة 15","الدورة 3، المجموعة 15","الدورة 3، المجموعة 5","الدورة 2، المجموعة 5"], correct:1, exp:"الإجابة الصحيحة هي الدورة 3، المجموعة 15. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:162, section:"ch2", q:"أي التالي صحيح للتوزيع الإلكتروني [Ar] 4s² 3d¹⁰ 4p⁴؟", options:["المجموعة 14، الدورة 4، فئة p","المجموعة 16، الدورة 4، فئة p","المجموعة 16، الدورة 4، فئة d","المجموعة 14، الدورة 3، فئة p"], correct:1, exp:"الإجابة الصحيحة هي المجموعة 16، الدورة 4، فئة p. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:163, section:"ch2", q:"ما التوزيع الإلكتروني الصحيح لغاز نبيل في الدورة الثالثة؟", options:["[Ne] 3s² 3p⁵","1s² 2s² 2p⁶ 3s² 3p⁶","[Ar] 4s²","1s² 2s² 2p⁶"], correct:1, exp:"التوزيع الإلكتروني الصحيح هو 1s² 2s² 2p⁶ 3s² 3p⁶. يتم ملء المستويات الفرعية حسب ترتيب الطاقة (مبدأ أوفباو) مع مراعاة مبدأ باولي وقاعدة هوند. بعض العناصر مثل النحاس والكروم لها استثناءات بسبب استقرار نصف أو كامل امتلاء المستوى d."},
  {id:164, section:"ch2", q:"عنصر توزيعه الإلكتروني [Ar] 4s² 3d² يقع في الدورة..", options:["3","4","5","6"], correct:1, exp:"يقع العنصر في 4. يُحدد موقع العنصر من التوزيع الإلكتروني: رقم الدورة = عدد الكم الرئيس الأكبر، ورقم المجموعة يُحدد من المستوى الفرعي الأخير وعدد إلكتروناته."},
  {id:165, section:"ch2", q:"عنصر توزيعه الإلكتروني [Kr] 5s² 4d¹⁰ يُصنف من العناصر..", options:["القلوية","الانتقالية","الهالوجينات","النبيلة"], correct:1, exp:"الإجابة الصحيحة هي الانتقالية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:166, section:"ch2", q:"في الجدول، أي العناصر التالية يمكن وضعه في الفراغ أسفل النيتروجين N والفوسفور P؟", options:["O","As","C","Si"], correct:1, exp:"الإجابة الصحيحة هي As. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:167, section:"ch2", q:"كلما اتجهنا لأسفل ضمن عناصر المجموعة الواحدة في الجدول الدوري..", options:["ينقص الحجم الذري","يزداد الحجم الذري","لا يتغير الحجم","يتضاعف الحجم"], correct:1, exp:"الإجابة الصحيحة هي يزداد الحجم الذري. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:168, section:"ch2", q:"أي العناصر التالية له أصغر نصف قطر؟", options:["₁₁Na","₁₉K","₃Li","₃₇Rb"], correct:2, exp:"الإجابة الصحيحة هي ₃Li. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:169, section:"ch2", q:"أي العناصر التالية أصغر في نصف القطر؟", options:["Na","K","F","Cl"], correct:2, exp:"الإجابة الصحيحة هي F. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:170, section:"ch2", q:"أي المجموعات التالية الأقل في نصف القطر الذري؟", options:["المجموعة 1","المجموعة 2","المجموعة 17","المجموعة 14"], correct:2, exp:"الإجابة هي المجموعة 17. نصف القطر الذري يزداد لأسفل في المجموعة بسبب إضافة مستويات طاقة جديدة، ويقل من اليسار لليمين في الدورة بسبب زيادة شحنة النواة الفعالة."},
  {id:171, section:"ch2", q:"عند مقارنة ذرة Mg مع أيون Mg²⁺ من حيث الحجم الذري نجد أن حجم..", options:["Mg < Mg²⁺","Mg = Mg²⁺","Mg > Mg²⁺","لا يمكن المقارنة"], correct:2, exp:"الإجابة هي Mg > Mg²⁺. نصف القطر الذري يزداد لأسفل في المجموعة بسبب إضافة مستويات طاقة جديدة، ويقل من اليسار لليمين في الدورة بسبب زيادة شحنة النواة الفعالة."},
  {id:172, section:"ch2", q:"الطاقة اللازمة لانتزاع إلكترون من ذرة في الحالة الغازية..", options:["طاقة التأين","الألفة الإلكترونية","الكهروسالبية","طاقة الشبكة"], correct:0, exp:"الإجابة الصحيحة هي طاقة التأين. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:173, section:"ch2", q:"طاقة التأين الثانية أكبر من طاقة التأين الأولى؛ لأن الإلكترون الذي يُنتزع لطاقة التأين الثانية أقوى ارتباطاً بالنواة بسبب..", options:["نقص شحنة النواة","زيادة شحنة النواة الموجبة","زيادة عدد الإلكترونات","زيادة الحجم"], correct:1, exp:"الإجابة هي زيادة شحنة النواة الموجبة. طاقة التأين تزداد من اليسار لليمين في الدورة ومن الأسفل للأعلى في المجموعة. الغازات النبيلة لها أعلى طاقة تأين بسبب استقرار توزيعها الإلكتروني."},
  {id:174, section:"ch2", q:"أي التالي له أكبر طاقة تأين؟", options:["الفلزات القلوية","الفلزات الانتقالية","الهالوجينات","الغازات النبيلة"], correct:3, exp:"الإجابة الصحيحة هي الغازات النبيلة. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:175, section:"ch2", q:"أي التالي صحيح؟ علما أن ₉F, ₁₀Ne, ₁₁Na..", options:["Na أعلى طاقة تأين","F أعلى طاقة تأين","Ne أعلى طاقة تأين","كلها متساوية"], correct:2, exp:"الإجابة الصحيحة هي Ne أعلى طاقة تأين. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:176, section:"ch2", q:"أي المركبات التالية أكبر في طاقة التأين؟", options:["KI","KF","NaI","LiBr"], correct:1, exp:"الإجابة الصحيحة هي KF. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:177, section:"ch2", q:"إذا رتبت عناصر مجموعة في الجدول الدوري من الأسفل للأعلى فإن..", options:["طاقة تأينها تصغر","طاقة تأينها تكبر","لا تتغير","تتضاعف"], correct:1, exp:"الإجابة الصحيحة هي طاقة تأينها تكبر. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:178, section:"ch2", q:"مدى قابلية ذرات العناصر على جذب الإلكترونات في الرابطة الكيميائية..", options:["طاقة التأين","الألفة الإلكترونية","الكهروسالبية","نصف القطر"], correct:2, exp:"الإجابة الصحيحة هي الكهروسالبية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:179, section:"ch2", q:"في الجدول الدوري الحديث عند الانتقال من أعلى إلى أسفل..", options:["تزيد الكهروسالبية","تقل الكهروسالبية","لا تتغير","تنعدم"], correct:1, exp:"الإجابة الصحيحة هي تقل الكهروسالبية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:180, section:"ch2", q:"أكبر العناصر في الكهروسالبية..", options:["الأكسجين","الفلور","الكلور","النيتروجين"], correct:1, exp:"الإجابة هي الفلور. الكهروسالبية تزداد من اليسار لليمين في الدورة ومن الأسفل للأعلى في المجموعة. الفلور أعلى العناصر كهروسالبية لصغر حجمه وقوة جذب نواته للإلكترونات."},
  {id:181, section:"ch2", q:"أي التالي يُمثّل التوزيع الإلكتروني للعنصر الأقل في الكهروسالبية؟", options:["1s² 2s² 2p⁵","1s² 2s² 2p⁶","1s² 2s² 2p⁶ 3s¹","1s² 2s² 2p⁶ 3s² 3p⁵"], correct:2, exp:"الإجابة الصحيحة هي 1s² 2s² 2p⁶ 3s¹. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:182, section:"ch3", q:"القوى بين الجزيئات مقارنة بالروابط داخل الجزيئات تكون..", options:["أقوى منها","أضعف منها","مساوية لها","متغيرة"], correct:1, exp:"الإجابة الصحيحة هي أضعف منها. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:183, section:"ch3", q:"أي التالي يُعد من قوى الترابط الجزيئية (داخل الجزيئات)؟", options:["قوى التشتت","قوى ثنائية القطبية","الرابطة التساهمية","الرابطة الهيدروجينية"], correct:2, exp:"الإجابة الصحيحة هي الرابطة التساهمية. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:184, section:"ch3", q:"أي التالي ليس من القوى بين الجزيئية؟", options:["قوى التشتت","قوى ثنائية القطبية","الرابطة الهيدروجينية","قوى التلاصق"], correct:3, exp:"الإجابة الصحيحة هي قوى التلاصق. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:185, section:"ch3", q:"قوى الترابط بين جزيئات الأكسجين..", options:["قوى التشتت","قوى ثنائية القطبية","الرابطة الهيدروجينية","الرابطة التساهمية"], correct:0, exp:"الإجابة هي قوى التشتت. قوى تشتت لندن هي أضعف القوى بين الجزيئية وتنشأ من التوزيع اللحظي غير المتماثل للإلكترونات. تزداد قوتها بزيادة حجم الجزيء وعدد إلكتروناته."},
  {id:186, section:"ch3", q:"أي الجزيئات التالية لا يرتبط بقوى التشتت؟", options:["O₂","N₂","الماء H₂O","Cl₂"], correct:2, exp:"الإجابة هي الماء H₂O. قوى تشتت لندن هي أضعف القوى بين الجزيئية وتنشأ من التوزيع اللحظي غير المتماثل للإلكترونات. تزداد قوتها بزيادة حجم الجزيء وعدد إلكتروناته."},
  {id:187, section:"ch3", q:"قوى التشتت ...... بزيادة عدد الإلكترونات في السحابة الإلكترونية.", options:["تزداد","تقل","لا تتغير","تنعدم"], correct:0, exp:"الإجابة هي تزداد. قوى تشتت لندن هي أضعف القوى بين الجزيئية وتنشأ من التوزيع اللحظي غير المتماثل للإلكترونات. تزداد قوتها بزيادة حجم الجزيء وعدد إلكتروناته."},
  {id:188, section:"ch3", q:"قوى التشتت تزيد بزيادة الحجم الذري، فأي العناصر التالية قوة تشتته أكبر؟", options:["F₂","Cl₂","Br₂","I₂"], correct:3, exp:"الإجابة الصحيحة هي I₂. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:189, section:"ch3", q:"قوى تجاذب بين مناطق مختلفة الشحنة في الجزيئات القطبية..", options:["قوى التشتت","قوى ثنائية القطبية","الرابطة الأيونية","الرابطة الفلزية"], correct:1, exp:"الإجابة الصحيحة هي قوى ثنائية القطبية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:190, section:"ch3", q:"أي التالي يرتبط بقوى ثنائية القطبية؟", options:["O₂","N₂","HCl","H₂"], correct:2, exp:"الإجابة الصحيحة هي HCl. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:191, section:"ch3", q:"في الشكل، نوع الرابطة بين جزيئات الماء..", options:["رابطة تساهمية","رابطة أيونية","رابطة هيدروجينية","قوى التشتت"], correct:2, exp:"نوع هذا هو رابطة هيدروجينية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:192, section:"ch3", q:"يوجد الماء في الحالة السائلة عند درجة حرارة الغرفة بسبب..", options:["قوى التشتت","الروابط الهيدروجينية","الرابطة الأيونية","كتلته الجزيئية"], correct:1, exp:"الإجابة الصحيحة هي الروابط الهيدروجينية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:193, section:"ch3", q:"أي التالي يكوّن روابط هيدروجينية بين جزيئاته؟", options:["CH₄","CO₂","NH₃","CCl₄"], correct:2, exp:"الإجابة الصحيحة هي NH₃. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:194, section:"ch3", q:"أي الجزيئات التالية قطبي؟", options:["CO₂","CH₄","H₂O","O₂"], correct:2, exp:"الإجابة الصحيحة هي H₂O. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:195, section:"ch3", q:"أي التالي يُعد أقوى أنواع الروابط بين الجزيئات؟", options:["قوى التشتت","قوى ثنائية القطبية","الرابطة الهيدروجينية","قوى فان درفالز"], correct:2, exp:"الإجابة الصحيحة هي الرابطة الهيدروجينية. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:196, section:"ch3", q:"أي الروابط التالية الأكثر قطبية؟", options:["C-H","C-O","O-H","N-H"], correct:2, exp:"الإجابة هي O-H. درجة الغليان تعتمد على قوة الروابط بين الجزيئية: الروابط الهيدروجينية أقوى من ثنائية القطبية وأقوى من قوى التشتت. كلما زادت الكتلة المولية وزادت القطبية ارتفعت درجة الغليان."},
  {id:197, section:"ch3", q:"أي الجزيئات التالية قطبي؟", options:["CH₄","CO₂","HCl","O₂"], correct:2, exp:"الإجابة الصحيحة هي HCl. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:198, section:"ch3", q:"أي المركبات التالية يحوي روابط هيدروجينية أقوى بين جزيئاته؟", options:["NH₃","HF","H₂O","CH₃OH"], correct:2, exp:"الإجابة الصحيحة هي H₂O. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:199, section:"ch3", q:"أي المركبات التالية أعلى قطبية؟", options:["CH₄","H₂O","CO₂","O₂"], correct:1, exp:"الإجابة الصحيحة هي H₂O. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:200, section:"ch3", q:"أي المركبات التالية غير قطبي؟", options:["H₂O","NH₃","HCl","CH₄"], correct:3, exp:"الإجابة الصحيحة هي CH₄. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:201, section:"ch3", q:"أي التالي لا يكوّن رابطة هيدروجينية؟", options:["H₂O","NH₃","HF","الميثان"], correct:3, exp:"الإجابة الصحيحة هي الميثان. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:202, section:"ch3", q:"بعض المواد تُصبح ذات شحنة موجبة لأنها..", options:["اكتسبت إلكترونات","فقدت إلكترونات","اكتسبت بروتونات","فقدت بروتونات"], correct:1, exp:"الإجابة الصحيحة هي فقدت إلكترونات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:203, section:"ch3", q:"يتكون الأيون السالب في حالة..", options:["فقدان الإلكترونات","اكتساب الإلكترونات","فقدان البروتونات","اكتساب البروتونات"], correct:1, exp:"الإجابة الصحيحة هي اكتساب الإلكترونات. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:204, section:"ch3", q:"الشحنة الكلية لمركب Na₂CO₃..", options:["+1","-1","صفر","+2"], correct:2, exp:"الإجابة الصحيحة هي صفر. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:205, section:"ch3", q:"أيون الفلز شحنته تساوي عدد إلكترونات..", options:["النواة","الفراغ","التكافؤ","المستوى الأول"], correct:2, exp:"الإجابة الصحيحة هي التكافؤ. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:206, section:"ch3", q:"أي التالي صحيح لأيون الألومنيوم؟ علما أن ₁₃Al..", options:["Al⁺","Al²⁺","Al³⁺","Al⁻"], correct:2, exp:"الإجابة الصحيحة هي Al³⁺. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:207, section:"ch3", q:"ما عدد إلكترونات أيون البوتاسيوم K⁺؟ علما أن ₁₉K..", options:["19","18","20","17"], correct:1, exp:"الإجابة الصحيحة هي 18. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:208, section:"ch3", q:"يشبه التوزيع الإلكتروني للكالسيوم Ca²⁺ التوزيع الإلكتروني للغاز النبيل عندما..", options:["يكتسب 2e⁻","يفقد 2e⁻","يفقد 1e⁻","يكتسب 1e⁻"], correct:1, exp:"التوزيع الإلكتروني الصحيح هو يفقد 2e⁻. يتم ملء المستويات الفرعية حسب ترتيب الطاقة (مبدأ أوفباو) مع مراعاة مبدأ باولي وقاعدة هوند. بعض العناصر مثل النحاس والكروم لها استثناءات بسبب استقرار نصف أو كامل امتلاء المستوى d."},
  {id:209, section:"ch3", q:"العنصر الذي يكافئ أيون الكلوريد Cl⁻..", options:["Na","K","Ar","Ca"], correct:2, exp:"الإجابة هي Ar. حسب نظرية برونستد-لوري: الحمض مادة مانحة لأيون H⁺ والقاعدة مادة مستقبلة له. هذه النظرية أشمل من أرهينيوس لأنها تشمل المحاليل غير المائية أيضاً."},
  {id:210, section:"ch3", q:"عند اتحاد أيون صوديوم مع أيون كلور لتكوين جزيء كلوريد الصوديوم؛ فإن ذرة الصوديوم..", options:["تكتسب إلكتروناً","تفقد إلكتروناً","تشارك إلكتروناً","لا تتغير"], correct:1, exp:"الإجابة هي تفقد إلكتروناً. حسب نظرية برونستد-لوري: الحمض مادة مانحة لأيون H⁺ والقاعدة مادة مستقبلة له. هذه النظرية أشمل من أرهينيوس لأنها تشمل المحاليل غير المائية أيضاً."},
  {id:211, section:"ch3", q:"أي عناصر المجموعات التالية لها القدرة على تكوين أيون سالب؟", options:["1","2","17","18"], correct:2, exp:"الإجابة الصحيحة هي 17. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:212, section:"ch3", q:"أي العناصر التالية لديه القدرة على إنتاج أيون سالب؟", options:["الفلزات القلوية","الفلزات الأرضية","الهالوجينات","الغازات النبيلة"], correct:2, exp:"الإجابة الصحيحة هي الهالوجينات. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:213, section:"ch3", q:"القوة الكهروستاتيكية التي تجذب الأيونات ذات الشحنات المختلفة..", options:["الرابطة التساهمية","الرابطة الأيونية","الرابطة الفلزية","الرابطة الهيدروجينية"], correct:1, exp:"الإجابة الصحيحة هي الرابطة الأيونية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:214, section:"ch3", q:"عنصر يقع في المجموعة 2 اتحد مع عنصر من المجموعة 16، ما نوع الرابطة المتكونة؟", options:["تساهمية","أيونية","فلزية","هيدروجينية"], correct:1, exp:"نوع هذا هو أيونية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:215, section:"ch3", q:"أي المجموعات التالية تميل إلى اكتساب الإلكترونات لتكوين الرابطة الأيونية؟", options:["1","2","13","17"], correct:3, exp:"الإجابة الصحيحة هي 17. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:216, section:"ch3", q:"أي المركبات التالية يحوي رابطة أيونية؟", options:["HCl","CO₂","NaCl","CH₄"], correct:2, exp:"الإجابة الصحيحة هي NaCl. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:217, section:"ch3", q:"ما نوع الرابطة في جزيء كلوريد الصوديوم؟ علما أن Na=11, Cl=17..", options:["تساهمية","أيونية","فلزية","قطبية"], correct:1, exp:"نوع هذا هو أيونية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:218, section:"ch3", q:"أيون ClO₃⁻ يُسمى..", options:["الكلورات","البيركلورات","الكلوريت","الهيبوكلوريت"], correct:0, exp:"الاسم الصحيح هو الكلورات. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:219, section:"ch3", q:"أيون ClO₄⁻ يُسمى..", options:["الكلورات","البيركلورات","الكلوريت","الهيبوكلوريت"], correct:1, exp:"الاسم الصحيح هو البيركلورات. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:220, section:"ch3", q:"إذا كان عدد تأكسد عنصر X يساوي +2، وعدد تأكسد عنصر Y يساوي -3؛ فإن صيغة المركب المكوّن..", options:["X₂Y₃","X₃Y₂","XY","X₃Y"], correct:1, exp:"عدد التأكسد هو X₃Y₂. يُحسب عدد التأكسد باستخدام قواعد محددة: الهيدروجين +1 غالباً، الأكسجين -2 غالباً، والمجموع الكلي لأعداد التأكسد = شحنة الأيون أو صفر في المركب المتعادل."},
  {id:221, section:"ch3", q:"ما الصيغة الكيميائية لأكسيد الماغنسيوم؟", options:["MgO₂","Mg₂O","MgO","Mg₂O₃"], correct:2, exp:"الصيغة الصحيحة هي MgO. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:222, section:"ch3", q:"ما الصيغة الكيميائية لملح الطعام؟", options:["KCl","NaCl","CaCl₂","LiCl"], correct:1, exp:"الصيغة الصحيحة هي NaCl. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:223, section:"ch3", q:"يتكون الطباشير من..", options:["كربونات الصوديوم","كربونات الكالسيوم","كلوريد الصوديوم","أكسيد المغنيسيوم"], correct:1, exp:"الإجابة الصحيحة هي كربونات الكالسيوم. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:224, section:"ch3", q:"الصيغة الكيميائية لنترات الماغنسيوم..", options:["MgNO₃","Mg(NO₃)₂","Mg₂NO₃","Mg(NO₂)₂"], correct:1, exp:"الصيغة الصحيحة هي Mg(NO₃)₂. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:225, section:"ch3", q:"الصيغة الكيميائية الناتجة عن اتحاد الكربونات CO₃²⁻ مع الصوديوم Na⁺..", options:["NaCO₃","Na₂CO₃","Na(CO₃)₂","NaCO₂"], correct:1, exp:"الصيغة الصحيحة هي Na₂CO₃. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:226, section:"ch3", q:"الصيغة الكيميائية للمركب الأيوني المكون من أيوني الصوديوم والنيتريت..", options:["NaNO₃","NaNO₂","Na₂NO₃","Na₂NO₂"], correct:1, exp:"الصيغة الصحيحة هي NaNO₂. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:227, section:"ch3", q:"ما الاسم الكيميائي للمركب الأيوني (NH₄)₃PO₄؟", options:["نترات الأمونيوم","فوسفات الأمونيوم","كبريتات الأمونيوم","كلوريد الأمونيوم"], correct:1, exp:"الإجابة الصحيحة هي فوسفات الأمونيوم. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:228, section:"ch3", q:"الروابط الفلزية تتكون بين الأيونات الموجبة للفلز و..", options:["الأيونات السالبة","الإلكترونات الحرة","البروتونات","النيوترونات"], correct:1, exp:"الإجابة الصحيحة هي الإلكترونات الحرة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:229, section:"ch3", q:"تتداخل فيها مستويات الطاقة في نموذج يُسمى بحر الإلكترونات..", options:["الرابطة الأيونية","الرابطة التساهمية","الرابطة الفلزية","الرابطة الهيدروجينية"], correct:2, exp:"الاسم الصحيح هو الرابطة الفلزية. في التسمية النظامية IUPAC: نحدد أولاً أطول سلسلة كربونية متصلة، ثم نرقم الذرات لإعطاء أصغر رقم للمجموعات البديلة، وأخيراً نسمي المجموعات ونضع أرقامها."},
  {id:230, section:"ch3", q:"كلما زاد عدد الإلكترونات الحرة في الفلز زادت قوة الرابطة..", options:["الأيونية","التساهمية","الفلزية","الهيدروجينية"], correct:2, exp:"الإجابة الصحيحة هي الفلزية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:231, section:"ch3", q:"نوع الرابطة المتكونة بين ذرتي الهيدروجين..", options:["أيونية","تساهمية","فلزية","هيدروجينية"], correct:1, exp:"نوع هذا هو تساهمية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:232, section:"ch3", q:"عامل مؤثر على قوة الرابطة التساهمية في جزيء..", options:["نوع الذرة فقط","طول الرابطة","درجة الحرارة","الضغط"], correct:1, exp:"الإجابة الصحيحة هي طول الرابطة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:233, section:"ch3", q:"أي الجزيئات التالية يحوي رابطة ثنائية بين ذرتين؟", options:["H₂","N₂","O₂","Cl₂"], correct:2, exp:"الإجابة الصحيحة هي O₂. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:234, section:"ch3", q:"عنصر يقع بالمجموعة 15 في الجدول الدوري الحديث يستطيع تكوين رابطة تساهمية..", options:["أحادية","ثنائية","ثلاثية","رباعية"], correct:2, exp:"يقع العنصر في ثلاثية. يُحدد موقع العنصر من التوزيع الإلكتروني: رقم الدورة = عدد الكم الرئيس الأكبر، ورقم المجموعة يُحدد من المستوى الفرعي الأخير وعدد إلكتروناته."},
  {id:235, section:"ch3", q:"أي التالي يحوي رابطة تساهمية؟", options:["NaCl","KCl","CH₄","CaO"], correct:2, exp:"الإجابة الصحيحة هي CH₄. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:236, section:"ch3", q:"أي الجزيئات التالية يحوي أقوى رابطة تساهمية؟", options:["H₂","O₂","N₂","F₂"], correct:2, exp:"الإجابة الصحيحة هي N₂. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:237, section:"ch3", q:"الرابطة سيجما (σ) تتكون من تداخل مستويات التكافؤ الفرعية..", options:["جانبياً","رأسياً","دائرياً","عشوائياً"], correct:1, exp:"الإجابة الصحيحة هي رأسياً. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:238, section:"ch3", q:"ما نوع الرابطة في جزيء الهيدروكلوريك HCl؟", options:["أيونية","فلزية","تساهمية","هيدروجينية"], correct:2, exp:"نوع هذا هو تساهمية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:239, section:"ch3", q:"الرابطة التساهمية بين ذرتي فلور تنتج بمشاركة كل ذرة فلور واحدة بـ..", options:["2 إلكترون","3 إلكترونات","إلكترون واحد","4 إلكترونات"], correct:2, exp:"الإجابة الصحيحة هي إلكترون واحد. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:240, section:"ch3", q:"أي العناصر التالية يكوّن روابط تساهمية عند تفاعله مع الذرات الأخرى؟", options:["Na","Ca","الكربون C","Mg"], correct:2, exp:"الإجابة الصحيحة هي الكربون C. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:241, section:"ch3", q:"الرابطة الثنائية بين ذرتي الكربون في الإيثين..", options:["رابطتا سيجما","رابطتا باي","رابطة سيجما ورابطة باي","ثلاث روابط سيجما"], correct:2, exp:"الإجابة الصحيحة هي رابطة سيجما ورابطة باي. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:242, section:"ch3", q:"ما عدد الروابط سيجما والروابط باي في الأسيتيلين HC≡CH؟", options:["2σ و 3π","3σ و 2π","4σ و π","2σ و 2π"], correct:1, exp:"الإجابة الصحيحة هي 3σ و 2π. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:243, section:"ch3", q:"الصيغة الكيميائية لمركب أكسيد ثنائي الهيدروجين..", options:["H₂O₂","H₂O","HO","H₃O"], correct:1, exp:"الصيغة الصحيحة هي H₂O. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},

  {id:246, section:"ch3", q:"ما نوع الرابطة بين العنصرين X و Y في المركب إذا كانت قيمة الكهروسالبية Y=3.12, X=0.13؟", options:["تساهمية","فلزية","أيونية","هيدروجينية"], correct:2, exp:"نوع هذا هو أيونية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:247, section:"ch3", q:"إذا كانت قيمة الكهروسالبية لعنصر Y=1.3 وللعنصر X=0.39؛ فما نوع الرابطة بين العنصرين؟", options:["تساهمية غير قطبية","تساهمية قطبية","أيونية","فلزية"], correct:1, exp:"نوع هذا هو تساهمية قطبية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},
  {id:248, section:"ch3", q:"إذا كان فرق الكهروسالبية بين ذرتي الرابطة صفراً؛ فإن المركب..", options:["تساهمي قطبي","أيوني","تساهمي غير قطبي","فلزي"], correct:2, exp:"الإجابة هي تساهمي غير قطبي. الكهروسالبية تزداد من اليسار لليمين في الدورة ومن الأسفل للأعلى في المجموعة. الفلور أعلى العناصر كهروسالبية لصغر حجمه وقوة جذب نواته للإلكترونات."},
  {id:249, section:"ch3", q:"لعدم جذب الذرات لإلكترونات الرابطة المشتركة بنفس القوة تتكون..", options:["رابطة تساهمية غير قطبية","رابطة تساهمية قطبية","رابطة أيونية","رابطة فلزية"], correct:1, exp:"الإجابة الصحيحة هي رابطة تساهمية قطبية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:250, section:"ch3", q:"نوع الرابطة في HCl..", options:["أيونية","تساهمية غير قطبية","تساهمية قطبية","فلزية"], correct:2, exp:"نوع هذا هو تساهمية قطبية. يمكن تحديد النوع من خلال تحليل خصائص المواد المشاركة وطبيعة التغير الحاصل. معرفة خصائص كل نوع تساعد في التصنيف الصحيح."},

  {id:253, section:"ch3", q:"جزيء الكلور ترتبط فيه ذرتا الكلور برابطة..", options:["أيونية","تساهمية قطبية","تساهمية غير قطبية","فلزية"], correct:2, exp:"الإجابة الصحيحة هي تساهمية غير قطبية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:254, section:"ch3", q:"أي التالي يُعد من الروابط غير القطبية؟", options:["H-Cl","H-F","F-F","H-O"], correct:2, exp:"الإجابة الصحيحة هي F-F. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:255, section:"ch3", q:"جميع الجزيئات التالية تحوي رابطة تساهمية غير قطبية عدا..", options:["H₂","N₂","O₂","H₂O"], correct:3, exp:"الاستثناء هو H₂O لأنه لا ينطبق عليه الشرط المذكور في السؤال بينما باقي الخيارات تنطبق. هذا النوع من الأسئلة يتطلب معرفة خصائص جميع الخيارات للتمييز بينها."},

  {id:273, section:"ch4", q:"الصيغة التي تحدد العدد الفعلي للذرات في المركب..", options:["الجزيئية","الأولية","النظرية","الفرضية"], correct:0, exp:"الصيغة الصحيحة هي الجزيئية. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:274, section:"ch4", q:"مركبان: الأول CH₃-CO-H، والثاني C₃H₇-COOH متشابهان في..", options:["الصيغة الأولية","الصيغة الجزيئية","الكتلة المولية","الخواص الكيميائية"], correct:0, exp:"الإجابة الصحيحة هي الصيغة الأولية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:275, section:"ch4", q:"الصيغة الأولية لجزيء الجلوكوز C₆H₁₂O₆ هي..", options:["C₆H₁₂O₆","CH₂O","C₃H₆O₃","CHO"], correct:1, exp:"الصيغة الصحيحة هي CH₂O. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:276, section:"ch4", q:"جزيء ماء عدد مولاته 14 mol وأكسيد ماغنسيوم عدد مولاته 2 mol، ما الصيغة الجزيئية للمركب؟", options:["MgO·2H₂O","MgO·7H₂O","MgO·H₂O","2MgO·14H₂O"], correct:1, exp:"الصيغة الصحيحة هي MgO·7H₂O. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:277, section:"ch4", q:"إذا كانت الكتلة المولية لمركب 28 g/mol والصيغة الأولية له CH₂، ما صيغته الجزيئية؟ علماً أن H=1, C=12.", options:["C₂H₄","CH₂","C₃H₆","C₂H₆"], correct:0, exp:"الصيغة الصحيحة هي C₂H₄. تُشتق هذه الصيغة من عدد الذرات ونوع الروابط في الجزيء. من المهم التمييز بين الصيغة الجزيئية والبنائية والأولية."},
  {id:278, section:"ch4", q:"الاسم العلمي للمركب MgSO₄·7H₂O..", options:["كبريتيد الماغنسيوم سباعي الماء","كبريتات الماغنسيوم سباعي الماء","كبريتيت الماغنسيوم المائي","كبريتات الماغنسيوم المائي"], correct:1, exp:"الإجابة الصحيحة هي كبريتات الماغنسيوم سباعي الماء. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:279, section:"ch4", q:"أي التالي يُمثّل الملح المائي؟", options:["يحوي ماء التبلور","لا يختلف عدد جزيئات ماء التبلور من ملح إلى آخر","لا يحوي ماء التبلور","يمكن تسخينه لزيادة عدد جزيئات ماء التبلور"], correct:0, exp:"الإجابة الصحيحة هي يحوي ماء التبلور. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:280, section:"ch4", q:"ما كتلة الماء بالجرام في عينة من ملح مائي كتلتها 10 g، تم تسخينها وأصبحت كتلتها 9.2 g؟", options:["0.8","9.2","8","10"], correct:0, exp:"الإجابة الصحيحة هي 0.8. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:281, section:"ch4", q:"مركبات تُستخدم في امتصاص الرطوبة الجوية..", options:["الأحماض","الأملاح المعدنية","القواعد","الأملاح اللامائية"], correct:3, exp:"الإجابة الصحيحة هي الأملاح اللامائية. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:282, section:"ch4", q:"«عند ثبات درجة الحرارة يتناسب حجم الغاز عكسياً مع ضغطه»، يعبر هذا النص عن قانون..", options:["بويل","شارل","جاي لوساك","نيوتن"], correct:0, exp:"الإجابة هي بويل. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:283, section:"ch4", q:"أي التالي يُمثّل العلاقة البيانية بين حجم الغاز وضغطه عند ثبوت درجة حرارته؟", options:["خط مستقيم صاعد","خط مستقيم نازل","منحنى هذلولي (عكسي)","دائرة"], correct:2, exp:"الإجابة الصحيحة هي منحنى هذلولي (عكسي). يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:284, section:"ch4", q:"غاز حجمه 70 cm³ عند ضغط 100 Pa، ما حجمه عند ضغط 200 Pa بنفس الوحدة مع ثبات درجة حرارته؟", options:["15","35","140","210"], correct:1, exp:"الإجابة الصحيحة هي 35. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:285, section:"ch4", q:"ماذا يحدث لحجم عينة محددة من غاز عند زيادة الضغط عليها وفقاً لقانون بويل؟", options:["يزداد","يقل","يظل ثابتاً","حجمه يساوي صفراً"], correct:1, exp:"الإجابة هي يقل. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:286, section:"ch4", q:"إذا كانت درجة الحرارة على المقياس المئوي 50°C؛ فإن درجة الحرارة المطلقة المقابلة لها بوحدة الكلفن (K)..", options:["18","82","223","323"], correct:3, exp:"الإجابة هي 323. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:287, section:"ch4", q:"درجة الحرارة 100 K تُعادل في تدريج سليزيوس..", options:["373°C","173°C","-173°C","-373°C"], correct:2, exp:"الإجابة هي -173°C. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:288, section:"ch4", q:"درجة غليان الماء في مقياس كلفن..", options:["0 K","100 K","273 K","373 K"], correct:3, exp:"الإجابة هي 373 K. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:289, section:"ch4", q:"درجة الحرارة على مقياس كلفن التي تقابل 30°C..", options:["373 K","323 K","313 K","303 K"], correct:3, exp:"الإجابة هي 303 K. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
  {id:290, section:"ch4", q:"أي تحويلات درجات الحرارة التالية غير صحيح؟", options:["88 K = -185°C","-273°C = 0 K","300 K = 361°C","273°C = 546 K"], correct:2, exp:"الإجابة الصحيحة هي 300 K = 361°C. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:291, section:"ch4", q:"«عند ثبوت الضغط يتناسب حجم الغاز طردياً مع درجة الحرارة»، هذا النص يعبر عن قانون..", options:["بويل","جاي لوساك","دالتون","شارل"], correct:3, exp:"الإجابة هي شارل. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:292, section:"ch4", q:"قانون شارل من قوانين الغازات الذي يدرس العلاقة بين..", options:["الضغط ودرجة الحرارة","درجة الحرارة والحجم","الضغط والحجم","الضغط وعدد المولات"], correct:1, exp:"الإجابة هي درجة الحرارة والحجم. هذا القانون/المبدأ من الأسس المهمة في الكيمياء ويصف العلاقة بين المتغيرات المذكورة في السؤال. فهم شروط تطبيقه وحدوده ضروري للإجابة الصحيحة."},
  {id:293, section:"ch4", q:"عند ثبوت الضغط فإن حجم الغاز يزيد طردياً في حالة..", options:["نقص حجم الوعاء","نقص درجة الحرارة","زيادة حجم الوعاء","زيادة درجة الحرارة"], correct:3, exp:"الإجابة الصحيحة هي زيادة درجة الحرارة. يرتبط هذا المفهوم بفهم التركيب الكيميائي والخواص الناتجة عنه. التمييز بين الخيارات يتطلب معرفة الفروقات الأساسية بين المواد والتفاعلات المشاركة."},
  {id:294, section:"ch4", q:"أي التالي يُمثّل العلاقة البيانية بين حجم غاز ودرجة حرارة عند ثبوت الضغط؟", options:["منحنى هذلولي","خط مستقيم عكسي","خط مستقيم طردي من المركز","دائرة"], correct:2, exp:"الإجابة الصحيحة هي خط مستقيم طردي من المركز. يمكن تحديد ذلك من خلال مقارنة الخواص الكيميائية والفيزيائية للخيارات المطروحة. الخيارات الأخرى لا تتوافق مع الشرط المذكور في السؤال."},
  {id:295, section:"ch4", q:"بالون مملوء بغاز حجمه 2 L عند 300 K، كم حجمه باللتر عند 150 K؟", options:["1","2","3","4"], correct:0, exp:"الإجابة الصحيحة هي 1. يمكن الوصول لهذه النتيجة بتطبيق القانون أو المعادلة المناسبة على المعطيات المذكورة في السؤال. تأكد من تحويل الوحدات إذا لزم الأمر قبل التعويض في القانون."},
  {id:296, section:"ch4", q:"يشغل غاز حجماً مقداره 1 L عند درجة حرارة 100 K، ما درجة الحرارة اللازمة لخفض الحجم إلى 0.5 L؟", options:["50 K","100 K","150 K","200 K"], correct:0, exp:"الإجابة هي 50 K. التحويل بين سلسيوس وكلفن: K = °C + 273. الصفر المطلق (0 K = -273°C) هو أقل درجة حرارة ممكنة نظرياً حيث تتوقف حركة الجسيمات."},
